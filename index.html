<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Warzone V7.0 - Aimware Integrated</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        :root { --wb-dark: rgba(5, 5, 5, 0.95); --primary: #00ffcc; --accent: #ff3333; --gui-bg: rgba(0,0,0,0.85); }
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; touch-action:none; font-family:'Share Tech Mono', monospace; color: white; }
        
        #game-canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
        .ui-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }

        /* Crosshair */
        #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:80px; height:80px; display:flex; align-items:center; justify-content:center; }
        #ch-dot { width:4px; height:4px; background:#fff; border-radius:50%; }
        .ch-line { position:absolute; background:#fff; border-radius:1px; }
        .v-line { width:2px; height:12px; } .h-line { width:12px; height:2px; }

        /* HUD Components */
        #top-info { position:absolute; top:10px; left:50%; transform:translateX(-50%); display:flex; gap:30px; background:var(--wb-dark); padding:8px 25px; border:1px solid #444; border-radius:4px; font-size:1.2rem; }
        #hp-display { position:absolute; bottom:25px; left:25px; width:200px; }
        .bar-bg { width:100%; height:10px; background:#222; border:1px solid #444; margin-top:5px; }
        #hp-fill { width:100%; height:100%; background:#0f0; transition: width 0.2s; }
        
        /* Weapon Slots */
        #hotbar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:8px; pointer-events:auto; }
        .slot { width:55px; height:55px; background:var(--gui-bg); border:1px solid #444; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0.6; transition:0.2s; }
        .slot.active { opacity:1; border-color:var(--primary); box-shadow:0 0 15px var(--primary); transform:translateY(-5px); }
        .slot span { font-size:1.4rem; }

        /* Damage Indicator */
        #hit-indicator { position:absolute; top:50%; left:50%; width:250px; height:250px; border:6px solid transparent; border-top-color:var(--accent); border-radius:50%; transform:translate(-50%, -50%) rotate(0deg); opacity:0; pointer-events:none; }

        /* NVG/PostProcess */
        #nvg-screen { position:absolute; top:0; left:0; width:100%; height:100%; display:none; pointer-events:none; z-index:5; }
        .nvg-active { display:block !important; background: rgba(0,255,50,0.1); backdrop-filter: brightness(2.8) contrast(1.5) sepia(1) hue-rotate(80deg); }

        /* Mod/Settings Menus */
        #title-screen { position:absolute; inset:0; background:#050505; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; pointer-events:auto; }
        #mod-settings-btn { display:none; margin-top:20px; padding:10px 20px; background:#222; border:1px solid var(--primary); color:var(--primary); cursor:pointer; }
        
        #mod-menu { position:absolute; top:20px; right:20px; width:220px; background:var(--gui-bg); border:1px solid var(--primary); padding:15px; display:none; pointer-events:auto; font-size:0.9rem; }
        #mod-menu h3 { margin:0 0 10px 0; color:var(--primary); font-size:1rem; border-bottom:1px solid #333; }
        .mod-opt { margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }

        /* Buttons & Controls */
        .ctrl-btn { pointer-events:auto; background:rgba(255,255,255,0.15); border:2px solid #fff; border-radius:50%; color:#fff; font-weight:bold; }
        #fire-btn { position:absolute; bottom:120px; right:40px; width:90px; height:90px; border-color:var(--accent); }
        #ads-btn { position:absolute; bottom:230px; right:40px; width:65px; height:65px; }
        #stance-btn { position:absolute; bottom:40px; right:150px; width:65px; height:65px; }
        #nvg-toggle { position:absolute; top:70px; left:10px; padding:8px; background:var(--gui-bg); border:1px solid #555; pointer-events:auto; }
    </style>
</head>
<body>

<canvas id="game-canvas"></canvas>
<div id="nvg-screen"></div>

<div id="game-hud" class="ui-layer" style="display:none;">
    <div id="top-info">
        <div>SCORE: <span id="score-val">0</span></div>
        <div id="timer">05:00</div>
        <div>HOSTILE: <span id="enemy-val">10</span></div>
    </div>

    <div id="crosshair">
        <div id="ch-dot"></div>
        <div id="ch-top" class="ch-line v-line" style="transform:translateY(-20px)"></div>
        <div id="ch-btm" class="ch-line v-line" style="transform:translateY(20px)"></div>
        <div id="ch-lft" class="ch-line h-line" style="transform:translateX(-20px)"></div>
        <div id="ch-rgt" class="ch-line h-line" style="transform:translateX(20px)"></div>
    </div>

    <div id="hit-indicator"></div>

    <div id="hp-display">
        HP: <span id="hp-val">100</span>
        <div class="bar-bg"><div id="hp-fill"></div></div>
    </div>

    <div id="hotbar">
        <div class="slot active" data-id="0">1<span>🔫</span></div>
        <div class="slot" data-id="1">2<span>🔫</span></div>
        <div class="slot" data-id="2">3<span>🔪</span></div>
        <div class="slot" data-id="3">4<span>💣</span></div>
        <div class="slot" data-id="4">5<span>💊</span></div>
    </div>

    <div id="mod-menu">
        <h3>AIMWARE v2.1</h3>
        <div class="mod-opt">Aimbot <input type="checkbox" id="cfg-aimbot"></div>
        <div class="mod-opt">ESP Box <input type="checkbox" id="cfg-esp-box"></div>
        <div class="mod-opt">ESP Line <input type="checkbox" id="cfg-esp-line"></div>
        <div class="mod-opt">No Recoil <input type="checkbox" id="cfg-norecoil"></div>
        <hr>
        <button onclick="document.getElementById('js-console').style.display='block'" style="width:100%">Open JS Console</button>
    </div>

    <div id="fire-btn" class="ctrl-btn" style="display:flex; align-items:center; justify-content:center;">FIRE</div>
    <div id="ads-btn" class="ctrl-btn" style="display:flex; align-items:center; justify-content:center;">ADS</div>
    <div id="stance-btn" class="ctrl-btn" style="display:flex; align-items:center; justify-content:center;">POSE</div>
    <div id="nvg-toggle">NVG: OFF</div>
</div>

<div id="title-screen">
    <h1 style="color:var(--primary); font-size:3rem; margin-bottom:10px;">WARZONE V7.0</h1>
    <p id="version-tag" style="color:#555; cursor:pointer;">v7.0.5-stable [MOD_LOCKED]</p>
    
    <div style="margin:30px; background:#111; padding:20px; border:1px solid #333;">
        BOTS: <select id="set-enemies"><option value="10">10</option><option value="30">30</option><option value="999">UNLIMITED</option></select>
        TIME: <select id="set-time"><option value="day">DAY</option><option value="night">NIGHT</option></select>
    </div>

    <button id="start-btn" style="padding:15px 60px; background:var(--primary); color:#000; font-weight:bold; border:none; cursor:pointer; font-size:1.2rem;">DEPLOY</button>
    <div id="mod-settings-btn" onclick="document.getElementById('mod-menu').style.display='block'">MOD SETTINGS</div>
</div>

<div id="js-console" style="position:fixed; top:10%; left:10%; width:80%; height:80%; background:#000; border:2px solid var(--primary); z-index:1000; display:none; flex-direction:column; padding:20px;">
    <h2 style="margin-top:0">JS MOD LOADER</h2>
    <textarea id="js-input" style="flex:1; background:#111; color:#0f0; border:1px solid #444; padding:10px; font-family:monospace;"></textarea>
    <div style="margin-top:10px; display:flex; gap:10px;">
        <button onclick="executeMod()" style="padding:10px;">EXECUTE CODE</button>
        <button onclick="document.getElementById('js-console').style.display='none'" style="padding:10px;">CLOSE</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/** --- GAME ENGINE CORE --- */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);

const playerGroup = new THREE.Object3D();
scene.add(playerGroup);
playerGroup.add(camera);
playerGroup.position.set(0, 1.7, 0);

let isPlaying = false, playerHP = 100, score = 0, enemiesRemaining = 10;
let yaw = 0, pitch = 0, moveSpeed = 0.15;
let isADS = false, stance = 'stand'; // stand, crouch, prone, slide
let spread = 0, targetSpread = 0;

/** --- WEAPONS & INVENTORY --- */
const weapons = [
    { name:"MK18", mag:30, cur:30, res:120, rate:100, dmg:35, reload:2000, type:'ar' },
    { name:"M9", mag:15, cur:15, res:60, rate:200, dmg:20, reload:1200, type:'hg' },
    { name:"KNIFE", mag:0, cur:0, res:0, rate:400, dmg:100, reload:0, type:'melee' },
    { name:"NADE", mag:1, cur:1, res:4, rate:1000, dmg:200, reload:3000, type:'nade' },
    { name:"MEDKIT", mag:1, cur:1, res:3, rate:5000, dmg:0, reload:8000, type:'med' }
];
let curIdx = 0, isFiring = false, isReloading = false;

const weaponModels = [];
function initWeapons() {
    const mat = new THREE.MeshStandardMaterial({color:0x111111});
    // MK18
    const m4 = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.12, 0.45), mat);
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.35), mat);
    barrel.rotation.x = Math.PI/2; barrel.position.z = -0.4;
    m4.add(body, barrel);
    m4.idlePos = new THREE.Vector3(0.25, -0.4, -0.5); 
    m4.adsPos = new THREE.Vector3(0, -0.18, -0.3); // 重なり防止調整
    weaponModels.push(m4); camera.add(m4);
    
    // 他の武器も同様に生成
    for(let i=1; i<5; i++) {
        const g = new THREE.Group(); 
        const box = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.2), mat);
        g.add(box); g.idlePos = new THREE.Vector3(0.2, -0.3, -0.4); g.adsPos = new THREE.Vector3(0, -0.1, -0.2);
        weaponModels.push(g); camera.add(g);
    }
    updateWeaponView();
}

function updateWeaponView() {
    weaponModels.forEach((m, i) => m.visible = (i === curIdx));
}

/** --- WORLD & BOTS --- */
const bots = []; const obstacles = [];
function buildWorld(mode) {
    const isNight = mode === 'night';
    if(!isNight) {
        scene.background = new THREE.Color(0x87CEEB);
        const light = new THREE.DirectionalLight(0xffffff, 1); light.position.set(10,20,10); scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    } else {
        scene.background = new THREE.Color(0x000105);
        scene.add(new THREE.AmbientLight(0xffffff, 0.05));
    }

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000,1000), new THREE.MeshStandardMaterial({color:isNight?0x111111:0x334422}));
    ground.rotation.x = -Math.PI/2; scene.add(ground); obstacles.push(ground);

    for(let i=0; i<40; i++) {
        const h = 2 + Math.random()*15;
        const b = new THREE.Mesh(new THREE.BoxGeometry(10, h, 10), new THREE.MeshStandardMaterial({color:0x444444}));
        b.position.set((Math.random()-0.5)*300, h/2, (Math.random()-0.5)*300);
        scene.add(b); obstacles.push(b);
    }
}

function spawnBot() {
    const bot = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.4), new THREE.MeshStandardMaterial({color:0xff3333}));
    body.position.y = 0.9; bot.add(body);
    
    // HP Bar
    const hpBg = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.1), new THREE.MeshBasicMaterial({color:0x000000}));
    hpBg.position.y = 2.1; bot.add(hpBg);
    const hpBar = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.1), new THREE.MeshBasicMaterial({color:0x00ff00}));
    hpBar.position.y = 2.1; hpBar.position.z = 0.01; bot.add(hpBar);

    // ESP Box (aimware feature)
    const espBox = new THREE.BoxHelper(body, 0x00ff00);
    espBox.material.depthTest = false; espBox.visible = false;
    bot.add(espBox); bot.esp = espBox;

    bot.position.set((Math.random()-0.5)*250, 0, (Math.random()-0.5)*250);
    bot.hp = 100; bot.hpBar = hpBar;
    scene.add(bot); bots.push(bot);
}

/** --- ACTIONS --- */
function fire() {
    const w = weapons[curIdx];
    if(w.cur <= 0 || isReloading) return;
    
    if(w.type === 'med') { 
        isReloading = true; // 治療中フラグとして代用
        setTimeout(() => { playerHP = 100; updateHUD(); isReloading = false; }, 3000);
        return;
    }

    w.cur--;
    const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
    // Spread
    const sVal = (spread/100) * (isADS?0.1:1.0);
    dir.x += (Math.random()-0.5)*sVal; dir.y += (Math.random()-0.5)*sVal;

    const ray = new THREE.Raycaster(camera.getWorldPosition(new THREE.Vector3()), dir.normalize());
    const hits = ray.intersectObjects(bots, true);
    
    if(hits.length > 0) {
        const target = hits[0].object.parent;
        if(target.hp > 0) {
            target.hp -= w.dmg;
            target.hpBar.scale.x = Math.max(0, target.hp/100);
            if(target.hp <= 0) {
                score += 150; enemiesRemaining--;
                scene.remove(target); bots.splice(bots.indexOf(target), 1);
                spawnBot();
            }
        }
    }
}

/** --- INPUTS --- */
let moveData = { id:null, x:0, y:0, sx:0, sy:0 };
let lookData = { id:null, lx:0, ly:0 };

window.addEventListener('touchstart', e => {
    for(let t of e.changedTouches) {
        if(t.target.closest('.slot')) { curIdx = parseInt(t.target.closest('.slot').dataset.id); updateWeaponView(); document.querySelectorAll('.slot').forEach((s,i)=>s.className=i==curIdx?'slot active':'slot'); return; }
        if(t.clientX < window.innerWidth/2) { moveData.id = t.identifier; moveData.sx = t.clientX; moveData.sy = t.clientY; }
        else { lookData.id = t.identifier; lookData.lx = t.clientX; lookData.ly = t.clientY; }
    }
});

window.addEventListener('touchmove', e => {
    for(let t of e.changedTouches) {
        if(t.identifier === moveData.id) { moveData.x = (t.clientX - moveData.sx)/50; moveData.y = (t.clientY - moveData.sy)/50; }
        if(t.identifier === lookData.id) {
            const sens = isADS ? 0.002 : 0.005;
            yaw -= (t.clientX - lookData.lx) * sens;
            pitch -= (t.clientY - lookData.ly) * sens;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
            lookData.lx = t.clientX; lookData.ly = t.clientY;
        }
    }
});

document.getElementById('fire-btn').ontouchstart = (e) => { e.preventDefault(); fire(); };
document.getElementById('ads-btn').ontouchstart = (e) => { e.preventDefault(); isADS = !isADS; };
document.getElementById('stance-btn').ontouchstart = (e) => {
    e.preventDefault();
    if(Math.abs(moveData.x) > 0.5 || Math.abs(moveData.y) > 0.5) { stance = 'slide'; setTimeout(()=>stance='crouch', 600); }
    else if(stance === 'stand') stance = 'crouch';
    else if(stance === 'crouch') stance = 'prone';
    else stance = 'stand';
};

/** --- AIMWARE LOGIC (MODS) --- */
function runAimware() {
    const doAimbot = document.getElementById('cfg-aimbot').checked;
    const doESPBox = document.getElementById('cfg-esp-box').checked;

    if(doAimbot && bots.length > 0) {
        let nearest = null, minDist = Infinity;
        bots.forEach(b => {
            let d = b.position.distanceTo(playerGroup.position);
            if(d < minDist) { minDist = d; nearest = b; }
        });
        if(nearest) {
            const targetPos = nearest.position.clone(); targetPos.y += 1.6;
            camera.lookAt(targetPos);
            // 同期処理
            const lookDir = new THREE.Vector3(); camera.getWorldDirection(lookDir);
            yaw = Math.atan2(lookDir.x, lookDir.z);
            pitch = Math.asin(lookDir.y);
        }
    }

    bots.forEach(b => {
        b.esp.visible = doESPBox;
    });
}

/** --- MAIN LOOP --- */
function update() {
    if(!isPlaying) return;
    requestAnimationFrame(update);

    // Stance Height
    let targetH = 1.7;
    if(stance === 'crouch') targetH = 1.0;
    if(stance === 'prone') targetH = 0.4;
    if(stance === 'slide') targetH = 0.8;
    playerGroup.position.y += (targetH - playerGroup.position.y) * 0.1;

    // Move
    const speed = (stance==='slide')?0.3:(stance==='stand'?0.15:0.06);
    const move = new THREE.Vector3(moveData.x, 0, moveData.y).normalize().multiplyScalar(speed).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
    playerGroup.position.add(move);
    playerGroup.rotation.y = yaw;
    camera.rotation.x = pitch;

    // Dynamic Crosshair
    targetSpread = (Math.abs(moveData.x) + Math.abs(moveData.y))*25;
    if(stance !== 'stand') targetSpread *= 0.5;
    spread += (targetSpread - spread) * 0.1;
    const g = 15 + spread;
    document.getElementById('ch-top').style.transform = `translateY(${-g}px)`;
    document.getElementById('ch-btm').style.transform = `translateY(${g}px)`;
    document.getElementById('ch-lft').style.transform = `translateX(${-g}px)`;
    document.getElementById('ch-rgt').style.transform = `translateX(${g}px)`;

    // Weapon LERP
    const m = weaponModels[curIdx];
    m.position.lerp(isADS ? m.adsPos : m.idlePos, 0.2);

    // Bot AI
    bots.forEach(b => {
        if(Math.random() < 0.005) { 
            playerHP -= 1; updateHUD(); 
            const arc = document.getElementById('hit-indicator');
            arc.style.opacity = 1; setTimeout(()=>arc.style.opacity=0, 300);
        }
    });

    runAimware();
    updateHUD();
    renderer.render(scene, camera);
}

function updateHUD() {
    document.getElementById('hp-val').innerText = Math.ceil(playerHP);
    document.getElementById('hp-fill').style.width = playerHP + "%";
    document.getElementById('score-val').innerText = score;
    document.getElementById('enemy-val').innerText = enemiesRemaining;
}

/** --- INITIALIZATION --- */
let taps = 0;
document.getElementById('version-tag').onclick = () => {
    taps++;
    if(taps >= 5) {
        document.getElementById('version-tag').innerText = "v7.0.5-stable [DEV_MODE]";
        document.getElementById('mod-settings-btn').style.display = 'block';
        document.getElementById('mod-menu').style.display = 'block';
        alert("DEVELOPER CONSOLE UNLOCKED");
    }
};

document.getElementById('start-btn').onclick = () => {
    const time = document.getElementById('set-time').value;
    buildWorld(time);
    initWeapons();
    for(let i=0; i<10; i++) spawnBot();
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('game-hud').style.display = 'block';
    isPlaying = true; update();
};

document.getElementById('nvg-toggle').onclick = function() {
    const scr = document.getElementById('nvg-screen');
    if(this.innerText.includes('OFF')) { this.innerText = 'NVG: ON'; scr.classList.add('nvg-active'); }
    else { this.innerText = 'NVG: OFF'; scr.classList.remove('nvg-active'); }
};

function executeMod() {
    const code = document.getElementById('js-input').value;
    try { eval(code); alert("Mod Executed!"); } catch(e) { alert("Error: " + e); }
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
