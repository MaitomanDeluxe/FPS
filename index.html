<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tactical Warzone V10.0 - COD Style</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    :root { --wb-dark: rgba(15, 15, 15, 0.9); --wb-border: 2px solid #555; --primary: #00ffcc; --accent: #ff3300; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Share Tech Mono', monospace; user-select: none; color: #fff; }
    #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    /* メニュー画面 */
    #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #222 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
    .menu-box { background: var(--wb-dark); padding: 30px; border: var(--wb-border); border-radius: 8px; width: 80%; max-width: 500px; }
    h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; text-shadow: 0 0 10px var(--primary); }
    .select-label { display: block; margin: 15px 0 5px; font-size: 14px; color: #aaa; text-align: left; }
    select { width: 100%; padding: 12px; background: #333; color: #fff; border: 1px solid #555; font-family: inherit; margin-bottom: 10px; }
    #btn-deploy { width: 100%; padding: 15px; background: var(--primary); color: #000; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; margin-top: 20px; transition: 0.2s; }
    #btn-deploy:hover { background: #fff; box-shadow: 0 0 20px var(--primary); }

    /* HUD */
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
    #crosshair-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .ch-line { position: absolute; background: #0f0; width: 1.5px; height: 12px; }
    .ch-h { width: 12px; height: 1.5px; }
    
    #cooldown-ring { position: absolute; top: 50%; left: 50%; width: 44px; height: 44px; transform: translate(-50%, -50%); border-radius: 50%; mask: radial-gradient(transparent 60%, black 62%); -webkit-mask: radial-gradient(transparent 60%, black 62%); z-index: 15; display: none; }

    #bottom-hud { position: absolute; bottom: 20px; right: 20px; text-align: right; }
    #weapon-name { font-size: 18px; color: var(--primary); }
    #ammo-display { font-size: 45px; font-weight: bold; }

    /* 操作ボタン */
    .ctrl { position: absolute; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; pointer-events: auto; font-size: 12px; }
    #btn-fire { right: 30px; bottom: 130px; width: 95px; height: 95px; background: rgba(255, 0, 0, 0.2); border-color: #ff3300; font-size: 18px; }
    #btn-ads { right: 140px; bottom: 50px; width: 75px; height: 75px; }
    #btn-reload { right: 30px; bottom: 30px; width: 75px; height: 75px; }
    #btn-jump { left: 160px; bottom: 40px; width: 65px; height: 65px; }
    #btn-crouch { left: 240px; bottom: 35px; width: 60px; height: 60px; background: rgba(255,255,255,0.1); }
    #btn-prone { left: 310px; bottom: 45px; width: 55px; height: 55px; background: rgba(255,255,255,0.1); }
    #btn-switch { right: 140px; bottom: 145px; width: 60px; height: 60px; border-radius: 8px; }
    #btn-grenade { right: 30px; bottom: 240px; width: 60px; height: 60px; background: rgba(255,165,0,0.2); border-color: orange; }

    #joystick-base { position: absolute; bottom: 40px; left: 40px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
    #joystick-stick { position: absolute; top: 30px; left: 30px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.5; }

    #kill-feed { position: absolute; top: 80px; left: 20px; color: var(--accent); font-weight: bold; }
    #status-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: var(--primary); font-size: 20px; display: none; }
  </style>
</head>
<body>

<div id="menu">
  <div class="menu-box">
    <h1>WARZONE V10.0</h1>
    <p style="font-size:12px; margin-bottom:20px;">TACTICAL HIGH-SPEED OPS</p>
    
    <span class="select-label">MAIN WEAPON</span>
    <select id="sel-main">
      <option value="0">CUSTOM AR15 (Assault)</option>
      <option value="1">MP7 SMG (Speed)</option>
      <option value="2">AWM SNIPER (Power)</option>
    </select>

    <span class="select-label">SIDEARM</span>
    <select id="sel-sub">
      <option value="3">G17 PISTOL</option>
      <option value="4">PYTHON REVOLVER</option>
    </select>

    <span class="select-label">DEPLOYMENT AREA</span>
    <select id="sel-time"><option value="day">DAYTIME</option><option value="night">NIGHT OPS</option></select>

    <button id="btn-deploy">START MATCH</button>
  </div>
</div>

<canvas id="game-canvas"></canvas>

<div class="overlay" id="ui-layer">
  <div id="cooldown-ring"></div>
  <div id="crosshair-container">
    <div class="ch-line"></div><div class="ch-line ch-h"></div>
  </div>
  <div id="status-msg">SLIDING...</div>
  <div id="kill-feed"></div>
  <div id="bottom-hud">
    <div id="weapon-name">---</div>
    <div id="ammo-display">0 / 0</div>
  </div>

  <div id="btn-fire" class="ctrl">FIRE</div>
  <div id="btn-ads" class="ctrl">ADS</div>
  <div id="btn-reload" class="ctrl">RELOAD</div>
  <div id="btn-jump" class="ctrl">JUMP</div>
  <div id="btn-crouch" class="ctrl">CROUCH</div>
  <div id="btn-prone" class="ctrl">PRONE</div>
  <div id="btn-switch" class="ctrl">SWAP</div>
  <div id="btn-grenade" class="ctrl">G</div>
  <div id="joystick-base"><div id="joystick-stick"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  /** --- ゲームエンジン定数 --- */
  let scene, camera, renderer, clock;
  let playerRig, gunParent, curAwmFrontSight;
  let isPlaying = false, isADS = false, isReloading = false, isSprinting = false;
  let moveMode = 'stand'; // stand, crouch, prone, slide, dive
  let curInventory = [0, 3]; // [Main, Sub]
  let invIdx = 0; // 現在 0(Main) or 1(Sub)
  let reloadStart = 0;
  let yaw = 0, pitch = 0;
  let bobT = 0, slideT = 0;
  const cameraFOV = { current: 75, target: 75 };
  const moveState = { fwd:0, str:0, vel: new THREE.Vector3(), onGround: true };

  const weapons = [
    { name:"CUSTOM AR15", mag:30, cur:30, res:120, rate:130, dmg:22, reload:2000, zoomFOV: 45, lastF:0, type:'ar' },
    { name:"MP7 SMG", mag:40, cur:40, res:160, rate:60, dmg:14, reload:1500, zoomFOV: 50, lastF:0, type:'smg' },
    { name:"AWM SNIPER", mag:5, cur:5, res:20, rate:1300, dmg:150, reload:3500, zoomFOV: 22, lastF:0, type:'sr' },
    { name:"G17 PISTOL", mag:15, cur:15, res:60, rate:200, dmg:24, reload:1200, zoomFOV: 50, lastF:0, type:'hg' },
    { name:".357 PYTHON", mag:6, cur:6, res:30, rate:500, dmg:70, reload:2500, zoomFOV: 45, lastF:0, type:'hg' }
  ];

  const enemies = [];
  const shells = [];
  const particles = [];

  function initGame() {
    scene = new THREE.Scene();
    clock = new THREE.Clock();
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.01, 1000);
    playerRig = new THREE.Group();
    playerRig.position.set(0, 1.7, 0);
    playerRig.add(camera);
    scene.add(playerRig);

    gunParent = new THREE.Group();
    camera.add(gunParent);

    const isDay = document.getElementById('sel-time').value === 'day';
    scene.background = new THREE.Color(isDay ? 0x87ceeb : 0x010105);
    if(!isDay) scene.fog = new THREE.FogExp2(0x010105, 0.05);

    const amb = new THREE.AmbientLight(0xffffff, isDay ? 0.6 : 0.2);
    const sun = new THREE.DirectionalLight(0xffffff, isDay ? 1.0 : 0.3);
    sun.position.set(50, 100, 50);
    scene.add(amb, sun);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: isDay ? 0x444444 : 0x111111}));
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // 障害物配置
    for(let i=0; i<40; i++) {
      const b = new THREE.Mesh(new THREE.BoxGeometry(2, Math.random()*4+1, 2), new THREE.MeshStandardMaterial({color: 0x222222}));
      b.position.set(Math.random()*100-50, b.geometry.parameters.height/2, Math.random()*100-50);
      scene.add(b);
    }

    buildWeapon();
    spawnEnemies(10);
    setupInputs();
  }

  function buildWeapon() {
    while(gunParent.children.length > 0) gunParent.remove(gunParent.children[0]);
    const w = weapons[curInventory[invIdx]];
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({color: 0x222222});

    if(w.type === 'sr') {
      group.scale.set(1.4, 1.4, 1.4);
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.05, 0.4), mat);
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.008, 0.4), mat);
      barrel.rotation.x = Math.PI/2; barrel.position.set(0, 0.01, -0.35);
      
      curAwmFrontSight = new THREE.Mesh(new THREE.BoxGeometry(0.002, 0.012, 0.002), mat);
      curAwmFrontSight.position.set(0, 0.025, -0.55);

      // 極細スコープ
      const scopeShape = new THREE.Shape();
      scopeShape.absarc(0,0,0.015,0,Math.PI*2,false);
      const hole = new THREE.Path(); hole.absarc(0,0,0.014,0,Math.PI*2,true);
      scopeShape.holes.push(hole);
      const tube = new THREE.Mesh(new THREE.ExtrudeGeometry(scopeShape, {depth:0.2, bevelEnabled:false}), mat);
      tube.position.set(0,0.06,-0.15);

      const rMat = new THREE.MeshBasicMaterial({color:0x000000});
      const rV = new THREE.Mesh(new THREE.PlaneGeometry(0.0005, 0.025), rMat);
      const rH = new THREE.Mesh(new THREE.PlaneGeometry(0.025, 0.0005), rMat);
      const reticle = new THREE.Group(); reticle.add(rV, rH);
      reticle.position.set(0, 0.06, 0.04);
      
      group.add(body, barrel, curAwmFrontSight, tube, reticle);
      group.idlePos = new THREE.Vector3(0.2, -0.25, -0.35);
      group.adsPos = new THREE.Vector3(0, -0.06 * 1.4, -0.15);
    } else {
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.07, 0.25), mat);
      group.add(body);
      group.idlePos = new THREE.Vector3(0.2, -0.2, -0.4);
      group.adsPos = new THREE.Vector3(0, -0.05, -0.2);
    }
    group.position.copy(group.idlePos);
    gunParent.add(group);
    updateHUD();
  }

  function animate() {
    if(!isPlaying) return;
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const now = Date.now();

    // 移動計算
    let speed = isSprinting ? 0.35 : 0.18;
    if(moveMode === 'crouch') speed = 0.08;
    if(moveMode === 'prone') speed = 0.04;
    if(moveMode === 'slide') speed = 0; // 慣性のみ

    moveState.vel.x -= moveState.vel.x * 10 * dt;
    moveState.vel.z -= moveState.vel.z * 10 * dt;
    if(!moveState.onGround) moveState.vel.y -= 25 * dt;

    if(moveMode !== 'slide') {
      const moveVec = new THREE.Vector3(moveState.str, 0, moveState.fwd).applyQuaternion(playerRig.quaternion).normalize().multiplyScalar(speed * 60 * dt);
      moveState.vel.add(moveVec);
    }

    playerRig.position.add(moveState.vel.clone().multiplyScalar(dt));
    if(playerRig.position.y < (moveMode==='stand'?1.7:(moveMode==='crouch'?1.0:0.5))) {
      playerRig.position.y = THREE.MathUtils.lerp(playerRig.position.y, (moveMode==='stand'?1.7:(moveMode==='crouch'?1.0:0.5)), 0.2);
      moveState.onGround = true; moveState.vel.y = 0;
    }

    // カメラボブ & タクティカルスプリント
    const g = gunParent.children[0];
    if(moveState.vel.length() > 1.0 && moveState.onGround) {
      bobT += dt * (isSprinting ? 18 : 10);
      const bY = Math.abs(Math.sin(bobT)) * (isSprinting ? 0.08 : 0.02);
      camera.position.y = bY;
      if(isSprinting && !isADS) {
        g.rotation.x = THREE.MathUtils.lerp(g.rotation.x, -Math.PI/3.5, 0.1);
        g.position.y = THREE.MathUtils.lerp(g.position.y, 0.1, 0.1);
      } else {
        g.rotation.x = THREE.MathUtils.lerp(g.rotation.x, 0, 0.1);
      }
    } else {
      camera.position.y = THREE.MathUtils.lerp(camera.position.y, 0, 0.1);
      g.rotation.x = THREE.MathUtils.lerp(g.rotation.x, 0, 0.1);
    }

    // ADS
    cameraFOV.current = THREE.MathUtils.lerp(cameraFOV.current, cameraFOV.target, 0.2);
    camera.fov = cameraFOV.current; camera.updateProjectionMatrix();
    const tPos = isADS ? g.adsPos : g.idlePos;
    g.position.lerp(tPos, 0.2);
    if(curAwmFrontSight) curAwmFrontSight.visible = !isADS;

    // UI更新
    updateProgressUI(now);
    updateShells(dt);
    updateParticles(dt);

    renderer.render(scene, camera);
  }

  function updateProgressUI(now) {
    const ring = document.getElementById('cooldown-ring');
    const w = weapons[curInventory[invIdx]];
    if(isReloading) {
      const p = (now - reloadStart) / w.reload;
      if(p>=1) finishReload();
      ring.style.display = 'block'; ring.style.background = `conic-gradient(var(--primary) ${p*360}deg, transparent 0deg)`;
    } else if(now - w.lastF < w.rate) {
      const p = (now - w.lastF) / w.rate;
      ring.style.display = 'block'; ring.style.background = `conic-gradient(rgba(255,0,0,0.6) ${p*360}deg, transparent 0deg)`;
    } else { ring.style.display = 'none'; }
  }

  function fire() {
    const w = weapons[curInventory[invIdx]];
    const now = Date.now();
    if(isReloading || w.cur <= 0 || now - w.lastF < w.rate || isSprinting) return;
    w.cur--; w.lastF = now; updateHUD();
    gunParent.children[0].position.z += 0.06;

    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = ray.intersectObjects(enemies.map(e=>e.mesh));
    if(hits.length > 0) {
      const en = enemies.find(e=>e.mesh === hits[0].object);
      en.hp -= w.dmg;
      if(en.hp <= 0) killEnemy(en);
    }
    spawnShell();
    if(w.cur === 0) startReload();
  }

  function killEnemy(en) {
    for(let i=0; i<12; i++) {
      const p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color:0xff0000}));
      p.position.copy(en.mesh.position);
      p.vel = new THREE.Vector3(Math.random()-0.5, Math.random(), Math.random()-0.5).multiplyScalar(6);
      p.life = 1.0; scene.add(p); particles.push(p);
    }
    scene.remove(en.mesh);
    enemies.splice(enemies.indexOf(en), 1);
    setTimeout(() => spawnEnemies(1), 3000);
    document.getElementById('kill-feed').innerText = "ENEMY ELIMINATED";
    setTimeout(()=> document.getElementById('kill-feed').innerText = "", 2000);
  }

  function spawnEnemies(n) {
    for(let i=0; i<n; i++) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.8), new THREE.MeshStandardMaterial({color:0x550000}));
      mesh.position.set(Math.random()*80-40, 0.9, Math.random()*80-40);
      scene.add(mesh);
      enemies.push({mesh, hp:100});
    }
  }

  function spawnShell() {
    const s = new THREE.Mesh(new THREE.CylinderGeometry(0.003, 0.003, 0.012), new THREE.MeshStandardMaterial({color:0xaa8800}));
    s.position.copy(playerRig.position).add(new THREE.Vector3(0.2,-0.2,-0.3).applyQuaternion(playerRig.quaternion));
    const right = new THREE.Vector3(1, 0.5, 0.5).applyQuaternion(camera.quaternion).normalize();
    s.vel = right.multiplyScalar(5);
    s.life = 1.5; scene.add(s); shells.push(s);
  }

  function updateShells(dt) {
    for(let i=shells.length-1; i>=0; i--) {
      const s = shells[i]; s.position.add(s.vel.clone().multiplyScalar(dt));
      s.vel.y -= 9.8 * dt; s.life -= dt;
      if(s.life <= 0) { scene.remove(s); shells.splice(i, 1); }
    }
  }

  function updateParticles(dt) {
    for(let i=particles.length-1; i>=0; i--) {
      const p = particles[i]; p.position.add(p.vel.clone().multiplyScalar(dt));
      p.vel.y -= 9.8 * dt; p.life -= dt;
      if(p.life <= 0) { scene.remove(p); particles.splice(i, 1); }
    }
  }

  function startReload() { if(!isReloading && weapons[curInventory[invIdx]].res > 0) { isReloading = true; reloadStart = Date.now(); } }
  function finishReload() {
    isReloading = false; const w = weapons[curInventory[invIdx]];
    const take = Math.min(w.mag - w.cur, w.res); w.cur += take; w.res -= take; updateHUD();
  }
  function updateHUD() {
    const w = weapons[curInventory[invIdx]];
    document.getElementById('weapon-name').innerText = w.name;
    document.getElementById('ammo-display').innerText = `${w.cur} / ${w.res}`;
  }

  function setupInputs() {
    const btnFire = document.getElementById('btn-fire');
    btnFire.ontouchstart = (e) => { e.preventDefault(); fire(); };

    document.getElementById('btn-ads').ontouchstart = (e) => {
      e.preventDefault(); isADS = !isADS;
      cameraFOV.target = isADS ? weapons[curInventory[invIdx]].zoomFOV : 75;
      document.getElementById('crosshair-container').style.display = isADS ? 'none' : 'flex';
    };

    document.getElementById('btn-reload').ontouchstart = (e) => { e.preventDefault(); startReload(); };
    document.getElementById('btn-switch').ontouchstart = (e) => { e.preventDefault(); invIdx = 1 - invIdx; isADS = false; cameraFOV.target = 75; buildWeapon(); };
    
    document.getElementById('btn-jump').ontouchstart = (e) => { e.preventDefault(); if(moveState.onGround) { moveState.vel.y = 8; moveState.onGround = false; } };

    // スライディングロジック
    document.getElementById('btn-crouch').ontouchstart = (e) => {
      e.preventDefault();
      if(isSprinting && moveState.onGround) {
        moveMode = 'slide';
        document.getElementById('status-msg').style.display = 'block';
        moveState.vel.add(new THREE.Vector3(0,0,-1).applyQuaternion(playerRig.quaternion).multiplyScalar(15));
        setTimeout(() => { moveMode = 'crouch'; document.getElementById('status-msg').style.display = 'none'; }, 800);
      } else {
        moveMode = (moveMode === 'crouch') ? 'stand' : 'crouch';
      }
    };

    // 伏せ・ダイブロジック
    document.getElementById('btn-prone').ontouchstart = (e) => {
      e.preventDefault();
      if(isSprinting && moveState.onGround) {
        moveMode = 'dive';
        moveState.vel.y = 5;
        moveState.vel.add(new THREE.Vector3(0,0,-1).applyQuaternion(playerRig.quaternion).multiplyScalar(12));
        setTimeout(() => { moveMode = 'prone'; }, 500);
      } else {
        moveMode = (moveMode === 'prone') ? 'stand' : 'prone';
      }
    };

    // グレネード
    document.getElementById('btn-grenade').ontouchstart = (e) => {
      e.preventDefault();
      document.getElementById('status-msg').innerText = "GRENADE OUT!";
      document.getElementById('status-msg').style.display = 'block';
      setTimeout(()=>document.getElementById('status-msg').style.display = 'none', 1000);
      // 投擲ロジック（簡易）
      const g = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshStandardMaterial({color:0x334400}));
      g.position.copy(playerRig.position);
      g.vel = new THREE.Vector3(0, 0.2, -1).applyQuaternion(camera.quaternion).multiplyScalar(15);
      g.life = 3; scene.add(g); particles.push(g);
    };

    window.ontouchmove = (e) => {
      if(!isPlaying) return;
      const t = e.touches[0];
      if(t.clientX > window.innerWidth/2) {
        yaw -= (e.movementX || 0) * 0.003;
        pitch -= (e.movementY || 0) * 0.003;
        pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
        playerRig.rotation.y = yaw; camera.rotation.x = pitch;
      }
    };

    const jBase = document.getElementById('joystick-base');
    const jStick = document.getElementById('joystick-stick');
    jBase.ontouchmove = (e) => {
      e.preventDefault();
      const t = e.touches[0]; const rect = jBase.getBoundingClientRect();
      const cx = rect.left + 55, cy = rect.top + 55;
      let dx = t.clientX - cx, dy = t.clientY - cy;
      const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
      const angle = Math.atan2(dy, dx);
      jStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
      moveState.str = Math.cos(angle) * (dist/40);
      moveState.fwd = -Math.sin(angle) * (dist/40);
      isSprinting = moveState.fwd < -0.8; // 上に大きく倒すとスプリント
    };
    jBase.ontouchend = () => { jStick.style.transform = `translate(0,0)`; moveState.fwd = 0; moveState.str = 0; isSprinting = false; };
  }

  document.getElementById('btn-deploy').onclick = () => {
    curInventory = [
      parseInt(document.getElementById('sel-main').value),
      parseInt(document.getElementById('sel-sub').value)
    ];
    document.getElementById('menu').style.display = 'none';
    document.getElementById('ui-layer').style.display = 'block';
    isPlaying = true;
    initGame();
    animate();
  };

  window.onresize = () => {
    if(renderer) {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  };
</script>
</body>
</html>
