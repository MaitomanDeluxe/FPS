<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Warzone V4.1</title>
    <style>
        :root { --primary: #00ff00; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); touch-action: none; font-family: 'Arial', sans-serif; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* HUD */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); border: 2px solid rgba(0,255,0,0.5); border-radius: 50%; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; background: #0f0; transform: translate(-50%, -50%); }
        
        #hit-marker { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); display: none; }
        #hit-marker::before, #hit-marker::after { content: ''; position: absolute; top: 50%; left: 50%; width: 20px; height: 2px; background: white; }
        #hit-marker::before { transform: translate(-50%, -50%) rotate(45deg); }
        #hit-marker::after { transform: translate(-50%, -50%) rotate(-45deg); }

        /* UI配置の変更: タイマー中央、ミニマップ左 */
        #timer { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 2rem; color: #fff; font-weight: bold; text-shadow: 2px 2px #000; }
        
        #minimap-container { position: absolute; top: 20px; left: 20px; width: 130px; height: 130px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; overflow: hidden; background: rgba(0,0,0,0.6); pointer-events: auto; }
        #minimap-player { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: #0f0; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; box-shadow: 0 0 5px #0f0; }
        #minimap-canvas { width: 100%; height: 100%; }

        /* ナイトビジョン・オーバーレイ */
        #nvg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; pointer-events: none; z-index: 5; }
        .nvg-green { background: rgba(0, 255, 0, 0.15); box-shadow: inset 0 0 100px rgba(0,0,0,0.8); backdrop-filter: brightness(1.5) contrast(1.2) sepia(1) hue-rotate(80deg); }
        .nvg-gray { background: rgba(255, 255, 255, 0.05); backdrop-filter: grayscale(1) brightness(1.2); }
        .nvg-thermal { background: rgba(0, 0, 100, 0.1); backdrop-filter: invert(0.8) hue-rotate(180deg) brightness(1.2); }

        /* 操作パネル */
        .controls { position: absolute; bottom: 0; width: 100%; height: 100%; pointer-events: none; }
        .btn { pointer-events: auto; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .btn:active { background: rgba(255,255,255,0.3); }
        
        #btn-shoot { position: absolute; bottom: 80px; right: 80px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,0,0,0.2); border: 3px solid #f00; font-size: 1.2rem; }
        #btn-jump { position: absolute; bottom: 80px; right: 220px; width: 60px; height: 60px; border-radius: 50%; font-size: 0.8rem; }
        #btn-reload { position: absolute; bottom: 220px; right: 40px; width: 60px; height: 60px; border-radius: 50%; font-size: 0.8rem; }
        #btn-nvg { position: absolute; top: 20px; right: 20px; width: 80px; height: 40px; font-size: 0.8rem; display: none; }
        
        /* 武器情報 */
        #weapon-hud { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; color: white; text-shadow: 1px 1px 2px #000; }

        /* ジョイスティック */
        #joystick-base { position: absolute; bottom: 80px; left: 80px; width: 140px; height: 140px; background: rgba(255,255,255,0.05); border-radius: 50%; display: none; border: 1px solid rgba(255,255,255,0.2); }
        #joystick-handle { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; z-index: 100; color: #fff; pointer-events: auto; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="game-hud" class="overlay" style="display:none;">
        <div id="nvg-overlay"></div>
        <div id="crosshair"></div>
        <div id="hit-marker"></div>
        <div id="timer">05:00</div>
        
        <div id="minimap-container"><div id="minimap-player"></div><canvas id="minimap-canvas" width="130" height="130"></canvas></div>
        <div id="btn-nvg" class="btn">NVG OFF</div>

        <div id="weapon-hud">
            <h2 id="weapon-name" style="margin:0; font-size:1.5rem; color:var(--primary);">M4A1</h2>
            <div id="ammo-display" style="font-size:2.5rem; font-weight:bold;">30 / 120</div>
        </div>

        <div class="controls">
            <div id="btn-shoot" class="btn">FIRE</div>
            <div id="btn-jump" class="btn">JUMP</div>
            <div id="btn-reload" class="btn">RELOAD</div>
            <div id="joystick-base"><div id="joystick-handle"></div></div>
        </div>
    </div>

    <div id="title-screen" class="screen">
        <h1 style="color:var(--primary); font-size:3.5rem; margin:0; text-align:center;">TACTICAL ELITE V4.1</h1>
        <p style="letter-spacing: 2px;">FLAT TERRAIN UPDATE</p>
        <div style="margin:30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; border: 1px solid #333;">
            <label style="font-size: 1.2rem; margin-right: 10px;">ENVIRONMENT:</label>
            <select id="time-select" style="padding:10px; background:#000; color:#0f0; border: 1px solid #0f0; font-size: 1.2rem; outline: none;">
                <option value="day" selected>DAY (Blue Sky)</option>
                <option value="night">NIGHT (Stealth)</option>
            </select>
        </div>
        <button id="btn-deploy" style="padding:15px 60px; font-size:1.5rem; background:var(--primary); color:#000; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">DEPLOY TO ZONE</button>
    </div>

    <div id="death-screen" class="screen" style="display: none; background: rgba(50,0,0,0.9);">
        <h1 style="color:#ff3333; font-size:4rem; margin:0;">K.I.A.</h1>
        <p>MISSION FAILED</p>
        <button onclick="location.reload()" style="padding:15px 40px; margin-top: 20px; font-size:1.2rem; cursor:pointer;">RETRY</button>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/**
 * --- CORE ENGINE SETUP ---
 */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const playerRig = new THREE.Object3D();
scene.add(playerRig);
playerRig.add(camera);
// スポーン位置（降下廃止、地上スタート）
playerRig.position.set(0, 1.7, 0);

let isPlaying = false;
let isDay = true;
let gameTime = 300; // 5分
let playerHP = 100;

const nvgModes = ['OFF', 'GREEN', 'GRAY', 'THERMAL'];
let curNvgIdx = 0;

let ambientLight, dirLight, celestialObj;

/**
 * --- FLAT WORLD & ENVIRONMENT ---
 */
function createWorld(mode) {
    // 昼夜の切り替え（青空と白い太陽 / 暗闇と月）
    if(mode === 'day') {
        scene.background = new THREE.Color(0x87CEEB); // 青空
        scene.fog = new THREE.Fog(0x87CEEB, 20, 250);
        ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    } else {
        scene.background = new THREE.Color(0x05050a); // 暗闇
        scene.fog = new THREE.Fog(0x05050a, 10, 100);
        ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
        dirLight = new THREE.DirectionalLight(0xaaaaff, 0.2);
    }
    
    scene.add(ambientLight);
    dirLight.position.set(100, 200, 100);
    dirLight.castShadow = true;
    dirLight.shadow.camera.left = -150; dirLight.shadow.camera.right = 150;
    dirLight.shadow.camera.top = 150; dirLight.shadow.camera.bottom = -150;
    scene.add(dirLight);

    // 太陽 / 月
    const celestialGeo = new THREE.SphereGeometry(15, 32, 32);
    const celestialMat = new THREE.MeshBasicMaterial({ color: mode === 'day' ? 0xffffff : 0xddddaa }); // 昼は白
    celestialObj = new THREE.Mesh(celestialGeo, celestialMat);
    celestialObj.position.set(150, 200, -150);
    scene.add(celestialObj);

    // 完全平坦な地面
    const groundGeo = new THREE.PlaneGeometry(500, 500);
    const groundMat = new THREE.MeshStandardMaterial({ 
        color: mode === 'day' ? 0x4d5c31 : 0x1a1c0d, 
        roughness: 0.9 
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // 建物（中に入れる）の生成
    for(let i=0; i<20; i++) {
        createBuilding((Math.random()-0.5)*400, (Math.random()-0.5)*400);
    }
}

function createBuilding(x, z) {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({color: 0x666666, roughness: 0.8});
    
    // 壁（1カ所ドア用の隙間を空ける）
    const w1 = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 0.5), mat); w1.position.set(0, 3, 5);
    const w2 = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 0.5), mat); w2.position.set(0, 3, -5);
    const w3 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 10), mat); w3.position.set(5, 3, 0);
    const w4 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 6), mat);  w4.position.set(-5, 3, 2); // ドア隙間
    
    const roof = new THREE.Mesh(new THREE.BoxGeometry(11, 0.5, 11), mat);
    roof.position.set(0, 6.25, 0);

    w1.castShadow = w1.receiveShadow = true;
    w2.castShadow = w2.receiveShadow = true;
    w3.castShadow = w3.receiveShadow = true;
    w4.castShadow = w4.receiveShadow = true;
    roof.castShadow = roof.receiveShadow = true;

    group.add(w1, w2, w3, w4, roof);
    group.position.set(x, 0, z);
    scene.add(group);
}

/**
 * --- BOT SYSTEM (Humanoid AI) ---
 */
const bots = [];
function spawnBot() {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({color: 0x222222});
    
    // 頭 (ヘッドショット判定用)
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0xffccaa}));
    head.position.y = 1.6; head.isHead = true;
    // 体
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.3), mat);
    body.position.y = 1.0; body.castShadow = true;
    // 足
    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), mat);
    legL.position.set(-0.2, 0.3, 0); legL.castShadow = true;
    const legR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), mat);
    legR.position.set(0.2, 0.3, 0); legR.castShadow = true;
    
    group.add(head, body, legL, legR);
    // プレイヤーから少し離れた場所にスポーン
    let bx = (Math.random()-0.5)*200;
    let bz = (Math.random()-0.5)*200;
    group.position.set(bx, 0, bz);
    
    group.hp = 100;
    group.lastShot = Date.now() + Math.random()*2000;
    scene.add(group);
    bots.push(group);
}

/**
 * --- WEAPON & COMBAT ---
 */
const weapon = { name: "M4A1", mag: 30, curMag: 30, res: 180, rate: 90, lastFire: 0, reloading: false };

const gunGroup = new THREE.Group();
camera.add(gunGroup);
const gunMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.6), new THREE.MeshStandardMaterial({color: 0x333, metalness:0.5}));
gunMesh.position.set(0.25, -0.25, -0.4);
gunGroup.add(gunMesh);

function showHitMarker(type) {
    const hm = document.getElementById('hit-marker');
    hm.style.display = 'block';
    if(type === 'kill') hm.style.backgroundColor = 'red';
    else if(type === 'head') hm.style.backgroundColor = 'yellow';
    else hm.style.backgroundColor = 'white';
    setTimeout(() => hm.style.display = 'none', 150);
}

function updateHUD() {
    document.getElementById('ammo-display').innerText = `${weapon.curMag} / ${weapon.res}`;
}

function shoot() {
    if(weapon.reloading || weapon.curMag <= 0) return;
    const now = Date.now();
    if(now - weapon.lastFire < weapon.rate) return;
    weapon.lastFire = now;

    weapon.curMag--;
    updateHUD();

    // 反動アニメーション
    gunGroup.position.z = 0.05;
    setTimeout(() => gunGroup.position.z = 0, 40);
    pitch += 0.01; // 縦反動

    // 射線判定
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    const ray = new THREE.Raycaster(playerRig.position.clone().add(new THREE.Vector3(0,1.7,0)), dir);
    const hitBots = ray.intersectObjects(bots, true);

    if(hitBots.length > 0) {
        const hitObj = hitBots[0].object;
        const botGroup = hitObj.parent;
        let damage = 30;
        let type = 'hit';

        if(hitObj.isHead) { damage *= 2.5; type = 'head'; } // ヘッショボーナス
        botGroup.hp -= damage;

        // ヒットエフェクト（一瞬白く光る）
        const origColor = hitObj.material.color.getHex();
        hitObj.material.color.setHex(0xffffff);
        setTimeout(() => { if(hitObj) hitObj.material.color.setHex(origColor); }, 50);

        if(botGroup.hp <= 0) {
            type = 'kill';
            scene.remove(botGroup);
            bots.splice(bots.indexOf(botGroup), 1);
            spawnBot(); // 倒したら補充
        }
        showHitMarker(type);
    }
}

/**
 * --- UNIFIED INPUT SYSTEM (移動・視点・射撃) ---
 */
let yaw = 0, pitch = 0;
// タッチIDを別々に管理してマルチタッチに対応
const moveCtrl = { id: null, active: false, startX: 0, startY: 0, dx: 0, dy: 0 };
const lookCtrl = { id: null, active: false, lastX: 0, lastY: 0 };
const shootCtrl = { id: null, active: false, lastX: 0, lastY: 0 };

let isAutoFiring = false;
let vy = 0; // ジャンプ用Y速度
let isGrounded = true;

window.addEventListener('touchstart', (e) => {
    for(let t of e.changedTouches) {
        // 1. 射撃ボタン（押下で射撃開始＋その指で視点移動可能）
        if(t.target.id === 'btn-shoot') {
            e.preventDefault();
            isAutoFiring = true;
            shootCtrl.id = t.identifier;
            shootCtrl.active = true;
            shootCtrl.lastX = t.clientX;
            shootCtrl.lastY = t.clientY;
            continue;
        }

        // UI操作の場合はスキップ
        if(t.target.closest('.btn') || t.target.closest('#minimap-container')) continue;

        // 2. 画面左半分（移動ジョイスティック）
        if(t.clientX < window.innerWidth / 2 && !moveCtrl.active) {
            moveCtrl.active = true; moveCtrl.id = t.identifier;
            moveCtrl.startX = t.clientX; moveCtrl.startY = t.clientY;
            const js = document.getElementById('joystick-base');
            js.style.display = 'block';
            js.style.left = (t.clientX - 70) + 'px';
            js.style.top = (t.clientY - 70) + 'px';
        } 
        // 3. 画面右半分（純粋な視点移動）
        else if(!lookCtrl.active) {
            lookCtrl.active = true; lookCtrl.id = t.identifier;
            lookCtrl.lastX = t.clientX; lookCtrl.lastY = t.clientY;
        }
    }
}, {passive: false});

window.addEventListener('touchmove', (e) => {
    for(let t of e.changedTouches) {
        // 移動処理
        if(t.identifier === moveCtrl.id) {
            moveCtrl.dx = (t.clientX - moveCtrl.startX) / 50;
            moveCtrl.dy = (t.clientY - moveCtrl.startY) / 50;
            const dist = Math.sqrt(moveCtrl.dx**2 + moveCtrl.dy**2);
            if(dist > 1) { moveCtrl.dx /= dist; moveCtrl.dy /= dist; }
            document.getElementById('joystick-handle').style.transform = `translate(calc(-50% + ${moveCtrl.dx*40}px), calc(-50% + ${moveCtrl.dy*40}px))`;
        }
        
        // 画面スワイプでの視点移動
        if(t.identifier === lookCtrl.id) {
            yaw -= (t.clientX - lookCtrl.lastX) * 0.005;
            pitch -= (t.clientY - lookCtrl.lastY) * 0.005;
            pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
            lookCtrl.lastX = t.clientX; lookCtrl.lastY = t.clientY;
        }

        // 射撃ボタンを押したままの視点移動
        if(t.identifier === shootCtrl.id) {
            yaw -= (t.clientX - shootCtrl.lastX) * 0.004; // 射撃中は少し感度を下げる
            pitch -= (t.clientY - shootCtrl.lastY) * 0.004;
            pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
            shootCtrl.lastX = t.clientX; shootCtrl.lastY = t.clientY;
        }
    }
}, {passive: false});

window.addEventListener('touchend', (e) => {
    for(let t of e.changedTouches) {
        if(t.identifier === moveCtrl.id) {
            moveCtrl.active = false; moveCtrl.id = null; moveCtrl.dx = 0; moveCtrl.dy = 0;
            document.getElementById('joystick-base').style.display = 'none';
        }
        if(t.identifier === lookCtrl.id) {
            lookCtrl.active = false; lookCtrl.id = null;
        }
        if(t.identifier === shootCtrl.id) {
            shootCtrl.active = false; shootCtrl.id = null;
            isAutoFiring = false; // 射撃停止
        }
    }
});
window.addEventListener('touchcancel', (e) => { /* 省略(touchendと同じ挙動) */ });

// ジャンプ・リロード・NVG
document.getElementById('btn-jump').ontouchstart = (e) => { e.preventDefault(); if(isGrounded) { vy = 0.22; isGrounded = false; } };
document.getElementById('btn-reload').ontouchstart = (e) => {
    e.preventDefault();
    if(weapon.reloading || weapon.res <= 0 || weapon.curMag === weapon.mag) return;
    weapon.reloading = true;
    setTimeout(() => {
        const need = weapon.mag - weapon.curMag;
        const take = Math.min(need, weapon.res);
        weapon.curMag += take; weapon.res -= take;
        weapon.reloading = false;
        updateHUD();
    }, 1800);
};

document.getElementById('btn-nvg').onclick = () => {
    if(isDay) return;
    curNvgIdx = (curNvgIdx + 1) % nvgModes.length;
    const overlay = document.getElementById('nvg-overlay');
    const btn = document.getElementById('btn-nvg');
    overlay.className = '';
    overlay.style.display = 'block';
    
    if(nvgModes[curNvgIdx] === 'OFF') overlay.style.display = 'none';
    else if(nvgModes[curNvgIdx] === 'GREEN') overlay.classList.add('nvg-green');
    else if(nvgModes[curNvgIdx] === 'GRAY') overlay.classList.add('nvg-gray');
    else if(nvgModes[curNvgIdx] === 'THERMAL') overlay.classList.add('nvg-thermal');
    
    btn.innerText = `NVG\n${nvgModes[curNvgIdx]}`;
};


/**
 * --- GAME LOOP ---
 */
function update() {
    if(!isPlaying) return;
    requestAnimationFrame(update);

    // 視点適用
    playerRig.rotation.y = yaw;
    camera.rotation.x = pitch;

    // 移動処理（平坦な地面のみ）
    if(moveCtrl.active) {
        const move = new THREE.Vector3(moveCtrl.dx, 0, moveCtrl.dy).normalize().multiplyScalar(0.18).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        playerRig.position.add(move);
        // マップ境界線
        playerRig.position.x = Math.max(-240, Math.min(240, playerRig.position.x));
        playerRig.position.z = Math.max(-240, Math.min(240, playerRig.position.z));
    }

    // 重力とジャンプ
    if(!isGrounded) {
        vy -= 0.015; // 重力
        playerRig.position.y += vy;
        if(playerRig.position.y <= 1.7) {
            playerRig.position.y = 1.7;
            vy = 0;
            isGrounded = true;
        }
    }

    // オートファイア
    if(isAutoFiring) shoot();

    // BOTのAIロジック（プレイヤー追跡＆攻撃）
    const now = Date.now();
    bots.forEach(bot => {
        const dist = bot.position.distanceTo(playerRig.position);
        bot.lookAt(playerRig.position.x, bot.position.y, playerRig.position.z);
        
        // 接近
        if(dist > 12) {
            const dir = new THREE.Vector3().subVectors(playerRig.position, bot.position).normalize();
            dir.y = 0; // 上下には移動しない
            bot.position.add(dir.multiplyScalar(0.04));
        } else {
            // 攻撃
            if(now - bot.lastShot > 1500) {
                bot.lastShot = now;
                // 30%の確率で被弾
                if(Math.random() < 0.3) {
                    playerHP -= 10;
                    document.getElementById('game-hud').style.backgroundColor = 'rgba(255,0,0,0.3)';
                    setTimeout(()=>document.getElementById('game-hud').style.backgroundColor = 'transparent', 100);
                    
                    if(playerHP <= 0) {
                        isPlaying = false;
                        document.getElementById('death-screen').style.display = 'flex';
                    }
                }
            }
        }
    });

    // タイマー管理
    gameTime -= 1/60;
    if(gameTime <= 0) { alert("TIME UP!"); location.reload(); }
    const m = Math.floor(gameTime / 60);
    const s = Math.floor(gameTime % 60);
    document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

    updateMinimap();
    renderer.render(scene, camera);
}

// ミニマップ（左上に配置済み）
function updateMinimap() {
    const ctx = document.getElementById('minimap-canvas').getContext('2d');
    ctx.clearRect(0,0,130,130);
    // レーダー背景
    ctx.beginPath();
    ctx.arc(65, 65, 65, 0, Math.PI*2);
    ctx.fillStyle = isDay ? '#3d5c21' : '#111';
    ctx.fill();

    // BOT描画
    ctx.fillStyle = 'red';
    bots.forEach(b => {
        // 自機中心の相対座標を計算
        const dx = (b.position.x - playerRig.position.x) * 0.4;
        const dz = (b.position.z - playerRig.position.z) * 0.4;
        
        // 回転させてミニマップに投影（上が常にプレイヤーの向いている方向になるようにする場合）
        // 今回は単純化のため、北を上とした固定マップ
        const drawX = dx + 65;
        const drawZ = dz + 65;
        
        // 円の中に収まる場合のみ描画
        if(Math.sqrt(dx*dx + dz*dz) < 60) {
            ctx.beginPath();
            ctx.arc(drawX, drawZ, 3, 0, Math.PI*2);
            ctx.fill();
        }
    });
    
    // プレイヤーの向きを回転
    const playerDot = document.getElementById('minimap-player');
    playerDot.style.transform = `translate(-50%, -50%) rotate(${-yaw}rad)`;
}

/**
 * --- GAME START ---
 */
document.getElementById('btn-deploy').onclick = () => {
    isDay = document.getElementById('time-select').value === 'day';
    createWorld(isDay ? 'day' : 'night');
    for(let i=0; i<12; i++) spawnBot();
    
    if(!isDay) document.getElementById('btn-nvg').style.display = 'flex';
    
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('game-hud').style.display = 'block';
    isPlaying = true;
    update();
};
</script>
