<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tactical Warzone V7.0</title>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    :root { --wb-dark: rgba(20, 20, 20, 0.85); --wb-border: 2px solid #aaa; --primary: #00ffcc; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Share Tech Mono', monospace; user-select: none; }
    #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    /* War Brokers Style UI */
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
    
    #top-hud { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: var(--wb-dark); border: var(--wb-border); padding: 5px 20px; border-radius: 5px; color: white; font-size: 1.2rem; text-shadow: 1px 1px 0 #000; align-items: center;}
            
    #health-hud { position: absolute; bottom: 20px; left: 20px; background: var(--wb-dark); border: var(--wb-border); padding: 10px; border-radius: 5px; width: 200px; color: white; }
    .hp-bar-bg { width: 100%; height: 15px; background: #333; margin-top: 5px; border: 1px solid #777; }
    #hp-bar-fill { width: 100%; height: 100%; background: #00ff00; transition: width 0.2s, background 0.2s; }
    
    #ammo-hud { position: absolute; bottom: 20px; right: 20px; background: var(--wb-dark); border: var(--wb-border); padding: 10px 20px; border-radius: 5px; color: white; text-align: right; }
    #ammo-count { font-size: 2rem; font-weight: bold; }
    #weapon-name { font-size: 0.9rem; color: #aaa; }
    
    #custom-hud-left { position:absolute; bottom:20px; left:10px; font-family:"Share Tech Mono"; font-size:1.2rem; color:white; }
    #custom-hud-right { position:absolute; bottom:10px; right:10px; font-family:"Share Tech Mono"; font-size:1.2rem; color:white; }
    
    #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; pointer-events: auto; }
    .slot { width: 50px; height: 50px; background: var(--wb-dark); border: var(--wb-border); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; opacity: 0.6; transition: 0.1s; }
    .slot.active { opacity: 1; border-color: var(--primary); background: rgba(0, 50, 50, 0.9); box-shadow: 0 0 10px var(--primary); transform: translateY(-5px); }
    .slot span { font-size: 1.2rem; }
    
    /* Minimap */
    #minimap-container { position: absolute; top: 10px; left: 10px; width: 120px; height: 120px; border: var(--wb-border); background: var(--wb-dark); pointer-events: auto; transition: all 0.2s; }
    #minimap-container.full-map { top: 10%; left: 10%; width: 80%; height: 80%; }
    #minimap-canvas { width: 100%; height: 100%; }
    
    /* Crosshair & Hitmarker */
    #crosshair-container{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:40px; height:40px; }
    .ch{ position:absolute; background:white; box-shadow:0 0 3px #000; }
    #ch-dot{ position:absolute; top:50%; left:50%; width:4px; height:4px; background:white; border-radius:50%; transform:translate(-50%,-50%); box-shadow:0 0 0 1px black; }
    #ch-top{width:2px;height:10px;left:50%;transform:translateX(-50%);top:0;}
    #ch-bottom{width:2px;height:10px;left:50%;transform:translateX(-50%);bottom:0;}
    #ch-left{height:2px;width:10px;top:50%;transform:translateY(-50%);left:0;}
    #ch-right{height:2px;width:10px;top:50%;transform:translateY(-50%);right:0;}
    
    #hit-marker { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); display: none; }
    .hm-line { position: absolute; top: 50%; left: 50%; width: 24px; height: 2px; background: #fff; box-shadow: 0 0 2px #000; }
    .hm-line:nth-child(1) { transform: translate(-50%, -50%) rotate(45deg); }
    .hm-line:nth-child(2) { transform: translate(-50%, -50%) rotate(-45deg); }
    
    /* Controls */
    .controls { position: absolute; bottom: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
    .btn { pointer-events: auto; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 5px; color: #fff; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); font-family: 'Share Tech Mono'; }
    .btn:active { background: rgba(255,255,255,0.4); }
    
    #btn-shoot { position: absolute; bottom: 100px; right: 40px; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,50,50,0.2); border-color: #ff3333; font-size: 1.2rem; }
    #btn-ads { position: absolute; bottom: 210px; right: 40px; width: 60px; height: 60px; border-radius: 50%; }
    #btn-jump { position: absolute; bottom: 100px; right: 150px; width: 60px; height: 60px; border-radius: 50%; }
    #btn-reload { position: absolute; bottom: 210px; right: 120px; width: 50px; height: 50px; border-radius: 50%; }
    
    #joystick-base { position: absolute; bottom: 80px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; border: var(--wb-border); }
    #joystick-handle { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
    
    /* NVG & Utility */
    #nvg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; display: none; }
    .nvg-green { background: rgba(0, 255, 50, 0.1); backdrop-filter: brightness(15) contrast(1.5) sepia(1) hue-rotate(70deg); box-shadow: inset 0 0 150px rgba(0,25,0,0.8); }
    .nvg-mono { background: rgba(255, 255, 255, 0.05); backdrop-filter: grayscale(1) brightness(14) contrast(1.2); }
    .nvg-thermal { background: rgba(0, 0, 50, 0.1); backdrop-filter: brightness(1.2) contrast(1.5); }
    
    #btn-nvg { position: absolute; top: 60px; right: 20px; width: 70px; height: 35px; font-size: 0.8rem; display: none; pointer-events: auto;}
    #btn-exit { position: absolute; top: 10px; right: 20px; width: 60px; height: 30px; background: #ff3333; color: white; border: none; font-weight: bold; pointer-events: auto; display: none; border-radius: 3px; cursor: pointer;}
    
    .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 100; color: #fff; }
    select, button { font-family: 'Share Tech Mono'; padding: 10px; background: #333; color: #fff; border: 1px solid #777; margin: 5px; font-size: 1.1rem; }
    button:hover { background: var(--primary); color: #000; cursor: pointer; }
    
    #reddot{ position:absolute; top:50%; left:50%; width:6px; height:6px; background:#ff2a2a; border-radius:50%; transform:translate(-50%,-50%); box-shadow: 0 0 4px #ff0000, 0 0 8px #ff0000, 0 0 12px #ff0000; display:none; }
    #reddot::after{ content:""; position:absolute; width:20px; height:20px; border:1px solid rgba(255,0,0,0.4); border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); }
  </style>
</head>

<body>
  <canvas id="game-canvas">
  </canvas>
  <div id="game-hud" class="overlay">
    <div id="nvg-overlay">
    </div>
    <button id="btn-exit" onclick="location.reload()">EXIT</button>
    <div id="top-hud">
      <div>TIME:
        <span id="timer">05:00</span>
      </div>
      <div style="color:#ffcc00;">SCORE:
        <span id="score">0</span>
      </div>
      <div style="color:#ff5555;">ENEMIES:
        <span id="enemy-count">10</span>
      </div>
    </div>
    <div id="crosshair-container">
      <div id="reddot">
      </div>
      <div id="ch-top" class="ch">
      </div>
      <div id="ch-bottom" class="ch">
      </div>
      <div id="ch-left" class="ch">
      </div>
      <div id="ch-right" class="ch">
      </div>
      <div id="ch-dot">
      </div>
    </div>
    <div id="hit-marker">
      <div class="hm-line">
      </div>
      <div class="hm-line">
      </div>
    </div>
    <div id="minimap-container">
      <canvas id="minimap-canvas">
      </canvas>
    </div>
    <div id="btn-nvg" class="btn">NVG:OFF</div>
    <div id="health-hud">HP:
      <span id="hp-text">100</span>
      <div class="hp-bar-bg">
        <div id="hp-bar-fill">
        </div>
      </div>
    </div>
    <div id="ammo-hud">
      <div id="ammo-count">30/180</div>
      <div id="weapon-name">M4A1 ASSAULT</div>
    </div>
    <div id="custom-hud-left">
      <div>ミッション進行中</div>
      <div>残り時間：--:--</div>
      <div>弾薬：-- / --</div>
    </div>
    <div id="custom-hud-right">
      <div>距離：-- m</div>
      <div>方位：-- °</div>
    </div>
    <div id="hotbar">
      <div class="slot active" data-slot="0">1
        <span>AR</span>
      </div>
      <div class="slot" data-slot="1">2
        <span>MP7</span>
      </div>
      <div class="slot" data-slot="2">3
        <span>AWM</span>
      </div>
      <div class="slot" data-slot="3">4
        <span>G17</span>
      </div>
      <div class="slot" data-slot="4">5
        <span>REV</span>
      </div>
      <div class="slot" data-slot="5">6
        <span>🔪</span>
      </div>
      <div class="slot" data-slot="6">7
        <span>💣</span>
      </div>
    </div>
    <div class="controls">
      <div id="btn-shoot" class="btn">FIRE</div>
      <div id="btn-ads" class="btn">ADS</div>
      <div id="btn-jump" class="btn">JMP</div>
      <div id="btn-reload" class="btn">RLD</div>
      <div id="joystick-base">
        <div id="joystick-handle">
        </div>
      </div>
    </div>
  </div>
  <div id="title-screen" class="screen">
    <h1 style="color:var(--primary); font-size:3rem; margin-bottom:10px;">TACTICAL WARZONE V7.0</h1>
    <p style="margin-bottom: 30px; color:#aaa;">"WAR BROKERS" EDITION</p>
    <div style="background: rgba(0,0,0,0.5); padding: 20px; border: var(--wb-border); text-align: right;">
      <label>TIME OF DAY:
        <select id="sel-time">
          <option value="day">DAY</option>
          <option value="night">NIGHT</option>
        </select>
      </label>
      <br>
      <label>ENEMIES:
        <select id="sel-enemies">
          <option value="0">0 (EXPLORE)</option>
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
          <option value="999">ENDLESS</option>
        </select>
      </label>
    </div>
    <button id="btn-deploy" style="margin-top:30px; font-size: 1.5rem; padding: 15px 40px; background:var(--primary); color:#000; border-radius: 5px;">DEPLOY TO COMBAT</button>
  </div>
  <div id="death-screen" class="screen" style="display: none; background: rgba(80,0,0,0.9);">
    <h1 style="color:#ff3333; font-size:4rem;">K.I.A.</h1>
    <button onclick="location.reload()">RETURN TO BASE</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  /** --- CORE --- */
    const scene = new THREE.Scene();
    const crosshair = document.getElementById("crosshair-container");
    const reddot_div = document.getElementById("reddot");
     
    const cameraFOV = { current: 75, target: 75 }; 
    const camera = new THREE.PerspectiveCamera(cameraFOV.current, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    
    const playerRig = new THREE.Object3D(); scene.add(playerRig);
    playerRig.add(camera); playerRig.position.set(0, 1.7, 0);
    
    let isPlaying = false, isDay = true, gameTime = 300;
    let score = 0, enemiesRemaining = 10, totalSpawns = 10, isEndless = false;
    let playerHP = 100;
    const envObjs = []; const hittableTargets = []; const mapBuildings = []; const bots = [];
  
    /** --- MATERIALS & COLORS (For Thermal Support) --- */
    /** --- MATERIALS & COLORS (For Thermal Support) --- */
  const colors = {
      groundDay: 0x4d5c31, groundNight: 0x111111, groundThermal: 0x000022,
      wallDay: 0x888888, wallNight: 0x222222, wallThermal: 0x000033,
      botSkin: 0xffccaa, botBody: 0x333333, botThermal: 0xff3300
  };
  
  /** --- TEXTURES --- */
  const texLoader = new THREE.TextureLoader();
  
  // 地面用テクスチャ（例としてThree.js公式の芝生テクスチャを使用）
  const groundTex = texLoader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
  groundTex.wrapS = THREE.RepeatWrapping;
  groundTex.wrapT = THREE.RepeatWrapping;
  groundTex.repeat.set(40, 40); // 500x500の広大な地面に合わせてリピート
  
  // 壁用テクスチャ（例としてThree.js公式のレンガテクスチャを使用）
  const wallTex = texLoader.load('https://threejs.org/examples/textures/brick_diffuse.jpg');
  wallTex.wrapS = THREE.RepeatWrapping;
  wallTex.wrapT = THREE.RepeatWrapping;
  wallTex.repeat.set(2, 2); // 建築物のサイズに合わせてリ
  
    function createWorld(mode) {
        let gColor = mode==='day' ? colors.groundDay : colors.groundNight;
        if(mode==='day') {
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 250);
            const l = new THREE.DirectionalLight(0xffffff, 1.0); l.position.set(100, 200, 100); l.castShadow=true; scene.add(l);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        } else {
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.Fog(0x020205, 10, 100);
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));
        }
    
  const groundMat = new THREE.MeshStandardMaterial({ 
      color: gColor, // 昼夜のベースカラーをブレンド
      map: groundTex, 
      roughness: 0.9, // リアルな地面の反射を抑える
      metalness: 0.0 
  });
  // --- 地面の生成（セグメントを100x100に分割して起伏を作る） ---
        const groundGeo = new THREE.PlaneGeometry(500, 500, 100, 100);
        const posAttr = groundGeo.attributes.position;
        
        // 頂点をループして高低差をつける（サイン・コサイン波による簡便な地形生成）
        for (let i = 0; i < posAttr.count; i++) {
            const vx = posAttr.getX(i);
            const vy = posAttr.getY(i); // PlaneGeometryは初期状態ではXY平面
            // 地形の高さを計算（波を組み合わせて自然な丘を作る）
            const elevation = Math.sin(vx * 0.04) * Math.cos(vy * 0.04) * 4 + Math.sin(vx * 0.015) * 6;
            posAttr.setZ(i, elevation); // Z軸を隆起させる（後でX軸回転させるためこれが高さになる）
        }
        groundGeo.computeVertexNormals(); // 起伏に応じた光の反射を計算
  
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: gColor, map: typeof groundTex !== 'undefined' ? groundTex : null, 
            roughness: 0.9, metalness: 0.0 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
        ground.userData = { isEnv: true, isGround: true, origColor: gColor, thermalColor: colors.groundThermal };
        scene.add(ground); envObjs.push(ground);
  
        // --- 建物の生成（起伏に合わせて高さを調整） ---
        for(let i=0; i<25; i++) {
            const x = (Math.random()-0.5)*300, z = (Math.random()-0.5)*300;
            const h = 4 + Math.random()*6;
            // 建物がある位置の地形の高さを再計算
            const groundY = Math.sin(x * 0.04) * Math.cos(-z * 0.04) * 4 + Math.sin(x * 0.015) * 6;
            
            const mat = new THREE.MeshStandardMaterial({
                color: mode==='day' ? colors.wallDay : colors.wallNight,
                map: typeof wallTex !== 'undefined' ? wallTex : null
            });
            const box = new THREE.Mesh(new THREE.BoxGeometry(8, h, 8), mat);
            // 地面の高さに建物の半分を足してめり込まないようにする
            box.position.set(x, groundY + h/2, z); 
            box.castShadow = true; box.receiveShadow = true;
            box.userData = { isEnv: true, origColor: mat.color.getHex(), thermalColor: colors.wallThermal };
            scene.add(box); envObjs.push(box); mapBuildings.push({x, z, w:8, h:8});
        }
        
    }
    
    function spawnBot() {
        if(!isEndless && totalSpawns <= 0) return;
        if(bots.length >= 10) return;
        const g = new THREE.Group();
        const skinMat = new THREE.MeshStandardMaterial({color: colors.botSkin});
        const bodyMat = new THREE.MeshStandardMaterial({color: colors.botBody});
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), skinMat); head.position.y = 1.6;
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.3), bodyMat); body.position.y = 1.0;
        const ll = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), bodyMat); ll.position.set(-0.2, 0.3, 0);
        const lr = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), bodyMat); lr.position.set(0.2, 0.3, 0);
        [head, body, ll, lr].forEach(p => {
            p.userData = { botGroup: g, isHead: p===head, isBot: true, origColor: p.material.color.getHex(), thermalColor: colors.botThermal };
            hittableTargets.push(p); g.add(p);
        });
        g.position.set((Math.random()-0.5)*150, 0, (Math.random()-0.5)*150);
        g.hp = 100; g.lastShot = Date.now() + 2000;
        bots.push(g); scene.add(g);
        if(!isEndless) totalSpawns--;
    }
    
    /** --- WEAPONS SYSTEM --- *//** --- WEAPONS SYSTEM --- */
    const weapons = [
        { type:'ar', name:"CUSTOM AR15", mag:30, cur:30, res:120, rate:140, dmg:18, range:200, reload:2000, zoomFOV: 40 },
        { type:'smg', name:"MP7 SMG", mag:40, cur:40, res:160, rate:60, dmg:12, range:150, reload:1500, zoomFOV: 45 },
        // AWMは3倍スコープなので FOVを25に設定
        { type:'sr', name:"AWM SNIPER", mag:5, cur:5, res:20, rate:1200, dmg:120, range:600, reload:3000, zoomFOV: 25 },
        { type:'hg', name:"G17 PISTOL", mag:15, cur:15, res:60, rate:250, dmg:20, range:100, reload:1200, zoomFOV: 45 },
        { type:'hg', name:".357 PYTHON REVOLVER", mag:6, cur:6, res:30, rate:500, dmg:65, range:150, reload:2500, zoomFOV: 40 },
        { type:'melee', name:"COMBAT KNIFE", mag:'-', cur:'-', res:'-', rate:400, dmg:50, range:2, reload:0, zoomFOV: 75 },
        { type:'nade', name:"M67 FRAG", mag:1, cur:1, res:4, rate:1000, dmg:150, range:0, reload:500, zoomFOV: 75 }
    ];
    let curWepIdx = 0; let isADS = false, isReloading = false, reloadStart = 0;
    
    const weaponGroups = [];
    const gunMat = new THREE.MeshStandardMaterial({color: 0x222222, metalness: 0.8});
    const gunAccMat = new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.9});
  
    // 1. M4A1 ASSAULT RIFLE
    const arGroup = new THREE.Group();
    arGroup.scale.set(1.0, 1.0, 1.0);
    const arGroupParts = new THREE.Group();
    const upperRec = new THREE.Mesh(new THREE.BoxGeometry(0.038, 0.045, 0.20), gunMat); upperRec.position.set(0, 0.08, 0);
    const lowerRec = new THREE.Mesh(new THREE.BoxGeometry(0.036, 0.035, 0.12), gunMat); lowerRec.position.set(0, 0.04, 0.02);
    const magWell = new THREE.Mesh(new THREE.BoxGeometry(0.042, 0.06, 0.06), gunMat); magWell.position.set(0, 0.02, -0.05);
    const mag1 = new THREE.Mesh(new THREE.BoxGeometry(0.035, 0.08, 0.055), gunAccMat); mag1.position.set(0, -0.05, -0.05);
    const mag2 = new THREE.Mesh(new THREE.BoxGeometry(0.035, 0.06, 0.055), gunAccMat); mag2.position.set(0, -0.10, -0.04); mag2.rotation.x = -0.15;
    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.032, 0.09, 0.045), gunAccMat); grip.position.set(0, -0.01, 0.06); grip.rotation.x = -0.25;
    const bufferTube = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.15), gunMat); bufferTube.rotation.x = Math.PI / 2; bufferTube.position.set(0, 0.075, 0.16);
    const stock = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.11, 0.12), gunAccMat); stock.position.set(0, 0.05, 0.22);
    const handguard = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.045, 0.22), gunAccMat); handguard.position.set(0, 0.08, -0.21);
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.4), gunMat); barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0.08, -0.2);
    const fsb = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.05, 0.03), gunMat); fsb.position.set(0, 0.11, -0.32); fsb.name = "frontSight"; 
    const flashHider = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.04), gunMat); flashHider.rotation.x = Math.PI / 2; flashHider.position.set(0, 0.08, -0.42);
    const outerPoints = [];
    for ( let i = 0; i <= 6; i ++ ) { const angle = i / 6 * Math.PI * 2; outerPoints.push( new THREE.Vector2( Math.cos(angle)*0.035, Math.sin(angle)*0.035 ) ); }
    const housingShape = new THREE.Shape(outerPoints);
    const holePath = new THREE.Path(); const innerPoints = [];
    for ( let i = 0; i <= 6; i ++ ) { const angle = i / 6 * Math.PI * 2; innerPoints.push( new THREE.Vector2( Math.cos(angle)*0.030, Math.sin(angle)*0.030 ) ); }
    holePath.setFromPoints(innerPoints); housingShape.holes.push(holePath);

    function tryShoot() {
        const w = weapons[curWepIdx];
        if(isReloading || w.cur <= 0 || w.type === 'nade') {
            if(w.cur<=0 && w.type!=='melee') startReload();
            return;
        }
        const now = Date.now();
        if(now - (w.lastF || 0) < w.rate) return;
        w.lastF = now;
        if(w.type !== 'melee') w.cur--; updateHUD();
    
        const curGrp = weaponGroups[curWepIdx]; curGrp.position.z += 0.05;
        recoil += isADS ? 0.0002 : 0.0005;
        const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
        const startPos = camera.getWorldPosition(new THREE.Vector3());
        const muzzlePos = weaponGroups[curWepIdx].localToWorld(new THREE.Vector3(0,0,-0.5));
    
        if(w.type === 'ar' || w.type === 'hg' || w.type === 'smg' || w.type === 'sr') {
            flashMuzzle(true);
            
            if(w.type !== 'sr' || w.cur > 0) {
                const ejectPos = weaponGroups[curWepIdx].localToWorld(new THREE.Vector3(0.03, 0.03, -0.05));
                spawnShell(ejectPos);
            }
  
            const ray = new THREE.Raycaster(startPos, dir, 0, w.range);
            const allHits = ray.intersectObjects([...hittableTargets, ...envObjs], false);
            let endPos = startPos.clone().add(dir.multiplyScalar(50));
            
            if(allHits.length > 0) {
                const hit = allHits[0];
                endPos = hit.point;
                const obj = hit.object;
                if(obj.userData && obj.userData.isBot) {
                    const bGrp = obj.userData.botGroup;
                    const dmgMult = obj.userData.isHead ? 2.5 : 1.0;
                    bGrp.hp -= w.dmg * dmgMult;
                    spawnBlood(hit.point);
                    showHitMarker(obj.userData.isHead ? '#ffaa00' : '#ffffff');
                    if(bGrp.hp <= 0) killBot(bGrp);
                }
            }
            spawnTracer(muzzlePos, endPos, 0xffffaa);
        } else if (w.type === 'melee') {
            curGrp.rotation.x -= 0.5;
            const ray = new THREE.Raycaster(startPos, dir, 0, w.range);
            const hits = ray.intersectObjects(hittableTargets, false);
            if(hits.length > 0) {
                const bGrp = hits[0].object.userData.botGroup;
                bGrp.hp -= w.dmg; spawnBlood(hits[0].point); showHitMarker('#ffffff');
                if(bGrp.hp <= 0) killBot(bGrp);
            }
        }
    }

        ov.className = ''; ov.style.display='block'; applyThermal(false);
        if(nvgModes[curNvg]==='OFF') ov.style.display='none';
        else if(nvgModes[curNvg]==='GREEN') ov.classList.add('nvg-green');
        else if(nvgModes[curNvg]==='MONO') ov.classList.add('nvg-mono');
        else if(nvgModes[curNvg]==='THERMAL') { ov.classList.add('nvg-thermal'); applyThermal(true); }
        document.getElementById('btn-nvg').innerText = 'NVG:'+nvgModes[curNvg];
    };
  
    /** --- GAME LOOP --- */
    function update() {
      if (isADS) {
          crosshair.style.display = "none";
      } else {
          crosshair.style.display = "block";
      }
  
        const spread = moveCtrl.id ? 10 : 4;
        document.getElementById("ch-top").style.top = -spread+"px";
        document.getElementById("ch-bottom").style.bottom = -spread+"px";
        document.getElementById("ch-left").style.left = -spread+"px";
        document.getElementById("ch-right").style.right = -spread+"px";
        
        if(!isPlaying) return; requestAnimationFrame(update);
        if(recoil > 0){
            pitch += recoil;
            recoil *= 0.9;
        }
    
        playerRig.rotation.y = yaw;
        camera.rotation.x = pitch;
        if(moveCtrl.id) {
            const speed = isADS ? 0.08 : 0.15;
            const mv = new THREE.Vector3(moveCtrl.dx,0,moveCtrl.dy).normalize().multiplyScalar(speed).applyAxisAngle(new THREE.Vector3(0,1,0),yaw);
            const ray = new THREE.Raycaster(playerRig.position.clone().setY(1), mv.clone().normalize(), 0, speed+0.5);
            if(ray.intersectObjects(envObjs).length === 0) {
                playerRig.position.add(mv);
                playerRig.position.x = Math.max(-240, Math.min(240, playerRig.position.x));
                playerRig.position.z = Math.max(-240, Math.min(240, playerRig.position.z));
            }
        }
        
        // --- 地形に沿ったプレイヤーの高さ制御 ---
        // プレイヤーの頭上から真下へレイを飛ばし、地面の高さを検知
        const downRay = new THREE.Raycaster(new THREE.Vector3(playerRig.position.x, playerRig.position.y + 10, playerRig.position.z), new THREE.Vector3(0, -1, 0));
        // envObjs[0] は先ほど生成した ground
        const groundHits = downRay.intersectObject(envObjs[0]); 
        let targetY = 1.7; // デフォルトの高さ
        
        if (groundHits.length > 0) {
            targetY = groundHits[0].point.y + 1.7; // 地面の高さ + プレイヤーの身長(1.7)
        }
  
        if(!isGrounded) { 
            vy -= 0.01; // 重力
            playerRig.position.y += vy; 
            if(playerRig.position.y <= targetY) {
                playerRig.position.y = targetY; 
                vy = 0; 
                isGrounded = true;
            } 
        } else {
            // 接地中も坂道に沿ってスムーズに上下する（階段状のガタつきを防ぐlerp）
            playerRig.position.y += (targetY - playerRig.position.y) * 0.3;
        }
    
        // フルオート処理（AR, SMG）
        if(isHoldingFire && (weapons[curWepIdx].type === 'ar' || weapons[curWepIdx].type === 'smg')) tryShoot();
        
        cameraFOV.current += (cameraFOV.target - cameraFOV.current)*0.2; camera.fov = cameraFOV.current; camera.updateProjectionMatrix();
        
        const grp = weaponGroups[curWepIdx];
        if(isReloading) {
            grp.rotation.x = Math.sin((Date.now()-reloadStart)/weapons[curWepIdx].reload * Math.PI*2)*0.5;
        } else {
            grp.rotation.x *= 0.8;
            if(weapons[curWepIdx].type === 'melee' && grp.rotation.x < 0) grp.rotation.x += 0.05;
            const tp = isADS ? grp.adsPos : grp.idlePos;
            grp.position.lerp(tp, 0.2);
            
            const fsb = grp.getObjectByName("frontSight");
            const crosshairEl = document.getElementById('crosshair');
            
            if ( isADS ) {
                if (fsb) fsb.visible = false;
                if (crosshairEl) { crosshairEl.style.display = 'none'; crosshairEl.style.opacity = "0"; crosshairEl.style.visibility = "hidden"; }
                const swayX = Math.sin(Date.now() * 0.002) * 0.002;
                const swayY = Math.cos(Date.now() * 0.002) * 0.002;
                if(grp.children[0]) { grp.children[0].position.x = swayX; grp.children[0].position.y = swayY; }
                const compassDeg = Math.round(( yaw * ( 180 / Math.PI ) ) % 360 + 360 ) % 360;
                document.getElementById('custom-hud-right').children[1].innerText = `方位：${compassDeg.toString().padStart(3,'0')} °`;
            } else {
                if (fsb) fsb.visible = true;
                if (crosshairEl) { crosshairEl.style.display = 'block'; crosshairEl.style.opacity = "1"; crosshairEl.style.visibility = "visible"; }
                if(grp.children[0]) { grp.children[0].position.x = 0; grp.children[0].position.y = 0; }
            }
        }
    
        if(weapons[curWepIdx].type === 'nade' && isHoldingFire && holdStartTime > 0) {
            const pts = [];
            let p = camera.getWorldPosition(new THREE.Vector3());
            let v = camera.getWorldDirection(new THREE.Vector3()); v.y+=0.2; v.normalize().multiplyScalar(0.4);
            let hitPos = null;
            for(let i=0; i<40; i++) {
                pts.push(p.clone());
                const r = new THREE.Raycaster(p, v.clone().normalize(), 0, v.length());
                const hits = r.intersectObjects(envObjs);
                if(hits.length>0) { hitPos = hits[0].point; pts.push(hitPos); break; }
                v.y -= 0.01; p.add(v);
                if(p.y<=0.1) { p.y=0.1; hitPos = p.clone(); pts.push(p); break; }
            }
            trajGeo.setFromPoints(pts);
            trajLine.computeLineDistances();
            if(hitPos) impactSphere.position.copy(hitPos);
        }
    
        for(let i=activeNades.length-1; i>=0; i--) {
            const n = activeNades[i];
            n.vel.y -= 0.01;
            const r = new THREE.Raycaster(n.position, n.vel.clone().normalize(), 0, n.vel.length());
            const hits = r.intersectObjects(envObjs);
            if(hits.length>0) {
                const norm = hits[0].face.normal;
                n.vel.reflect(norm).multiplyScalar(0.5);
                n.position.copy(hits[0].point).add(norm.clone().multiplyScalar(0.05));
            } else {
                n.position.add(n.vel);
            }
            if(n.position.y<=0.1) { n.position.y=0.1; n.vel.y*=-0.5; n.vel.x*=0.8; n.vel.z*=0.8; }
            n.fuse -= 16;
            if(n.fuse<=0) { explodeAt(n.position); scene.remove(n); activeNades.splice(i,1); }
        }
  
        // 排莢の物理演算
        for(let i=shells.length-1; i>=0; i--) {
            const s = shells[i];
            s.position.add(s.velocity);
            s.velocity.y -= 0.005; 
            s.rotation.x += s.rotSpeed.x;
            s.rotation.y += s.rotSpeed.y;
            s.rotation.z += s.rotSpeed.z;
            s.life--;
            if(s.life <= 0) { scene.remove(s); shells.splice(i,1); }
        }
    
        for(let i=tracers.length-1; i>=0; i--) {
            const t=tracers[i];
            t.position.add(new THREE.Vector3().subVectors(t.userData.end, t.position).normalize().multiplyScalar(t.userData.speed));
            t.userData.life--; if(t.userData.life<=0){scene.remove(t); tracers.splice(i,1);}
        }
        for(let i=particles.length-1; i>=0; i--) {
            const p=particles[i];
            p.position.add(p.velocity); p.velocity.y-=0.01;
            p.life--; if(p.life<=0){scene.remove(p); particles.splice(i,1);}
        }
    
        const now = Date.now();
        bots.forEach(b => {
            // ボットの地形追従
            const botDownRay = new THREE.Raycaster(new THREE.Vector3(b.position.x, b.position.y + 10, b.position.z), new THREE.Vector3(0, -1, 0));
            const bHits = botDownRay.intersectObject(envObjs[0]);
            if(bHits.length > 0) {
                b.position.y = bHits[0].point.y; // ボットを地面の高さにスナップ
            }
  
            b.lookAt(playerRig.position.x, b.position.y, playerRig.position.z);
            const dist = b.position.distanceTo(playerRig.position);
            if(dist > 15) { b.translateZ(0.04); }
            else if(now - b.lastShot > 1500) {
                b.lastShot = now;
                if(Math.random()<0.4) {
                    const shootY = b.position.y+1.0;
                    flashMuzzle(false, new THREE.Vector3(b.position.x, shootY, b.position.z));
                    const start = new THREE.Vector3(b.position.x, shootY, b.position.z);
                    const end = playerRig.position.clone().add(new THREE.Vector3((Math.random()-0.5)*2,(Math.random()-0.5)*2,(Math.random()-0.5)*2));
                    spawnTracer(start, end, 0xff0000);
                    if(Math.random()<0.5) {
                        playerHP -= 10; updateHP();
                        document.getElementById('game-hud').style.background = 'rgba(255,0,0,0.3)';
                        setTimeout(()=>document.getElementById('game-hud').style.background = 'none', 100);
                    }
                }
            }
            if ( bots.length > 0 ) {
                 const minBotsDist = Math.min(...bots.map(b => b.position.distanceTo(playerRig.position)));
                 document.getElementById('custom-hud-right').children[0].innerText = `距離：${minBotsDist.toFixed(1)} m`;
            }
        });
  
        if(!isEndless) {
            gameTime -= 1/60;
            if(gameTime<=0) { alert("TIME UP!"); location.reload(); }
            document.getElementById('timer').innerText = `${Math.floor(gameTime/60).toString().padStart(2,'0')}:${Math.floor(gameTime%60).toString().padStart(2,'0')}`;
        } else {
            document.getElementById('timer').innerText = "ENDLESS";
        }
        drawMinimap();
        
        renderer.render(scene, camera);
    }
    
    function drawMinimap() {
        const cvs = document.getElementById('minimap-canvas');
        const ctx = cvs.getContext('2d');
        const s = document.getElementById('minimap-container').clientWidth; cvs.width=s; cvs.height=s;
        const c = s/2; const scale = isFullMap ? s/400 : s/100;
        ctx.fillStyle = isDay ? '#334422' : '#111'; ctx.fillRect(0,0,s,s);
        
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        envObjs.forEach(e => {
            if(!e.geometry.parameters.width) return;
            const dx = (e.position.x - playerRig.position.x)*scale; const dz = (e.position.z - playerRig.position.z)*scale;
            const w = e.geometry.parameters.width*scale, h = e.geometry.parameters.depth*scale;
            ctx.fillRect(c+dx-w/2, c+dz-h/2, w, h);
        });
        ctx.fillStyle = '#f00';
        bots.forEach(b => {
            const dx=(b.position.x-playerRig.position.x)*scale, dz=(b.position.z-playerRig.position.z)*scale;
            ctx.beginPath(); ctx.arc(c+dx, c+dz, 2, 0, Math.PI*2); ctx.fill();
        });
        ctx.translate(c, c); ctx.rotate(-yaw);
        ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.moveTo(0,-5); ctx.lineTo(4,4); ctx.lineTo(-4,4); ctx.fill();
        ctx.resetTransform();
    }
    
    /** --- SETUP --- */
    document.getElementById('btn-deploy').onclick = () => {
      console.log("Deploy button clicked");
        isDay = document.getElementById('sel-time').value === 'day';
        const ec = parseInt(document.getElementById('sel-enemies').value);
        
        if(ec === 0 || ec === 999) {
            document.getElementById('btn-exit').style.display = 'block';
            isEndless = (ec === 999);
            enemiesRemaining = isEndless ? "∞" : 0;
            totalSpawns = isEndless ? 999 : 0;
        } else {
            enemiesRemaining = ec; totalSpawns = ec;
        }
        document.getElementById('enemy-count').innerText = enemiesRemaining;
    
        createWorld(isDay ? 'day' : 'night');
        for(let i=0; i<(isEndless?10:Math.min(10, totalSpawns)); i++) spawnBot();
        if(!isDay) document.getElementById('btn-nvg').style.display = 'block';
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('game-hud').style.display = 'block';
        isPlaying = true; updateHUD(); update();
    };
  </script>
