<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Warzone V4</title>
    <style>
        :root { --primary: #00ff00; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); touch-action: none; font-family: 'Arial', sans-serif; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* HUD */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; }
        #hit-marker { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; transform: translate(-50%, -50%); display: none; }
        #hit-marker::before, #hit-marker::after { content: ''; position: absolute; top: 50%; left: 50%; width: 30px; height: 2px; background: white; }
        #hit-marker::before { transform: translate(-50%, -50%) rotate(45deg); }
        #hit-marker::after { transform: translate(-50%, -50%) rotate(-45deg); }

        #timer { position: absolute; top: 20px; left: 20px; font-size: 2rem; color: #fff; font-weight: bold; text-shadow: 2px 2px #000; }
        
        /* ミニマップ (円形) */
        #minimap-container { position: absolute; top: 20px; right: 20px; width: 150px; height: 150px; border: 3px solid #444; border-radius: 50%; overflow: hidden; background: rgba(0,0,0,0.5); pointer-events: auto; }
        #minimap-player { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: #00f; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; }
        #minimap-canvas { width: 100%; height: 100%; }

        /* ナイトビジョン・オーバーレイ */
        #nvg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; pointer-events: none; z-index: 5; }
        .nvg-green { background: rgba(0, 255, 0, 0.15); box-shadow: inset 0 0 100px rgba(0,0,0,0.8); backdrop-filter: brightness(1.5) contrast(1.2) sepia(1) hue-rotate(80deg); }
        .nvg-gray { background: rgba(255, 255, 255, 0.05); backdrop-filter: grayscale(1) brightness(1.2); }
        .nvg-thermal { background: rgba(0, 0, 100, 0.1); backdrop-filter: invert(0.8) hue-rotate(180deg) brightness(1.2); }

        /* 操作パネル */
        .controls { position: absolute; bottom: 0; width: 100%; height: 100%; pointer-events: none; }
        .btn { pointer-events: auto; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #btn-shoot { position: absolute; bottom: 100px; right: 100px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,0,0,0.2); border: 3px solid #f00; }
        #btn-jump { position: absolute; bottom: 100px; right: 240px; width: 70px; height: 70px; border-radius: 50%; }
        #btn-nvg { position: absolute; top: 180px; right: 20px; width: 60px; height: 60px; font-size: 0.7rem; }
        #btn-reload { position: absolute; bottom: 240px; right: 60px; width: 70px; height: 70px; }
        
        /* 武器情報 */
        #weapon-hud { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; }

        #joystick-base { position: absolute; bottom: 80px; left: 80px; width: 150px; height: 150px; background: rgba(255,255,255,0.05); border-radius: 50%; display: none; border: 1px solid #444; }
        #joystick-handle { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; background: rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%); }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; color: #fff; pointer-events: auto; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="game-hud" class="overlay" style="display:none;">
        <div id="nvg-overlay"></div>
        <div id="crosshair"></div>
        <div id="hit-marker"></div>
        <div id="timer">05:00</div>
        
        <div id="minimap-container"><div id="minimap-player"></div><canvas id="minimap-canvas" width="150" height="150"></canvas></div>

        <div id="weapon-hud">
            <h2 id="weapon-name" style="margin:0; font-size:1.2rem;">MP5</h2>
            <div id="ammo-display" style="font-size:2rem; font-weight:bold;">30 / 120</div>
        </div>

        <div class="controls">
            <div id="btn-shoot" class="btn">FIRE</div>
            <div id="btn-jump" class="btn">JUMP</div>
            <div id="btn-reload" class="btn">RELOAD</div>
            <div id="btn-nvg" class="btn">NVG OFF</div>
            <div id="joystick-base"><div id="joystick-handle"></div></div>
        </div>
    </div>

    <div id="title-screen" class="screen">
        <h1 style="color:var(--primary); font-size:3rem; margin:0;">TACTICAL ELITE V4</h1>
        <p>ULTIMATE MOBILE FPS</p>
        <div style="margin:20px;">
            MODE: <select id="time-select" style="padding:10px; background:#222; color:#fff;">
                <option value="day">DAY OPERATION (Default)</option>
                <option value="night">NIGHT OPERATION</option>
            </select>
        </div>
        <button id="btn-deploy" style="padding:15px 60px; background:var(--primary); border:none; border-radius:5px; font-weight:bold; cursor:pointer;">DEPLOY (PARACHUTE)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/**
 * V4 CORE ENGINE
 */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;

const playerRig = new THREE.Object3D();
playerRig.position.set(0, 300, 0); // Start high for parachute
scene.add(playerRig);
playerRig.add(camera);
camera.position.y = 1.7;

let isPlaying = false;
let isDay = true;
let gameTime = 300; // 5 min
let difficulty = 2; // 1:Easy, 2:Normal, 3:Hard

const nvgModes = ['OFF', 'GREEN', 'GRAY', 'THERMAL'];
let curNvgIdx = 0;

/**
 * TERRAIN & WORLD GENERATION (Mountains, Valleys, River)
 */
function createWorld(mode) {
    const size = 500;
    const segments = 100;
    const geometry = new THREE.PlaneGeometry(size, size, segments, segments);
    
    // Vertex manipulation for terrain
    const vertices = geometry.attributes.position.array;
    for (let i = 0; i < vertices.length; i += 3) {
        const x = vertices[i];
        const y = vertices[i+1];
        // Simple noise for mountains/valleys
        const d = Math.sqrt(x*x + y*y);
        let h = Math.sin(x/20) * Math.cos(y/20) * 5;
        h += Math.sin(x/50) * 15; // Mountains
        if (Math.abs(x) < 20) h -= 10; // Valley for river
        vertices[i+2] = h;
    }
    geometry.computeVertexNormals();

    const groundTex = new THREE.MeshStandardMaterial({ 
        color: mode === 'day' ? 0x3d4021 : 0x1a1c0d,
        roughness: 0.8,
        wireframe: false
    });
    const ground = new THREE.Mesh(geometry, groundTex);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // River
    const riverGeo = new THREE.PlaneGeometry(35, 500);
    const riverMat = new THREE.MeshStandardMaterial({ color: 0x0044ff, transparent: true, opacity: 0.6 });
    const river = new THREE.Mesh(riverGeo, riverMat);
    river.rotation.x = -Math.PI / 2;
    river.position.y = -8;
    scene.add(river);

    // Sun / Moon
    const celestialGeo = new THREE.SphereGeometry(10, 32, 32);
    const celestialMat = new THREE.MeshBasicMaterial({ color: mode === 'day' ? 0xffff00 : 0xffffaa });
    const celestial = new THREE.Mesh(celestialGeo, celestialMat);
    celestial.position.set(100, 200, -200);
    scene.add(celestial);

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, mode === 'day' ? 0.6 : 0.05);
    scene.add(ambient);
    const sunLight = new THREE.DirectionalLight(0xffffff, mode === 'day' ? 1.0 : 0.2);
    sunLight.position.set(50, 200, 50);
    sunLight.castShadow = true;
    scene.add(sunLight);

    // Environment: Buildings with Interiors
    for(let i=0; i<15; i++) {
        createBuilding((Math.random()-0.5)*400, (Math.random()-0.5)*400);
    }
}

function createBuilding(x, z) {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({color: 0x555555});
    // Walls with opening
    const wall1 = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 0.5), mat);
    wall1.position.set(0, 4, 5);
    const wall2 = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 0.5), mat);
    wall2.position.set(0, 4, -5);
    const wall3 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 8, 10), mat);
    wall3.position.set(5, 4, 0);
    const wall4 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 8, 6), mat); // Door gap
    wall4.position.set(-5, 4, 2);
    
    const roof = new THREE.Mesh(new THREE.BoxGeometry(11, 0.5, 11), mat);
    roof.position.set(0, 8, 0);

    group.add(wall1, wall2, wall3, wall4, roof);
    group.position.set(x, 0, z);
    scene.add(group);
}

/**
 * BOT SYSTEM (Humanoid & AI)
 */
const bots = [];
function spawnBot() {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({color: 0x111111});
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0xffccaa}));
    head.position.y = 1.7; head.isHead = true;
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.0, 0.3), mat);
    body.position.y = 1.0;
    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), mat);
    legL.position.set(-0.2, 0.4, 0);
    const legR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), mat);
    legR.position.set(0.2, 0.4, 0);
    
    group.add(head, body, legL, legR);
    group.position.set((Math.random()-0.5)*300, 0, (Math.random()-0.5)*300);
    group.hp = 100;
    group.lastShot = 0;
    scene.add(group);
    bots.push(group);
}

/**
 * WEAPONS & COMBAT
 */
const weapon = {
    name: "MP5",
    mag: 30, curMag: 30, res: 120,
    rate: 100, lastFire: 0,
    reloading: false
};

const gunGroup = new THREE.Group();
camera.add(gunGroup);
const gunMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.6), new THREE.MeshStandardMaterial({color: 0x111}));
gunMesh.position.set(0.3, -0.3, -0.5);
gunGroup.add(gunMesh);

function showHitMarker(type) {
    const hm = document.getElementById('hit-marker');
    hm.style.display = 'block';
    if(type === 'kill') hm.style.backgroundColor = 'red';
    else if(type === 'head') hm.style.backgroundColor = 'yellow';
    else hm.style.backgroundColor = 'white';
    
    setTimeout(() => hm.style.display = 'none', 100);
}

function shoot(isKnife = false) {
    if(weapon.reloading || (weapon.curMag <= 0 && !isKnife)) return;
    const now = Date.now();
    if(now - weapon.lastFire < weapon.rate) return;
    weapon.lastFire = now;

    if(isKnife) {
        // Knife Animation
        gunGroup.rotation.y = 1.0;
        setTimeout(() => gunGroup.rotation.y = 0, 150);
    } else {
        weapon.curMag--;
        updateHUD();
        // Recoil
        gunGroup.position.z = 0.05;
        setTimeout(() => gunGroup.position.z = 0, 50);
    }

    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    const ray = new THREE.Raycaster(playerRig.position.clone().add(new THREE.Vector3(0,1.7,0)), dir);
    const hitBots = ray.intersectObjects(bots, true);

    if(hitBots.length > 0) {
        const hitObj = hitBots[0].object;
        const botGroup = hitObj.parent;
        let damage = isKnife ? 100 : 25;
        let type = 'hit';

        if(hitObj.isHead) { damage *= 2; type = 'head'; }
        botGroup.hp -= damage;

        if(botGroup.hp <= 0) {
            type = 'kill';
            scene.remove(botGroup);
            bots.splice(bots.indexOf(botGroup), 1);
            spawnBot(); // Replenish
        }
        showHitMarker(type);
    }
}

/**
 * INPUTS (Unified Shoot & Look)
 */
let yaw = 0, pitch = 0;
const moveState = { id: null, active: false, x: 0, y: 0, dx: 0, dy: 0 };
const lookState = { id: null, active: false, lastX: 0, lastY: 0 };
let isAutoFiring = false;
let vy = 0; // Jump Velocity
let isGrounded = false;
let isDescending = true;

const btnShoot = document.getElementById('btn-shoot');
btnShoot.addEventListener('touchstart', (e) => {
    e.preventDefault();
    isAutoFiring = true;
    const t = e.changedTouches[0];
    lookState.id = t.identifier;
    lookState.active = true;
    lookState.lastX = t.clientX;
    lookState.lastY = t.clientY;
}, {passive: false});

btnShoot.addEventListener('touchmove', (e) => {
    if(!lookState.active) return;
    for(let t of e.changedTouches) {
        if(t.identifier === lookState.id) {
            yaw -= (t.clientX - lookState.lastX) * 0.005;
            pitch -= (t.clientY - lookState.lastY) * 0.005;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
            lookState.lastX = t.clientX;
            lookState.lastY = t.clientY;
        }
    }
});

btnShoot.addEventListener('touchend', (e) => {
    isAutoFiring = false;
    lookState.active = false;
    lookState.id = null;
});

// Movement Joystick
window.addEventListener('touchstart', (e) => {
    for(let t of e.changedTouches) {
        if(t.target.closest('.btn')) continue;
        if(t.clientX < window.innerWidth / 2 && !moveState.active) {
            moveState.active = true; moveState.id = t.identifier;
            moveState.x = t.clientX; moveState.y = t.clientY;
            document.getElementById('joystick-base').style.display = 'block';
            document.getElementById('joystick-base').style.left = (t.clientX-75)+'px';
            document.getElementById('joystick-base').style.top = (t.clientY-75)+'px';
        }
    }
});

window.addEventListener('touchmove', (e) => {
    for(let t of e.changedTouches) {
        if(t.identifier === moveState.id) {
            moveState.dx = (t.clientX - moveState.x) / 50;
            moveState.dy = (t.clientY - moveState.y) / 50;
            const dist = Math.sqrt(moveState.dx**2 + moveState.dy**2);
            if(dist > 1) { moveState.dx /= dist; moveState.dy /= dist; }
            document.getElementById('joystick-handle').style.transform = `translate(calc(-50% + ${moveState.dx*40}px), calc(-50% + ${moveState.dy*40}px))`;
        }
    }
});

window.addEventListener('touchend', (e) => {
    for(let t of e.changedTouches) {
        if(t.identifier === moveState.id) {
            moveState.active = false; moveState.id = null; moveState.dx = 0; moveState.dy = 0;
            document.getElementById('joystick-base').style.display = 'none';
        }
    }
});

document.getElementById('btn-jump').onclick = () => { if(isGrounded) vy = 0.2; };

/**
 * ENGINE LOOP
 */
function update() {
    if(!isPlaying) return;
    requestAnimationFrame(update);

    // Parachute logic
    if(isDescending) {
        playerRig.position.y -= 0.5;
        if(playerRig.position.y <= 1.7) { playerRig.position.y = 0; isDescending = false; isGrounded = true; }
    } else {
        // Physics
        vy -= 0.01;
        playerRig.position.y += vy;
        if(playerRig.position.y <= 0) { playerRig.position.y = 0; vy = 0; isGrounded = true; }
        else { isGrounded = false; }
    }

    // View & Movement
    playerRig.rotation.y = yaw;
    camera.rotation.x = pitch;
    if(moveState.active) {
        const move = new THREE.Vector3(moveState.dx, 0, moveState.dy).normalize().multiplyScalar(0.15).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        playerRig.position.add(move);
    }

    // Auto Fire
    if(isAutoFiring) shoot();

    // AI logic
    bots.forEach(bot => {
        const dist = bot.position.distanceTo(playerRig.position);
        bot.lookAt(playerRig.position.x, bot.position.y, playerRig.position.z);
        if(dist > 10) {
            const dir = new THREE.Vector3().subVectors(playerRig.position, bot.position).normalize();
            bot.position.add(dir.multiplyScalar(0.03 * difficulty));
        } else {
            // Shooting at player
            if(Date.now() - bot.lastShot > 2000 / difficulty) {
                bot.lastShot = Date.now();
                // Simple hit logic
                if(Math.random() < 0.2 * difficulty) { /* player damage logic */ }
            }
        }
    });

    // Timer
    gameTime -= 1/60;
    if(gameTime <= 0) { alert("MISSION FAILED: TIMEOUT"); location.reload(); }
    const m = Math.floor(gameTime / 60);
    const s = Math.floor(gameTime % 60);
    document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

    updateMinimap();
    renderer.render(scene, camera);
}

function updateMinimap() {
    const ctx = document.getElementById('minimap-canvas').getContext('2d');
    ctx.clearRect(0,0,150,150);
    ctx.fillStyle = isDay ? '#3d4021' : '#111';
    ctx.fillRect(0,0,150,150);
    ctx.fillStyle = 'red';
    bots.forEach(b => {
        const x = (b.position.x - playerRig.position.x) * 0.5 + 75;
        const z = (b.position.z - playerRig.position.z) * 0.5 + 75;
        ctx.fillRect(x-2, z-2, 4, 4);
    });
}

function updateHUD() {
    document.getElementById('ammo-display').innerText = `${weapon.curMag} / ${weapon.res}`;
}

/**
 * START GAME
 */
document.getElementById('btn-deploy').onclick = () => {
    isDay = document.getElementById('time-select').value === 'day';
    createWorld(isDay ? 'day' : 'night');
    for(let i=0; i<10; i++) spawnBot();
    
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('game-hud').style.display = 'block';
    isPlaying = true;
    update();
};

document.getElementById('btn-nvg').onclick = () => {
    if(isDay) return;
    curNvgIdx = (curNvgIdx + 1) % nvgModes.length;
    const overlay = document.getElementById('nvg-overlay');
    const btn = document.getElementById('btn-nvg');
    overlay.className = '';
    overlay.style.display = 'block';
    
    if(nvgModes[curNvgIdx] === 'OFF') overlay.style.display = 'none';
    else if(nvgModes[curNvgIdx] === 'GREEN') overlay.classList.add('nvg-green');
    else if(nvgModes[curNvgIdx] === 'GRAY') overlay.classList.add('nvg-gray');
    else if(nvgModes[curNvgIdx] === 'THERMAL') overlay.classList.add('nvg-thermal');
    
    btn.innerText = `NVG ${nvgModes[curNvgIdx]}`;
};

document.getElementById('btn-reload').onclick = () => {
    if(weapon.reloading || weapon.res <= 0) return;
    weapon.reloading = true;
    setTimeout(() => {
        const need = 30 - weapon.curMag;
        const take = Math.min(need, weapon.res);
        weapon.curMag += take; weapon.res -= take;
        weapon.reloading = false;
        updateHUD();
    }, 1500);
};

</script>
</body>
</html>
