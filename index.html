<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tactical Warzone V7.0</title>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  :root { --wb-dark: rgba(20, 20, 20, 0.85); --wb-border: 2px solid #aaa; --primary: #00ffcc; }
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Share Tech Mono', monospace; user-select: none; }
  #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  
  /* War Brokers Style UI */
  .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
  
  #top-hud { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: var(--wb-dark); border: var(--wb-border); padding: 5px 15px; color: #fff; font-size: 18px; }
  
  #crosshair-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; display: flex; justify-content: center; align-items: center; }
  .ch { background: #00ffcc; position: absolute; }
  .ch-t, .ch-b { width: 2px; height: 10px; } 
  .ch-l, .ch-r { width: 10px; height: 2px; }
  .ch-t { top: -15px; } .ch-b { bottom: -15px; } 
  .ch-l { left: -15px; } .ch-r { right: -15px; }
  #reddot { width: 4px; height: 4px; background: red; border-radius: 50%; display: none; }
  
  #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 20; }
  select, button { font-family: 'Share Tech Mono'; padding: 10px; margin: 5px; font-size: 16px; background: var(--wb-dark); color: #fff; border: var(--wb-border); cursor: pointer; }
  button:hover { background: var(--primary); color: #000; }
  
  #radar { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; background: rgba(0,0,0,0.5); border: var(--wb-border); border-radius: 50%; }
  #hit-marker { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; display: none; pointer-events: none; }
  
  #wep-info { position: absolute; bottom: 20px; right: 20px; background: var(--wb-dark); border: var(--wb-border); padding: 10px; color: #fff; text-align: right; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
  <canvas id="game-canvas"></canvas>
  
  <div id="menu">
    <h1 style="color: var(--primary); font-size: 40px; text-shadow: 0 0 10px var(--primary);">Tactical Warzone V7.0</h1>
    <div>
      <label>TIME: </label>
      <select id="sel-time"><option value="day">Day</option><option value="night">Night</option></select>
    </div>
    <div>
      <label>ENEMIES: </label>
      <select id="sel-enemies">
        <option value="10">10 BOTS</option>
        <option value="30">30 BOTS</option>
        <option value="999">ENDLESS</option>
        <option value="0">PRACTICE (0)</option>
      </select>
    </div>
    <button id="btn-deploy" style="margin-top: 20px; font-size: 20px; padding: 10px 40px;">DEPLOY</button>
  </div>

  <div id="game-ui" class="overlay">
    <div id="top-hud">
      <div>ENEMIES: <span id="enemy-count">0</span></div>
      <div>HP: <span id="hp-count">100</span></div>
    </div>
    
    <div id="crosshair-container">
      <svg id="fire-progress-svg" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-90deg); width:40px; height:40px; overflow:visible; z-index: -1;" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"></circle>
        <circle id="fire-progress-circle" cx="20" cy="20" r="18" fill="none" stroke="#00ffcc" stroke-width="4" stroke-dasharray="113.1" stroke-dashoffset="0" style="transition: stroke-dashoffset 0.05s linear;"></circle>
      </svg>
      <div id="reddot"></div>
      <div class="ch ch-t"></div><div class="ch ch-b"></div><div class="ch ch-l"></div><div class="ch ch-r"></div>
    </div>
    
    <div id="hit-marker">✖</div>
    
    <canvas id="radar" width="150" height="150"></canvas>
    
    <div id="wep-info">
      <div id="wep-name" style="font-size: 20px; color: var(--primary);">AWM SNIPER</div>
      <div style="font-size: 24px;">AMMO: <span id="ammo-count">5/25</span></div>
    </div>
    
    <button id="btn-exit" style="position:absolute; top:20px; right:20px; pointer-events: auto; display:none;">EXIT</button>
  </div>

  <script>
  /** --- VARIABLES --- */
  let scene, camera, renderer;
  let playerRig, pitchObj, weaponContainer;
  let bots = [], bullets = [];
  let isDay = true, isEndless = false, enemiesRemaining = 0, totalSpawns = 0;
  
  let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
  let isADS = false;
  let velocity = new THREE.Vector3(), direction = new THREE.Vector3();
  let prevTime = performance.now();
  
  let lastFireTime = 0;
  let isReloading = false;
  let reloadStart = 0;

  /** --- WEAPONS SETUP --- */
  const gunMat = new THREE.MeshStandardMaterial({color: 0x333333, roughness: 0.5});
  const gunAccMat = new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.8});
  
  // 1. ASSAULT RIFLE
  const akGroup = new THREE.Group();
  const akBody = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.08, 0.4), new THREE.MeshStandardMaterial({color: 0x5c3a21}));
  const akBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.3), gunMat);
  akBarrel.rotation.x = Math.PI/2; akBarrel.position.set(0, 0.02, -0.3);
  akGroup.add(akBody, akBarrel);
  akGroup.idlePos = new THREE.Vector3(0.2, -0.2, -0.4);
  akGroup.adsPos = new THREE.Vector3(0, -0.1, -0.3);

  // 2. AWM SNIPER (改修済み: サイズ1.5倍、スコープくり抜き・十字線・柱)
  const awmGroup = new THREE.Group();
  awmGroup.scale.set(1.5, 1.5, 1.5); // 全体を1.5倍に大きく
  
  const awmBody = new THREE.Mesh(new THREE.BoxGeometry(0.035, 0.06, 0.4), new THREE.MeshStandardMaterial({color: 0x3d5c31}));
  const awmBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.008, 0.4), gunMat);
  awmBarrel.rotation.x = Math.PI/2; awmBarrel.position.set(0, 0.01, -0.35);

  // スコープのチューブ（内部をくり抜き）
  const awmOuter = [];
  for(let i=0; i<=16; i++) { const a = i/16 * Math.PI*2; awmOuter.push(new THREE.Vector2(Math.cos(a)*0.015, Math.sin(a)*0.015)); }
  const awmShape = new THREE.Shape(awmOuter);
  const awmHole = new THREE.Path();
  const awmInner = [];
  for(let i=0; i<=16; i++) { const a = i/16 * Math.PI*2; awmInner.push(new THREE.Vector2(Math.cos(a)*0.013, Math.sin(a)*0.013)); }
  awmHole.setFromPoints(awmInner); awmShape.holes.push(awmHole);
  const awmScope = new THREE.Mesh(new THREE.ExtrudeGeometry(awmShape, {depth: 0.2, bevelEnabled: false}), gunAccMat);
  awmScope.position.set(0, 0.055, -0.15);

  // スコープ内の十字線
  const awmCrossMat = new THREE.MeshBasicMaterial({color: 0x000000});
  const awmCrossH = new THREE.Mesh(new THREE.BoxGeometry(0.026, 0.001, 0.001), awmCrossMat);
  const awmCrossV = new THREE.Mesh(new THREE.BoxGeometry(0.001, 0.026, 0.001), awmCrossMat);
  awmCrossH.position.set(0, 0.055, -0.05); // チューブ中間に配置
  awmCrossV.position.set(0, 0.055, -0.05);

  // スコープと銃の間の2つの柱
  const pillar1 = new THREE.Mesh(new THREE.BoxGeometry(0.006, 0.025, 0.01), gunMat);
  pillar1.position.set(0, 0.04, -0.1);
  const pillar2 = new THREE.Mesh(new THREE.BoxGeometry(0.006, 0.025, 0.01), gunMat);
  pillar2.position.set(0, 0.04, 0.0);

  const awmMag = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.06, 0.04), gunMat); 
  awmMag.position.set(0, -0.04, 0.05);

  awmGroup.add(awmBody, awmBarrel, awmScope, awmCrossH, awmCrossV, pillar1, pillar2, awmMag);

  // 1.5倍スケールなので、覗き込みY座標は -0.0825 (0.055 * 1.5) 付近で調整
  awmGroup.idlePos = new THREE.Vector3(0.2, -0.2, -0.4); 
  awmGroup.adsPos = new THREE.Vector3(0, -0.0825, -0.2); 

  const weapons = [
      { name: "ASSAULT RIFLE", mesh: akGroup, rate: 120, reloadTime: 2000, mag: 30, maxAmmo: 90, ammo: 30, damage: 34 },
      { name: "AWM SNIPER", mesh: awmGroup, rate: 1500, reloadTime: 3000, mag: 5, maxAmmo: 25, ammo: 5, damage: 100 }
  ];
  let curWepIdx = 1;

  /** --- INIT ENGINE --- */
  function init() {
      const canvas = document.getElementById('game-canvas');
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      
      scene = new THREE.Scene();
      
      camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
      
      playerRig = new THREE.Object3D();
      playerRig.position.set(0, 1.6, 0);
      scene.add(playerRig);
      
      pitchObj = new THREE.Object3D();
      playerRig.add(pitchObj);
      pitchObj.add(camera);
      
      weaponContainer = new THREE.Object3D();
      camera.add(weaponContainer);
      
      switchWeapon(curWepIdx);

      // Light
      const aLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(aLight);
      const dLight = new THREE.DirectionalLight(0xffffff, 0.6);
      dLight.position.set(50, 100, 50);
      scene.add(dLight);

      // Events
      window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
      });
      
      document.body.addEventListener('click', () => {
          if (document.getElementById('menu').style.display === 'none') {
              document.body.requestPointerLock();
          }
      });
      
      document.addEventListener('mousemove', (e) => {
          if (document.pointerLockElement === document.body) {
              playerRig.rotation.y -= e.movementX * 0.002;
              pitchObj.rotation.x -= e.movementY * 0.002;
              pitchObj.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitchObj.rotation.x));
          }
      });

      document.addEventListener('mousedown', (e) => {
          if(document.pointerLockElement !== document.body) return;
          if(e.button === 0) shoot();
          if(e.button === 2) isADS = true;
      });
      
      document.addEventListener('mouseup', (e) => {
          if(e.button === 2) isADS = false;
      });

      document.addEventListener('keydown', (e) => {
          switch(e.code) {
              case 'KeyW': moveForward = true; break;
              case 'KeyS': moveBackward = true; break;
              case 'KeyA': moveLeft = true; break;
              case 'KeyD': moveRight = true; break;
              case 'KeyR': reload(); break;
              case 'Digit1': switchWeapon(0); break;
              case 'Digit2': switchWeapon(1); break;
          }
      });

      document.addEventListener('keyup', (e) => {
          switch(e.code) {
              case 'KeyW': moveForward = false; break;
              case 'KeyS': moveBackward = false; break;
              case 'KeyA': moveLeft = false; break;
              case 'KeyD': moveRight = false; break;
          }
      });

      requestAnimationFrame(animate);
  }

  function createWorld(time) {
      scene.background = new THREE.Color(time === 'day' ? 0x87CEEB : 0x0a0a1a);
      // Ground
      const floorMat = new THREE.MeshStandardMaterial({color: time === 'day' ? 0x3b5e2b : 0x1a2b13});
      const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), floorMat);
      floor.rotation.x = -Math.PI/2;
      scene.add(floor);
      
      // Basic obstacles
      const boxGeo = new THREE.BoxGeometry(4, 4, 4);
      const boxMat = new THREE.MeshStandardMaterial({color: 0x888888});
      for(let i=0; i<30; i++) {
          const b = new THREE.Mesh(boxGeo, boxMat);
          b.position.set(Math.random()*100-50, 2, Math.random()*100-50);
          scene.add(b);
      }
  }

  function switchWeapon(idx) {
      if(isReloading) return;
      weaponContainer.clear();
      curWepIdx = idx;
      const w = weapons[curWepIdx];
      weaponContainer.add(w.mesh);
      w.mesh.position.copy(w.mesh.idlePos);
      isADS = false;
      updateUI();
      // 切替時のディレイとして最終発射時間を現在にリセット
      lastFireTime = Date.now();
  }

  function shoot() {
      if(isReloading) return;
      const w = weapons[curWepIdx];
      const now = Date.now();
      if(now - lastFireTime < w.rate) return; // 連射間隔チェック
      
      if(w.ammo <= 0) {
          reload();
          return;
      }

      lastFireTime = now;
      w.ammo--;
      updateUI();

      // Recoil animation
      w.mesh.position.z += 0.05;

      // Raycast for hit
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
      
      const botMeshes = bots.map(b => b.mesh);
      const intersects = raycaster.intersectObjects(botMeshes);
      
      if(intersects.length > 0) {
          const hitMesh = intersects[0].object;
          const bot = bots.find(b => b.mesh === hitMesh);
          if(bot) {
              bot.hp -= w.damage;
              showHitMarker();
              if(bot.hp <= 0) {
                  scene.remove(bot.mesh);
                  bots = bots.filter(b => b !== bot);
                  
                  if(!isEndless) {
                      enemiesRemaining--;
                      document.getElementById('enemy-count').innerText = enemiesRemaining;
                      if(enemiesRemaining <= 0 && totalSpawns > 0) alert("MISSION CLEARED!");
                  } else {
                      setTimeout(spawnBot, 2000);
                  }
              }
          }
      }
  }

  function reload() {
      const w = weapons[curWepIdx];
      if(isReloading || w.ammo === w.mag || w.maxAmmo <= 0) return;
      
      isReloading = true;
      reloadStart = Date.now();
      
      // リロードアニメーション
      w.mesh.rotation.x = -Math.PI/4;

      setTimeout(() => {
          const needed = w.mag - w.ammo;
          const take = Math.min(needed, w.maxAmmo);
          w.ammo += take;
          w.maxAmmo -= take;
          
          isReloading = false;
          w.mesh.rotation.x = 0;
          updateUI();
      }, w.reloadTime);
  }

  function spawnBot() {
      const botGeo = new THREE.BoxGeometry(1, 2, 1);
      const botMat = new THREE.MeshStandardMaterial({color: 0xff0000});
      const mesh = new THREE.Mesh(botGeo, botMat);
      
      const angle = Math.random() * Math.PI * 2;
      const dist = 20 + Math.random() * 30;
      mesh.position.set(Math.cos(angle)*dist, 1, Math.sin(angle)*dist);
      
      scene.add(mesh);
      bots.push({ mesh: mesh, hp: 100 });
  }

  function updateUI() {
      const w = weapons[curWepIdx];
      document.getElementById('wep-name').innerText = w.name;
      document.getElementById('ammo-count').innerText = `${w.ammo}/${w.maxAmmo}`;
  }

  function showHitMarker() {
      const hm = document.getElementById('hit-marker');
      hm.style.display = 'block';
      setTimeout(() => hm.style.display = 'none', 100);
  }

  function updateFireProgress() {
      const w = weapons[curWepIdx];
      const now = Date.now();
      let progress = 1.0;

      if (isReloading) {
          // リロード進捗
          const total = w.reloadTime;
          const elapsed = now - reloadStart;
          progress = elapsed / total;
      } else {
          // 発射間隔（コッキング・連射ディレイ）進捗
          const total = w.rate; 
          const elapsed = now - lastFireTime;
          progress = elapsed / total;
      }
      
      if (progress > 1.0) progress = 1.0;

      const circle = document.getElementById('fire-progress-circle');
      if (circle) {
          // 円周(113.1)に対してのオフセット計算
          const offset = 113.1 * (1 - progress);
          circle.style.strokeDashoffset = offset;
          // リロード時は色を黄色に
          circle.style.stroke = isReloading ? "#ffcc00" : "#00ffcc";
          // 準備完了で少し透過
          circle.style.opacity = progress >= 1.0 ? "0.3" : "1.0";
      }
  }

  function updateRadar() {
      const canvas = document.getElementById('radar');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0,0,150,150);
      const c = 75;
      const scale = 1.5;

      ctx.fillStyle = '#f00';
      bots.forEach(b => {
          const dx=(b.mesh.position.x - playerRig.position.x)*scale;
          const dz=(b.mesh.position.z - playerRig.position.z)*scale;
          ctx.beginPath(); ctx.arc(c+dx, c+dz, 2, 0, Math.PI*2); ctx.fill();
      });
      
      const yaw = playerRig.rotation.y;
      ctx.translate(c, c); ctx.rotate(-yaw);
      ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.moveTo(0,-5); ctx.lineTo(4,4); ctx.lineTo(-4,4); ctx.fill();
      ctx.resetTransform();
  }

  function animate() {
      requestAnimationFrame(animate);
      const time = performance.now();
      const delta = (time - prevTime) / 1000;
      prevTime = time;

      // 進行状況バーの更新
      updateFireProgress();

      // Movement
      velocity.x -= velocity.x * 10.0 * delta;
      velocity.z -= velocity.z * 10.0 * delta;
      
      direction.z = Number(moveForward) - Number(moveBackward);
      direction.x = Number(moveRight) - Number(moveLeft);
      direction.normalize();
      
      const speed = 50.0;
      if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
      if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;
      
      playerRig.translateX(-velocity.x * delta);
      playerRig.translateZ(velocity.z * delta);

      // ADS & FOV Animation
      const w = weapons[curWepIdx];
      const targetPos = isADS ? w.mesh.adsPos : w.mesh.idlePos;
      w.mesh.position.lerp(targetPos, 0.2);
      
      // クロスヘアの表示制御
      const chElements = document.querySelectorAll('.ch');
      chElements.forEach(el => el.style.display = isADS ? 'none' : 'block');
      
      // AWM選択時はFOVを25(3倍ズーム相当)、それ以外は50
      if(isADS) {
          camera.fov = THREE.MathUtils.lerp(camera.fov, w.name === "AWM SNIPER" ? 25 : 50, 0.2);
      } else {
          camera.fov = THREE.MathUtils.lerp(camera.fov, 75, 0.2);
      }
      camera.updateProjectionMatrix();

      // Bot logic
      bots.forEach(b => {
          b.mesh.lookAt(playerRig.position);
          b.mesh.translateZ(1.5 * delta);
      });

      updateRadar();
      renderer.render(scene, camera);
  }

  /** --- SETUP --- */
  document.getElementById('btn-deploy').onclick = () => {
      isDay = document.getElementById('sel-time').value === 'day';
      const ec = parseInt(document.getElementById('sel-enemies').value);
      
      if(ec === 0 || ec === 999) {
          document.getElementById('btn-exit').style.display = 'block';
          isEndless = (ec === 999);
          enemiesRemaining = isEndless ? "∞" : 0;
          totalSpawns = isEndless ? 999 : 0;
      } else {
          enemiesRemaining = ec; totalSpawns = ec;
      }
      document.getElementById('enemy-count').innerText = enemiesRemaining;
  
      createWorld(isDay ? 'day' : 'night');
      for(let i=0; i<ec; i++) {
           if(i>30) break; // Initial spawn limit
           spawnBot();
      }
      
      document.getElementById('menu').style.display = 'none';
      document.getElementById('game-ui').style.display = 'block';
      document.body.requestPointerLock();
  };

  document.getElementById('btn-exit').onclick = () => {
      location.reload();
  };

  init();
  </script>
</body>
</html>
