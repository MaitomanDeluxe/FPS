<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web FPS V2</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #111; touch-action: none; font-family: 'Courier New', Courier, monospace; user-select: none; -webkit-user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* 画面共通 */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; background: rgba(0,0,0,0.85); }
        h1 { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; font-size: 3rem; margin-bottom: 10px; }
        button, select { font-family: inherit; font-size: 1.2rem; padding: 15px 30px; margin: 10px; border-radius: 5px; border: 2px solid #ffaa00; background: #222; color: #ffaa00; cursor: pointer; font-weight: bold; }
        button:active { background: #ffaa00; color: #000; }
        
        /* タイトル画面の武器選択 */
        .weapon-select { display: flex; gap: 20px; margin: 20px 0; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; }
        .weapon-box { text-align: center; }
        
        /* HUD UI */
        #ui-layer { display: none; pointer-events: none; z-index: 10; background: transparent; }
        #hud-top { position: absolute; top: 5%; left: 5%; color: white; font-size: 1.2rem; text-shadow: 1px 1px 2px black; }
        #hud-ammo { position: absolute; bottom: 5%; right: 5%; color: #ffaa00; font-size: 2rem; font-weight: bold; text-align: right; text-shadow: 2px 2px 4px black; }
        #hud-mode { font-size: 1rem; color: #fff; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #0f0; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 5px #0f0; }
        
        /* モバイル操作UI */
        #joystick-zone { position: absolute; bottom: 10%; left: 5%; width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); display: none; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
        .btn { position: absolute; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.3); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }
        .btn:active { background: rgba(255,170,0,0.6); }
        #btn-shoot { bottom: 20%; right: 15%; width: 80px; height: 80px; background: rgba(255,50,50,0.3); border-color: #ff3333; }
        #btn-jump { bottom: 5%; right: 30%; width: 60px; height: 60px; }
        #btn-ads { bottom: 35%; right: 30%; width: 60px; height: 60px; }
        #btn-reload { bottom: 45%; right: 15%; width: 60px; height: 60px; }
        #btn-grenade { bottom: 60%; right: 15%; width: 60px; height: 60px; }
        #btn-swap { top: 5%; right: 5%; width: auto; height: 40px; padding: 0 15px; border-radius: 5px; }
        #btn-firemode { bottom: 20%; right: 5%; width: 50px; height: 50px; font-size: 0.8rem; }
        #btn-console-toggle { top: 5%; left: 50%; transform: translateX(-50%); width: auto; height: 30px; padding: 0 10px; border-radius: 5px; font-size: 0.8rem; pointer-events: auto; }

        /* コンソール */
        #console-ui { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(0,0,0,0.9); border: 1px solid #0f0; padding: 10px; display: none; z-index: 50; pointer-events: auto; }
        #console-log { height: 100px; overflow-y: auto; color: #0f0; font-size: 0.9rem; margin-bottom: 5px; }
        #console-input { width: calc(100% - 60px); background: #222; color: #0f0; border: 1px solid #0f0; padding: 5px; font-family: inherit; }
        #console-send { width: 50px; background: #0f0; color: #000; border: none; padding: 5px; font-weight: bold; }

        /* クリア画面 */
        #clear-screen { display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="title-screen" class="screen">
        <h1>TACTICAL WEB FPS</h1>
        <div class="weapon-select">
            <div class="weapon-box">
                <label>メイン武器<br>
                    <select id="sel-primary">
                        <option value="M4A1">M4A1 (AR)</option>
                        <option value="MP5" selected>MP5 (SMG)</option>
                    </select>
                </label>
            </div>
            <div class="weapon-box">
                <label>サブ武器<br>
                    <select id="sel-secondary">
                        <option value="Hi-Capa" selected>Hi-Capa (Handgun)</option>
                        <option value="Glock">Glock 18c</option>
                    </select>
                </label>
            </div>
        </div>
        <button id="start-btn">DEPLOY (出撃)</button>
    </div>

    <div id="clear-screen" class="screen">
        <h1>MISSION CLEARED</h1>
        <p>ALL HOSTILES ELIMINATED</p>
        <button id="restart-btn">RETURN TO BASE</button>
    </div>

    <div id="ui-layer" class="screen">
        <div id="hud-top">HP: <span id="hp-disp">100</span> | BOTS: <span id="bot-count">0</span></div>
        <div id="hud-ammo"><span id="ammo-current">30</span> / <span id="ammo-reserve">90</span><br><span id="hud-mode">AUTO</span></div>
        <div id="crosshair"></div>
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        
        <div id="btn-shoot" class="btn">FIRE</div>
        <div id="btn-jump" class="btn">JUMP</div>
        <div id="btn-ads" class="btn">ADS</div>
        <div id="btn-reload" class="btn">RELOAD</div>
        <div id="btn-grenade" class="btn">GRENADE</div>
        <div id="btn-firemode" class="btn">MODE</div>
        <div id="btn-swap" class="btn">WEAPON: MAIN</div>
        <div id="btn-console-toggle" class="btn">~ CONSOLE</div>

        <div id="console-ui">
            <div id="console-log"></div>
            <input type="text" id="console-input" placeholder="Enter command (e.g., bot_add, killall)">
            <button id="console-send">></button>
        </div>
    </div>

<script>
    // --- 武器データ定義 ---
    const WEAPONS = {
        'M4A1': { type: 'main', damage: 25, mag: 30, reserve: 90, rate: 100, modes: ['AUTO', 'SEMI'], reload: 2000, modelColor: 0x333333, length: 0.6 },
        'MP5': { type: 'main', damage: 18, mag: 30, reserve: 120, rate: 70, modes: ['AUTO', 'BURST', 'SEMI'], reload: 1800, modelColor: 0x1a1a1a, length: 0.4 },
        'Hi-Capa': { type: 'sub', damage: 30, mag: 15, reserve: 45, rate: 250, modes: ['SEMI'], reload: 1500, modelColor: 0x555555, length: 0.2 },
        'Glock': { type: 'sub', damage: 15, mag: 18, reserve: 54, rate: 60, modes: ['AUTO', 'SEMI'], reload: 1400, modelColor: 0x222222, length: 0.18 },
        'Knife': { type: 'melee', damage: 100, mag: '-', reserve: '-', rate: 500, modes: ['MELEE'], reload: 0, modelColor: 0xcccccc, length: 0.3 }
    };

    let inventory = { main: '', sub: '', melee: 'Knife', currentSlot: 'main' };
    let currentGun = null;
    let isReloading = false;
    let isShooting = false;
    let lastShotTime = 0;
    let burstCount = 0;
    let fireInterval = null;

    // --- ゲーム状態 ---
    let isPlaying = false;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x223344);
    scene.fog = new THREE.Fog(0x223344, 10, 80);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const cameraContainer = new THREE.Object3D();
    scene.add(cameraContainer);
    cameraContainer.add(camera);

    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // ライティング (PBR向けに綺麗に)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(20, 50, -20);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    scene.add(dirLight);

    // 武器モデル (簡易)
    const weaponGroup = new THREE.Group();
    weaponGroup.position.set(0.2, -0.2, -0.4);
    camera.add(weaponGroup);
    const weaponMesh = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.1, 1), new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.8 }));
    weaponGroup.add(weaponMesh);

    // エフェクト用配列
    const bots = [];
    const tracers = [];
    const hitEffects = [];
    const deathBoxes = [];
    const grenades = [];

    // --- マップ構築 ---
    // 高画質化: StandardMaterialで起伏とテクスチャ感を疑似表現
    function buildMap() {
        const floorGeo = new THREE.PlaneGeometry(100, 100, 32, 32);
        // わずかに起伏をつける
        const pos = floorGeo.attributes.position;
        for(let i=0; i<pos.count; i++) {
            if(Math.random() > 0.8) pos.setZ(i, Math.random() * 0.5);
        }
        floorGeo.computeVertexNormals();
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x3b4d2e, roughness: 0.9, metalness: 0.1 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // 障害物・スロープ
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.7 });
        for(let i=0; i<20; i++) {
            const mesh = new THREE.Mesh(boxGeo, wallMat);
            const w = Math.random() * 5 + 2;
            const h = Math.random() * 3 + 1;
            const d = Math.random() * 5 + 2;
            mesh.scale.set(w, h, d);
            mesh.position.set((Math.random() - 0.5) * 80, h/2, (Math.random() - 0.5) * 80);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
        }
    }
    buildMap();

    function spawnBot(x, z) {
        const bot = new THREE.Mesh(new THREE.BoxGeometry(1, 1.8, 1), new THREE.MeshStandardMaterial({ color: 0xaa0000, roughness: 0.4 }));
        bot.position.set(x || (Math.random() - 0.5) * 60, 0.9, z || (Math.random() - 0.5) * 60);
        bot.castShadow = true;
        bot.health = 100;
        scene.add(bot);
        bots.push(bot);
        updateHUD();
    }

    // デスボックス (弾薬補充)
    function spawnDeathBox(pos) {
        const box = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.5), new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x005500 }));
        box.position.copy(pos);
        box.position.y = 0.2;
        scene.add(box);
        deathBoxes.push(box);
    }

    // --- 武器システム ---
    function equipWeapon(slot) {
        if(isReloading) return;
        inventory.currentSlot = slot;
        const gunName = inventory[slot];
        currentGun = Object.assign({}, WEAPONS[gunName]); // 状態をコピー
        currentGun.name = gunName;
        currentGun.currentMode = currentGun.modes[0];
        
        // 見た目変更
        weaponMesh.scale.set(1, 1, currentGun.length);
        weaponMesh.material.color.setHex(currentGun.modelColor);
        document.getElementById('btn-swap').innerText = `WEAPON: ${slot.toUpperCase()}`;
        updateHUD();
    }

    function toggleFireMode() {
        if(!currentGun || currentGun.type === 'melee') return;
        const modes = currentGun.modes;
        let idx = modes.indexOf(currentGun.currentMode);
        currentGun.currentMode = modes[(idx + 1) % modes.length];
        updateHUD();
    }

    function reloadWeapon() {
        if(isReloading || currentGun.type === 'melee' || currentGun.mag === WEAPONS[currentGun.name].mag || currentGun.reserve <= 0) return;
        isReloading = true;
        document.getElementById('hud-mode').innerText = "RELOADING...";
        
        // リロードアニメーション
        weaponGroup.rotation.x = -Math.PI / 4; 
        
        setTimeout(() => {
            if(!isPlaying) return;
            const maxMag = WEAPONS[currentGun.name].mag;
            const needed = maxMag - currentGun.mag;
            const take = Math.min(needed, currentGun.reserve);
            currentGun.mag += take;
            currentGun.reserve -= take;
            isReloading = false;
            weaponGroup.rotation.x = 0;
            updateHUD();
        }, currentGun.reload);
    }

    function updateHUD() {
        document.getElementById('bot-count').innerText = bots.length;
        if(currentGun) {
            document.getElementById('ammo-current').innerText = currentGun.mag;
            document.getElementById('ammo-reserve').innerText = currentGun.reserve;
            if(!isReloading) document.getElementById('hud-mode').innerText = currentGun.currentMode;
        }
    }

    // --- 射撃・エフェクト処理 ---
    function fireGun() {
        if(isReloading || !currentGun) return;
        if(currentGun.type !== 'melee' && currentGun.mag <= 0) {
            reloadWeapon();
            return;
        }

        const now = Date.now();
        if(now - lastShotTime < currentGun.rate) return;
        lastShotTime = now;

        if(currentGun.type !== 'melee') currentGun.mag--;
        updateHUD();

        // 反動アニメ
        weaponMesh.position.z += 0.05;
        setTimeout(() => { weaponMesh.position.z -= 0.05; }, 50);

        // Raycaster
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        const range = currentGun.type === 'melee' ? 3 : 150;
        raycaster.far = range;

        // 曳光弾 (トレーサー) の生成
        if(currentGun.type !== 'melee') {
            const tracerGeo = new THREE.CylinderGeometry(0.02, 0.02, 2, 8);
            tracerGeo.rotateX(Math.PI / 2);
            const tracerMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const tracer = new THREE.Mesh(tracerGeo, tracerMat);
            tracer.position.copy(cameraContainer.position).add(raycaster.ray.direction.clone().multiplyScalar(1));
            tracer.quaternion.copy(camera.quaternion);
            scene.add(tracer);
            tracers.push({ mesh: tracer, dir: raycaster.ray.direction.clone(), life: 10 });
        }

        const intersects = raycaster.intersectObjects(bots);
        if (intersects.length > 0) {
            const hitBot = intersects[0].object;
            const point = intersects[0].point;
            hitBot.health -= currentGun.damage;
            
            // ヒットエフェクト
            const hitGeo = new THREE.SphereGeometry(0.2, 8, 8);
            const hitMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 1 });
            const hitMesh = new THREE.Mesh(hitGeo, hitMat);
            hitMesh.position.copy(point);
            scene.add(hitMesh);
            hitEffects.push({ mesh: hitMesh, life: 10 });

            hitBot.material.color.setHex(0xffaaaa);
            setTimeout(() => { if(hitBot.health > 0 && hitBot.parent) hitBot.material.color.setHex(0xaa0000); }, 100);

            if (hitBot.health <= 0) {
                spawnDeathBox(hitBot.position); // デスボックススポーン
                scene.remove(hitBot);
                const index = bots.indexOf(hitBot);
                if (index > -1) bots.splice(index, 1);
                updateHUD();
                checkWin();
            }
        }
    }

    function handleShooting() {
        if(!isShooting || !currentGun) return;
        if(currentGun.currentMode === 'AUTO') {
            fireGun();
        } else if (currentGun.currentMode === 'BURST' && burstCount < 3) {
            fireGun();
            burstCount++;
            if(burstCount >= 3) isShooting = false; // 3発で停止
        } else if (currentGun.currentMode === 'SEMI' || currentGun.currentMode === 'MELEE') {
            fireGun();
            isShooting = false; // 1発で停止
        }
    }

    // --- コンソール ---
    const consoleUI = document.getElementById('console-ui');
    const consoleLog = document.getElementById('console-log');
    const consoleInput = document.getElementById('console-input');
    
    function logToConsole(msg) {
        consoleLog.innerHTML += `<div>${msg}</div>`;
        consoleLog.scrollTop = consoleLog.scrollHeight;
    }

    document.getElementById('btn-console-toggle').addEventListener('touchstart', (e) => {
        e.preventDefault();
        consoleUI.style.display = consoleUI.style.display === 'none' ? 'block' : 'none';
    });

    document.getElementById('console-send').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const cmd = consoleInput.value.trim().toLowerCase();
        consoleInput.value = '';
        logToConsole(`> ${cmd}`);
        
        if(cmd === 'bot_add') { spawnBot(); logToConsole('Spawned 1 bot.'); }
        else if(cmd.startsWith('bot_add ')) {
            let num = parseInt(cmd.split(' ')[1]);
            for(let i=0; i<num; i++) spawnBot();
            logToConsole(`Spawned ${num} bots.`);
        }
        else if(cmd === 'killall') {
            bots.forEach(b => { spawnDeathBox(b.position); scene.remove(b); });
            bots.length = 0;
            updateHUD(); checkWin();
            logToConsole('Killed all bots.');
        }
        else { logToConsole('Unknown command. Try: bot_add, killall'); }
    });

    // --- 操作・入力系 ---
    const player = { yaw: 0, pitch: 0, speed: 0.15, velY: 0 };
    let touchL = { id: null, active: false, x: 0, y: 0, sx: 0, sy: 0 };
    let touchR = { id: null, active: false, lx: 0, ly: 0 };

    document.addEventListener('touchstart', (e) => {
        if(!isPlaying) return;
        for(let i=0; i<e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            if(e.target.closest('.btn') || e.target.closest('#console-ui')) continue;

            if (t.clientX < window.innerWidth / 2 && !touchL.active) {
                touchL = { id: t.identifier, active: true, x: t.clientX, y: t.clientY, sx: t.clientX, sy: t.clientY };
                document.getElementById('joystick-zone').style.display = 'block';
                document.getElementById('joystick-zone').style.left = (t.clientX - 75) + 'px';
                document.getElementById('joystick-zone').style.top = (t.clientY - 75) + 'px';
                document.getElementById('joystick-knob').style.transform = `translate(-50%, -50%)`;
            } else if (t.clientX >= window.innerWidth / 2 && !touchR.active) {
                touchR = { id: t.identifier, active: true, lx: t.clientX, ly: t.clientY };
            }
        }
    });

    document.addEventListener('touchmove', (e) => {
        if(!isPlaying) return;
        for(let i=0; i<e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            if (t.identifier === touchL.id) {
                touchL.x = t.clientX; touchL.y = t.clientY;
                let dx = touchL.x - touchL.sx, dy = touchL.y - touchL.sy;
                const dist = Math.min(50, Math.sqrt(dx*dx + dy*dy));
                const angle = Math.atan2(dy, dx);
                document.getElementById('joystick-knob').style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
            }
            if (t.identifier === touchR.id) {
                player.yaw -= (t.clientX - touchR.lx) * 0.005;
                player.pitch -= (t.clientY - touchR.ly) * 0.005;
                player.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, player.pitch));
                touchR.lx = t.clientX; touchR.ly = t.clientY;
            }
        }
    });

    document.addEventListener('touchend', (e) => {
        for(let i=0; i<e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            if(t.identifier === touchL.id) { touchL.active = false; document.getElementById('joystick-zone').style.display = 'none'; }
            if(t.identifier === touchR.id) { touchR.active = false; }
        }
    });

    // ボタンUI
    document.getElementById('btn-shoot').addEventListener('touchstart', (e) => { e.preventDefault(); isShooting = true; burstCount = 0; });
    document.getElementById('btn-shoot').addEventListener('touchend', (e) => { e.preventDefault(); isShooting = false; });
    document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); if(cameraContainer.position.y <= 1.61) player.velY = 0.3; });
    document.getElementById('btn-reload').addEventListener('touchstart', (e) => { e.preventDefault(); reloadWeapon(); });
    document.getElementById('btn-firemode').addEventListener('touchstart', (e) => { e.preventDefault(); toggleFireMode(); });
    
    document.getElementById('btn-ads').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const isADS = camera.fov === 40;
        camera.fov = isADS ? 75 : 40;
        weaponGroup.position.set(isADS ? 0.2 : 0, isADS ? -0.2 : -0.15, isADS ? -0.4 : -0.3);
        document.getElementById('btn-ads').style.backgroundColor = isADS ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.6)';
        camera.updateProjectionMatrix();
    });

    document.getElementById('btn-swap').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const slots = ['main', 'sub', 'melee'];
        let idx = slots.indexOf(inventory.currentSlot);
        equipWeapon(slots[(idx + 1) % slots.length]);
    });

    // グレネード修正版
    document.getElementById('btn-grenade').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const gMesh = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), new THREE.MeshStandardMaterial({ color: 0x00cc00, roughness: 0.3 }));
        gMesh.position.copy(cameraContainer.position);
        gMesh.position.y += 1.6;
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        scene.add(gMesh);
        grenades.push({ mesh: gMesh, vel: dir.multiplyScalar(0.5).add(new THREE.Vector3(0, 0.2, 0)), timer: 120 });
    });

    // --- ゲーム進行 ---
    document.getElementById('start-btn').addEventListener('click', () => {
        inventory.main = document.getElementById('sel-primary').value;
        inventory.sub = document.getElementById('sel-secondary').value;
        equipWeapon('main');
        
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('ui-layer').style.display = 'block';
        
        // 初期Bot配置
        for(let i=0; i<10; i++) spawnBot();
        
        isPlaying = true;
        cameraContainer.position.set(0, 1.6, 0);
        player.yaw = 0; player.pitch = 0;
        animate();
        if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(e=>{});
    });

    function checkWin() {
        if(bots.length <= 0) {
            isPlaying = false;
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('clear-screen').style.display = 'flex';
        }
    }

    document.getElementById('restart-btn').addEventListener('click', () => {
        document.getElementById('clear-screen').style.display = 'none';
        document.getElementById('title-screen').style.display = 'flex';
        // リセット処理
        bots.forEach(b => scene.remove(b)); bots.length = 0;
        deathBoxes.forEach(b => scene.remove(b)); deathBoxes.length = 0;
    });

    // --- メインループ ---
    function animate() {
        if (!isPlaying) return;
        requestAnimationFrame(animate);

        handleShooting();

        // 視点反映
        cameraContainer.rotation.y = player.yaw;
        camera.rotation.x = player.pitch;

        // 移動
        if (touchL.active) {
            let dx = touchL.x - touchL.sx, dy = touchL.y - touchL.sy;
            let moveZ = Math.max(-1, Math.min(1, dy / 50));
            let moveX = Math.max(-1, Math.min(1, dx / 50));
            let spd = dy < -40 ? player.speed * 1.8 : player.speed; // ダッシュ
            
            const fw = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), player.yaw);
            const rt = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), player.yaw);
            cameraContainer.position.add(fw.multiplyScalar(-moveZ * spd)).add(rt.multiplyScalar(moveX * spd));
        }

        // 重力とマップ境界
        player.velY -= 0.015;
        cameraContainer.position.y += player.velY;
        if(cameraContainer.position.y < 1.6) { cameraContainer.position.y = 1.6; player.velY = 0; }
        cameraContainer.position.x = Math.max(-48, Math.min(48, cameraContainer.position.x));
        cameraContainer.position.z = Math.max(-48, Math.min(48, cameraContainer.position.z));

        // デスボックス取得 (近づいたら弾薬補充)
        for(let i = deathBoxes.length - 1; i >= 0; i--) {
            if(cameraContainer.position.distanceTo(deathBoxes[i].position) < 2) {
                if(currentGun && currentGun.type !== 'melee') {
                    currentGun.reserve += WEAPONS[currentGun.name].mag; // 1マガジン分取得
                    updateHUD();
                }
                scene.remove(deathBoxes[i]);
                deathBoxes.splice(i, 1);
            }
        }

        // Bot AI
        bots.forEach(bot => {
            const dx = cameraContainer.position.x - bot.position.x;
            const dz = cameraContainer.position.z - bot.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            if(dist > 3) {
                bot.position.x += (dx/dist) * 0.04;
                bot.position.z += (dz/dist) * 0.04;
            }
            bot.lookAt(cameraContainer.position.x, bot.position.y, cameraContainer.position.z);
        });

        // 曳光弾
        for(let i = tracers.length - 1; i >= 0; i--) {
            const t = tracers[i];
            t.mesh.position.add(t.dir.clone().multiplyScalar(5)); // 弾速
            t.life--;
            if(t.life <= 0) { scene.remove(t.mesh); tracers.splice(i, 1); }
        }

        // ヒットエフェクト
        for(let i = hitEffects.length - 1; i >= 0; i--) {
            const h = hitEffects[i];
            h.mesh.scale.addScalar(0.1);
            h.mesh.material.opacity -= 0.1;
            h.life--;
            if(h.life <= 0) { scene.remove(h.mesh); hitEffects.splice(i, 1); }
        }

        // グレネード修正版 (逆ループで安全に配列操作)
        for(let i = grenades.length - 1; i >= 0; i--) {
            const g = grenades[i];
            g.mesh.position.add(g.vel);
            g.vel.y -= 0.01;
            if(g.mesh.position.y < 0.2) {
                g.mesh.position.y = 0.2;
                g.vel.x *= 0.8; g.vel.z *= 0.8; g.vel.y *= -0.5;
            }
            g.timer--;
            if(g.timer <= 0) {
                // 爆発エフェクト
                const exp = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16), new THREE.MeshBasicMaterial({ color: 0xff5500, transparent: true, opacity: 0.8 }));
                exp.position.copy(g.mesh.position);
                scene.add(exp);
                setTimeout(() => scene.remove(exp), 150);

                // 配列の削除を安全に行うため逆順ループ
                for(let j = bots.length - 1; j >= 0; j--) {
                    if(g.mesh.position.distanceTo(bots[j].position) < 6) {
                        bots[j].health -= 120;
                        if(bots[j].health <= 0) {
                            spawnDeathBox(bots[j].position);
                            scene.remove(bots[j]);
                            bots.splice(j, 1);
                        }
                    }
                }
                updateHUD();
                checkWin();
                scene.remove(g.mesh);
                grenades.splice(i, 1);
            }
        }

        renderer.render(scene, camera);
    }
</script>
</body>
