<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Warzone V4.3</title>
    <style>
        :root { --primary: #00ff00; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); touch-action: none; font-family: 'Arial', sans-serif; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* HUD & Crosshair */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #crosshair-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); border: 2px solid rgba(0,255,0,0.5); border-radius: 50%; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; background: #0f0; transform: translate(-50%, -50%); }
        
        /* 円形プログレスバー */
        #progress-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(rgba(255,255,255,0.8) 0%, transparent 0%); -webkit-mask: radial-gradient(transparent 55%, black 56%); mask: radial-gradient(transparent 55%, black 56%); display: none; }

        /* 透明なヒットマーカー */
        #hit-marker { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; transform: translate(-50%, -50%); display: none; background: transparent; }
        .hm-line { position: absolute; top: 50%; left: 50%; width: 40px; height: 3px; background: #fff; box-shadow: 0 0 4px rgba(0,0,0,0.8); }
        .hm-line:nth-child(1) { transform: translate(-50%, -50%) rotate(45deg); }
        .hm-line:nth-child(2) { transform: translate(-50%, -50%) rotate(-45deg); }

        #timer { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 2rem; color: #fff; font-weight: bold; text-shadow: 2px 2px #000; z-index: 20;}
        
        /* ミニマップ & フルマップ */
        #minimap-container { position: absolute; top: 20px; left: 20px; width: 130px; height: 130px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; overflow: hidden; background: rgba(0,0,0,0.8); pointer-events: auto; transition: all 0.3s ease; z-index: 15; }
        #minimap-container.full-map { top: 10%; left: 10%; width: 80%; height: 80%; border-radius: 10px; background: rgba(0,0,0,0.9); }
        #minimap-player { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: #0f0; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; box-shadow: 0 0 5px #0f0; transition: all 0.3s; }
        #minimap-container.full-map #minimap-player { width: 12px; height: 12px; }
        #minimap-canvas { width: 100%; height: 100%; }

        /* NVG */
        #nvg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; pointer-events: none; z-index: 5; }
        .nvg-green { background: rgba(0, 255, 0, 0.15); box-shadow: inset 0 0 100px rgba(0,0,0,0.8); backdrop-filter: brightness(1.5) contrast(1.2) sepia(1) hue-rotate(80deg); }
        .nvg-gray { background: rgba(255, 255, 255, 0.05); backdrop-filter: grayscale(1) brightness(1.2); }
        .nvg-thermal { background: rgba(0, 0, 100, 0.1); backdrop-filter: invert(0.8) hue-rotate(180deg) brightness(1.2); }

        /* 操作パネル */
        .controls { position: absolute; bottom: 0; width: 100%; height: 100%; pointer-events: none; }
        .btn { pointer-events: auto; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); border-radius: 10px; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; backdrop-filter: blur(2px); }
        .btn:active { background: rgba(255,255,255,0.4); }
        
        #btn-shoot { position: absolute; bottom: 60px; right: 60px; width: 110px; height: 110px; border-radius: 50%; background: rgba(255,0,0,0.3); border: 3px solid #f00; font-size: 1.2rem; }
        #btn-ads { position: absolute; bottom: 190px; right: 60px; width: 70px; height: 70px; border-radius: 50%; font-size: 1rem; border-color: #0f0; }
        #btn-jump { position: absolute; bottom: 60px; right: 190px; width: 60px; height: 60px; border-radius: 50%; font-size: 0.8rem; }
        #btn-nade { position: absolute; bottom: 140px; right: 180px; width: 60px; height: 60px; border-radius: 50%; font-size: 0.8rem; background: rgba(255,165,0,0.3); border-color: orange;}
        #btn-reload { position: absolute; bottom: 270px; right: 60px; width: 60px; height: 60px; border-radius: 50%; font-size: 0.8rem; }
        #btn-nvg { position: absolute; top: 20px; right: 20px; width: 80px; height: 40px; font-size: 0.8rem; display: none; z-index: 20; }
        
        #weapon-hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; color: white; text-shadow: 1px 1px 2px #000; }
        #joystick-base { position: absolute; bottom: 60px; left: 60px; width: 140px; height: 140px; background: rgba(255,255,255,0.05); border-radius: 50%; display: none; border: 1px solid rgba(255,255,255,0.2); }
        #joystick-handle { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; z-index: 100; color: #fff; pointer-events: auto; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="game-hud" class="overlay" style="display:none;">
        <div id="nvg-overlay"></div>
        
        <div id="crosshair-container">
            <div id="progress-ring"></div>
            <div id="crosshair"></div>
            <div id="hit-marker"><div class="hm-line"></div><div class="hm-line"></div></div>
        </div>
        
        <div id="timer">05:00</div>
        
        <div id="minimap-container">
            <div id="minimap-player"></div>
            <canvas id="minimap-canvas"></canvas>
        </div>
        
        <div id="btn-nvg" class="btn">NVG OFF</div>

        <div id="weapon-hud">
            <h2 id="weapon-name" style="margin:0; font-size:1.5rem; color:var(--primary);">M4A1 Custom</h2>
            <div id="ammo-display" style="font-size:2.5rem; font-weight:bold;">30 / 180</div>
        </div>

        <div class="controls">
            <div id="btn-shoot" class="btn">FIRE</div>
            <div id="btn-ads" class="btn">ADS</div>
            <div id="btn-jump" class="btn">JUMP</div>
            <div id="btn-nade" class="btn">FRAG</div>
            <div id="btn-reload" class="btn">RELOAD</div>
            <div id="joystick-base"><div id="joystick-handle"></div></div>
        </div>
    </div>

    <div id="title-screen" class="screen">
        <h1 style="color:var(--primary); font-size:3.5rem; margin:0; text-align:center;">TACTICAL ELITE V4.3</h1>
        <p style="letter-spacing: 2px;">MAP & ORDNANCE UPDATE</p>
        <div style="margin:30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; border: 1px solid #333;">
            <select id="time-select" style="padding:10px; background:#000; color:#0f0; border: 1px solid #0f0; font-size: 1.2rem; outline: none;">
                <option value="day" selected>DAY (Blue Sky)</option>
                <option value="night">NIGHT (Stealth)</option>
            </select>
        </div>
        <button id="btn-deploy" style="padding:15px 60px; font-size:1.5rem; background:var(--primary); color:#000; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">DEPLOY</button>
    </div>

    <div id="death-screen" class="screen" style="display: none; background: rgba(50,0,0,0.9);">
        <h1 style="color:#ff3333; font-size:4rem; margin:0;">K.I.A.</h1>
        <p>MISSION FAILED</p>
        <button onclick="location.reload()" style="padding:15px 40px; margin-top: 20px; font-size:1.2rem; cursor:pointer;">RETRY</button>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/**
 * --- CORE ENGINE ---
 */
const scene = new THREE.Scene();
const cameraFOV = { current: 75, target: 75 }; 
const camera = new THREE.PerspectiveCamera(cameraFOV.current, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;

const playerRig = new THREE.Object3D();
scene.add(playerRig);
playerRig.add(camera);
playerRig.position.set(0, 1.7, 0);

let isPlaying = false, isDay = true, gameTime = 300, playerHP = 100;
let isADS = false;

const collidableWalls = [];
const hittableTargets = [];
const mapBuildings = []; // ミニマップ描画用データ

/**
 * --- WORLD & ENVIRONMENT ---
 */
function createWorld(mode) {
    if(mode === 'day') {
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 250);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(100, 200, 100); dirLight.castShadow = true;
        scene.add(dirLight);
        const sun = new THREE.Mesh(new THREE.SphereGeometry(15, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        sun.position.set(150, 200, -150); scene.add(sun);
    } else {
        scene.background = new THREE.Color(0x05050a);
        scene.fog = new THREE.Fog(0x05050a, 10, 100);
        scene.add(new THREE.AmbientLight(0xffffff, 0.05));
    }

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: mode === 'day' ? 0x4d5c31 : 0x1a1c0d, roughness: 0.9 }));
    ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
    scene.add(ground);

    for(let i=0; i<30; i++) createBuilding((Math.random()-0.5)*400, (Math.random()-0.5)*400);
}

function createBuilding(x, z) {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({color: 0x666666, roughness: 0.8});
    
    const walls = [
        new THREE.Mesh(new THREE.BoxGeometry(10, 6, 0.5), mat), 
        new THREE.Mesh(new THREE.BoxGeometry(10, 6, 0.5), mat), 
        new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 10), mat), 
        new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 6), mat)   
    ];
    walls[0].position.set(0, 3, 5); walls[1].position.set(0, 3, -5);
    walls[2].position.set(5, 3, 0); walls[3].position.set(-5, 3, 2);

    walls.forEach(w => {
        w.castShadow = true; w.receiveShadow = true;
        group.add(w); collidableWalls.push(w);
    });
    
    const roof = new THREE.Mesh(new THREE.BoxGeometry(11, 0.5, 11), mat);
    roof.position.set(0, 6.25, 0); roof.castShadow = true; group.add(roof);

    group.position.set(x, 0, z);
    scene.add(group);
    
    // マップ描画用に保存
    mapBuildings.push({x: x, z: z, w: 10, h: 10});
}

/**
 * --- BOT SYSTEM ---
 */
const bots = [];
function spawnBot() {
    const group = new THREE.Group();
    const matBody = new THREE.MeshStandardMaterial({color: 0x333333});
    const matSkin = new THREE.MeshStandardMaterial({color: 0xffccaa});
    
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), matSkin); head.position.y = 1.6; head.userData = { isHead: true, botGroup: group };
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.3), matBody); body.position.y = 1.0; body.userData = { isHead: false, botGroup: group };
    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), matBody); legL.position.set(-0.2, 0.3, 0); legL.userData = { isHead: false, botGroup: group };
    const legR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), matBody); legR.position.set(0.2, 0.3, 0); legR.userData = { isHead: false, botGroup: group };
    
    group.add(head, body, legL, legR);
    group.position.set((Math.random()-0.5)*200, 0, (Math.random()-0.5)*200);
    group.hp = 100; group.lastShot = Date.now() + Math.random()*2000;
    
    hittableTargets.push(head, body, legL, legR);
    bots.push(group); scene.add(group);
}

/**
 * --- WEAPON & PROGRESS UI ---
 */
const weapon = { name: "M4A1", mag: 30, curMag: 30, res: 180, rate: 100, lastFire: 0, reloading: false, reloadTime: 2000, reloadStart: 0 };
const gunGroup = new THREE.Group();

// ADS時のアライメント修正：アイアンサイトの先端が画面中央(0,0)に来るようオフセット調整
const gunIdlePos = new THREE.Vector3(0.25, -0.25, -0.4);
const gunADSPos = new THREE.Vector3(0, -0.125, -0.25); 
gunGroup.position.copy(gunIdlePos);
camera.add(gunGroup);

const gunMat = new THREE.MeshStandardMaterial({color: 0x222222, metalness: 0.6, roughness: 0.4});
const receiver = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.12, 0.4), gunMat);
const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.4), gunMat); barrel.rotation.x = Math.PI/2; barrel.position.set(0, 0.02, -0.4);
const magMesh = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.15, 0.08), gunMat); magMesh.position.set(0, -0.1, -0.05);

// アイアンサイト（後部と前部）
const sightRear = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.04, 0.02), new THREE.MeshStandardMaterial({color: 0x111111})); sightRear.position.set(0, 0.08, 0.15);
const sightFront = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.05, 0.02), new THREE.MeshStandardMaterial({color: 0x111111})); sightFront.position.set(0, 0.085, -0.58);
gunGroup.add(receiver, barrel, magMesh, sightRear, sightFront);

function setProgressUI(percent) {
    const ring = document.getElementById('progress-ring');
    if(percent <= 0 || percent >= 1) { ring.style.display = 'none'; return; }
    ring.style.display = 'block';
    ring.style.background = `conic-gradient(rgba(255,255,255,0.9) ${percent * 100}%, transparent 0%)`;
}

function startReload() {
    if(weapon.reloading || weapon.res <= 0 || weapon.curMag === weapon.mag) return;
    weapon.reloading = true;
    weapon.reloadStart = Date.now();
    setTimeout(() => {
        const need = weapon.mag - weapon.curMag; const take = Math.min(need, weapon.res);
        weapon.curMag += take; weapon.res -= take;
        weapon.reloading = false;
        updateHUD(); setProgressUI(0);
    }, weapon.reloadTime);
}

function showHitMarker(type) {
    const hm = document.getElementById('hit-marker');
    const lines = hm.querySelectorAll('.hm-line');
    let color = '#ffffff'; // hit
    if(type === 'head') color = '#db8f25'; // オレンジ寄り黄色
    else if(type === 'kill') color = '#ff0000'; // 赤
    
    lines.forEach(l => l.style.backgroundColor = color);
    hm.style.display = 'block';
    setTimeout(() => hm.style.display = 'none', 150);
}

function updateHUD() {
    document.getElementById('ammo-display').innerText = `${weapon.curMag} / ${weapon.res}`;
    // ADS時もクロスヘアは消さない
}

function shoot() {
    if(weapon.reloading) return;
    if(weapon.curMag <= 0) { startReload(); return; }

    const now = Date.now();
    if(now - weapon.lastFire < weapon.rate) return;
    weapon.lastFire = now; weapon.curMag--; updateHUD();

    gunGroup.position.z += isADS ? 0.02 : 0.05; pitch += isADS ? 0.005 : 0.015;

    const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
    const ray = new THREE.Raycaster(camera.getWorldPosition(new THREE.Vector3()), dir);
    const hits = ray.intersectObjects(hittableTargets, false);

    if(hits.length > 0) {
        const hitObj = hits[0].object; const botData = hitObj.userData;
        if(botData && botData.botGroup) {
            const botGroup = botData.botGroup;
            let damage = 30; let type = 'hit';
            if(botData.isHead) { damage *= 2.5; type = 'head'; }
            botGroup.hp -= damage;

            const origColor = hitObj.material.color.getHex(); hitObj.material.color.setHex(0xffffff);
            setTimeout(() => { if(hitObj.material) hitObj.material.color.setHex(origColor); }, 50);

            if(botGroup.hp <= 0) {
                type = 'kill'; scene.remove(botGroup); bots.splice(bots.indexOf(botGroup), 1);
                botGroup.children.forEach(c => { const idx = hittableTargets.indexOf(c); if(idx > -1) hittableTargets.splice(idx, 1); });
                spawnBot();
            }
            showHitMarker(type);
        }
    }
}

/**
 * --- ADVANCED GRENADES ---
 */
const grenades = [];
let nadeState = 'ready'; // ready, holding, cooldown
let nadeHoldStart = 0;
let nadeCooldownStart = 0;
const NADE_FUSE = 4500; // 起爆まで4.5秒
const NADE_CD = 4000;   // クールダウン4秒

// 軌道描画用ライン
const trajGeo = new THREE.BufferGeometry();
const trajMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.5, gapSize: 0.2 });
const trajLine = new THREE.Line(trajGeo, trajMat);
trajLine.computeLineDistances();
scene.add(trajLine);

function createGrenadeMesh() {
    const group = new THREE.Group();
    // グレネード本体（オリーブドラブ）
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.2, 16), new THREE.MeshStandardMaterial({color: 0x4B5320, roughness: 0.9}));
    // 信管部分（グレー）
    const top = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.08, 8), new THREE.MeshStandardMaterial({color: 0x888888, metalness: 0.8}));
    top.position.y = 0.12;
    group.add(body, top);
    return group;
}

function throwNade(holdTime) {
    const nade = createGrenadeMesh();
    nade.position.copy(camera.getWorldPosition(new THREE.Vector3()));
    const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
    dir.y += 0.3; dir.normalize();
    
    nade.velocity = dir.multiplyScalar(0.4); 
    nade.fuse = NADE_FUSE - holdTime; // 握っていた時間を引く
    
    scene.add(nade); grenades.push(nade);
}

function explodeNade(pos) {
    const expGeo = new THREE.SphereGeometry(5, 16, 16);
    const expMat = new THREE.MeshBasicMaterial({color: 0xffaa00, transparent: true, opacity: 0.8});
    const exp = new THREE.Mesh(expGeo, expMat);
    exp.position.copy(pos); scene.add(exp);
    
    // 自爆判定
    if(pos.distanceTo(playerRig.position) < 6) {
        playerHP -= 50;
        document.getElementById('game-hud').style.backgroundColor = 'rgba(255,0,0,0.5)';
        setTimeout(()=>document.getElementById('game-hud').style.backgroundColor = 'transparent', 200);
        if(playerHP <= 0) { isPlaying = false; document.getElementById('death-screen').style.display = 'flex'; }
    }

    // BOT判定
    bots.forEach(bot => {
        if(bot.position.distanceTo(pos) < 7) {
            bot.hp -= 120;
            if(bot.hp <= 0) {
                scene.remove(bot); bots.splice(bots.indexOf(bot), 1);
                bot.children.forEach(c => { const idx = hittableTargets.indexOf(c); if(idx > -1) hittableTargets.splice(idx, 1); });
                spawnBot(); showHitMarker('kill');
            }
        }
    });
    
    let fade = setInterval(() => {
        exp.scale.addScalar(0.2); exp.material.opacity -= 0.1;
        if(exp.material.opacity <= 0) { scene.remove(exp); clearInterval(fade); }
    }, 30);
}

function handleGrenades(dt) {
    // 軌道予測線の描画
    if(nadeState === 'holding') {
        const holdTime = Date.now() - nadeHoldStart;
        if(holdTime >= NADE_FUSE) {
            // 手元で爆発
            nadeState = 'cooldown'; nadeCooldownStart = Date.now();
            explodeNade(camera.getWorldPosition(new THREE.Vector3()));
            trajLine.visible = false;
        } else {
            // 軌道計算
            const points = [];
            let p = camera.getWorldPosition(new THREE.Vector3());
            let v = camera.getWorldDirection(new THREE.Vector3());
            v.y += 0.3; v.normalize().multiplyScalar(0.4);
            for(let i=0; i<40; i++) {
                points.push(p.clone());
                v.y -= 0.01; // 重力
                p.add(v);
                if(p.y <= 0.1) break; // 地面反射は簡易化のため軌道線では考慮しない
            }
            trajGeo.setFromPoints(points);
            trajLine.computeLineDistances();
            trajLine.visible = true;
        }
    } else {
        trajLine.visible = false;
    }

    // クールダウンUI更新
    if(nadeState === 'cooldown') {
        const cdElapsed = Date.now() - nadeCooldownStart;
        if(cdElapsed >= NADE_CD) {
            nadeState = 'ready'; setProgressUI(0);
            document.getElementById('btn-nade').style.opacity = '1';
        } else {
            setProgressUI(1 - (cdElapsed / NADE_CD));
            document.getElementById('btn-nade').style.opacity = '0.5';
        }
    }

    // 飛んでいるグレネードの処理
    for(let i = grenades.length - 1; i >= 0; i--) {
        const n = grenades[i];
        n.velocity.y -= 0.01; n.position.add(n.velocity);
        
        if(n.position.y <= 0.1) {
            n.position.y = 0.1; n.velocity.y *= -0.5; 
            n.velocity.x *= 0.8; n.velocity.z *= 0.8; 
        }
        
        n.fuse -= 16.6; // 約60FPS前提のミリ秒減算
        if(n.fuse <= 0) {
            explodeNade(n.position);
            scene.remove(n); grenades.splice(i, 1);
        }
    }
}

/**
 * --- INPUTS & MOVEMENT ---
 */
let yaw = 0, pitch = 0;
const moveCtrl = { id: null, active: false, startX: 0, startY: 0, dx: 0, dy: 0 };
const lookCtrl = { id: null, active: false, lastX: 0, lastY: 0 };
const shootCtrl = { id: null, active: false, lastX: 0, lastY: 0 };
let isAutoFiring = false, vy = 0, isGrounded = true;

function moveWithCollision(moveVec) {
    const nextPos = playerRig.position.clone().add(moveVec);
    const origin = playerRig.position.clone(); origin.y = 1.0; 
    const dir = moveVec.clone().normalize();
    const dist = moveVec.length() + 0.3; 
    const ray = new THREE.Raycaster(origin, dir, 0, dist);
    const hits = ray.intersectObjects(collidableWalls, false);
    if(hits.length === 0) playerRig.position.copy(nextPos);
}

window.addEventListener('touchstart', (e) => {
    for(let t of e.changedTouches) {
        if(t.target.id === 'btn-shoot') { e.preventDefault(); isAutoFiring = true; shootCtrl.id = t.identifier; shootCtrl.active = true; shootCtrl.lastX = t.clientX; shootCtrl.lastY = t.clientY; continue; }
        if(t.target.closest('.btn') || t.target.closest('#minimap-container')) continue;

        if(t.clientX < window.innerWidth / 2 && !moveCtrl.active) {
            moveCtrl.active = true; moveCtrl.id = t.identifier; moveCtrl.startX = t.clientX; moveCtrl.startY = t.clientY;
            const js = document.getElementById('joystick-base');
            js.style.display = 'block'; js.style.left = (t.clientX - 70) + 'px'; js.style.top = (t.clientY - 70) + 'px';
        } else if(!lookCtrl.active) {
            lookCtrl.active = true; lookCtrl.id = t.identifier; lookCtrl.lastX = t.clientX; lookCtrl.lastY = t.clientY;
        }
    }
}, {passive: false});

window.addEventListener('touchmove', (e) => {
    for(let t of e.changedTouches) {
        if(t.identifier === moveCtrl.id) {
            moveCtrl.dx = (t.clientX - moveCtrl.startX) / 50; moveCtrl.dy = (t.clientY - moveCtrl.startY) / 50;
            const dist = Math.sqrt(moveCtrl.dx**2 + moveCtrl.dy**2); if(dist > 1) { moveCtrl.dx /= dist; moveCtrl.dy /= dist; }
            document.getElementById('joystick-handle').style.transform = `translate(calc(-50% + ${moveCtrl.dx*40}px), calc(-50% + ${moveCtrl.dy*40}px))`;
        }
        const sens = isADS ? 0.002 : 0.005;
        if(t.identifier === lookCtrl.id) { yaw -= (t.clientX - lookCtrl.lastX) * sens; pitch -= (t.clientY - lookCtrl.lastY) * sens; pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch)); lookCtrl.lastX = t.clientX; lookCtrl.lastY = t.clientY; }
        if(t.identifier === shootCtrl.id) { yaw -= (t.clientX - shootCtrl.lastX) * sens; pitch -= (t.clientY - shootCtrl.lastY) * sens; pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch)); shootCtrl.lastX = t.clientX; shootCtrl.lastY = t.clientY; }
    }
}, {passive: false});

window.addEventListener('touchend', (e) => {
    for(let t of e.changedTouches) {
        if(t.identifier === moveCtrl.id) { moveCtrl.active = false; moveCtrl.id = null; moveCtrl.dx = 0; moveCtrl.dy = 0; document.getElementById('joystick-base').style.display = 'none'; }
        if(t.identifier === lookCtrl.id) { lookCtrl.active = false; lookCtrl.id = null; }
        if(t.identifier === shootCtrl.id) { shootCtrl.active = false; shootCtrl.id = null; isAutoFiring = false; }
    }
});

document.getElementById('btn-jump').ontouchstart = (e) => { e.preventDefault(); if(isGrounded) { vy = 0.22; isGrounded = false; } };
document.getElementById('btn-reload').ontouchstart = (e) => { e.preventDefault(); startReload(); };
document.getElementById('btn-ads').ontouchstart = (e) => { 
    e.preventDefault(); isADS = !isADS; cameraFOV.target = isADS ? 40 : 75; 
    document.getElementById('btn-ads').style.backgroundColor = isADS ? 'rgba(0,255,0,0.3)' : 'rgba(255,255,255,0.15)'; updateHUD();
};

// グレネードボタン（長押し対応）
document.getElementById('btn-nade').ontouchstart = (e) => { 
    e.preventDefault(); 
    if(nadeState === 'ready') { nadeState = 'holding'; nadeHoldStart = Date.now(); }
};
document.getElementById('btn-nade').ontouchend = (e) => { 
    e.preventDefault(); 
    if(nadeState === 'holding') { 
        const holdTime = Date.now() - nadeHoldStart;
        throwNade(holdTime); 
        nadeState = 'cooldown'; nadeCooldownStart = Date.now(); 
    }
};

// マップのフルスクリーン切り替え
let isFullMap = false;
document.getElementById('minimap-container').onclick = () => {
    isFullMap = !isFullMap;
    const container = document.getElementById('minimap-container');
    if(isFullMap) container.classList.add('full-map');
    else container.classList.remove('full-map');
    // UIの描画サイズを更新
    setTimeout(updateMinimap, 350); 
};

// NVG操作
const nvgModes = ['OFF', 'GREEN', 'GRAY', 'THERMAL'];
let curNvgIdx = 0;
document.getElementById('btn-nvg').onclick = () => {
    if(isDay) return;
    curNvgIdx = (curNvgIdx + 1) % nvgModes.length;
    const overlay = document.getElementById('nvg-overlay');
    const btn = document.getElementById('btn-nvg');
    overlay.className = ''; overlay.style.display = 'block';
    
    if(nvgModes[curNvgIdx] === 'OFF') overlay.style.display = 'none';
    else if(nvgModes[curNvgIdx] === 'GREEN') overlay.classList.add('nvg-green');
    else if(nvgModes[curNvgIdx] === 'GRAY') overlay.classList.add('nvg-gray');
    else if(nvgModes[curNvgIdx] === 'THERMAL') overlay.classList.add('nvg-thermal');
    
    btn.innerText = `NVG\n${nvgModes[curNvgIdx]}`;
};

/**
 * --- GAME LOOP ---
 */
function update() {
    if(!isPlaying) return;
    requestAnimationFrame(update);

    playerRig.rotation.y = yaw; camera.rotation.x = pitch;

    if(moveCtrl.active) {
        const speed = isADS ? 0.08 : 0.18; 
        const moveVec = new THREE.Vector3(moveCtrl.dx, 0, moveCtrl.dy).normalize().multiplyScalar(speed).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        moveWithCollision(moveVec);
        playerRig.position.x = Math.max(-240, Math.min(240, playerRig.position.x));
        playerRig.position.z = Math.max(-240, Math.min(240, playerRig.position.z));
    }

    if(!isGrounded) {
        vy -= 0.015; playerRig.position.y += vy;
        if(playerRig.position.y <= 1.7) { playerRig.position.y = 1.7; vy = 0; isGrounded = true; }
    }

    if(isAutoFiring) shoot();

    // 武器モーション補間
    cameraFOV.current += (cameraFOV.target - cameraFOV.current) * 0.15; camera.fov = cameraFOV.current; camera.updateProjectionMatrix();

    if(weapon.reloading) {
        const p = (Date.now() - weapon.reloadStart) / weapon.reloadTime;
        gunGroup.rotation.x = Math.sin(p * Math.PI * 2) * 0.5;
        setProgressUI(p); // リロードプログレス
    } else {
        gunGroup.rotation.x *= 0.8; gunGroup.rotation.z *= 0.8;
        gunGroup.position.z += ( (isADS ? gunADSPos.z : gunIdlePos.z) - gunGroup.position.z ) * 0.2;
        const targetPos = isADS ? gunADSPos : gunIdlePos;
        gunGroup.position.x += (targetPos.x - gunGroup.position.x) * 0.2;
        gunGroup.position.y += (targetPos.y - gunGroup.position.y) * 0.2;
    }

    handleGrenades();

    // BOT AI
    const now = Date.now();
    bots.forEach(bot => {
        const dist = bot.position.distanceTo(playerRig.position);
        bot.lookAt(playerRig.position.x, bot.position.y, playerRig.position.z);
        if(dist > 12) {
            const dir = new THREE.Vector3().subVectors(playerRig.position, bot.position).normalize();
            dir.y = 0; bot.position.add(dir.multiplyScalar(0.04));
        } else {
            if(now - bot.lastShot > 1500) {
                bot.lastShot = now;
                if(Math.random() < 0.3) {
                    playerHP -= 10;
                    document.getElementById('game-hud').style.backgroundColor = 'rgba(255,0,0,0.3)';
                    setTimeout(()=>document.getElementById('game-hud').style.backgroundColor = 'transparent', 100);
                    if(playerHP <= 0) { isPlaying = false; document.getElementById('death-screen').style.display = 'flex'; }
                }
            }
        }
    });

    gameTime -= 1/60;
    if(gameTime <= 0) { alert("TIME UP!"); location.reload(); }
    document.getElementById('timer').innerText = `${Math.floor(gameTime / 60).toString().padStart(2,'0')}:${Math.floor(gameTime % 60).toString().padStart(2,'0')}`;

    updateMinimap();
    renderer.render(scene, camera);
}

function updateMinimap() {
    const canvas = document.getElementById('minimap-canvas');
    const container = document.getElementById('minimap-container');
    // 解像度を動的に合わせる
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    const ctx = canvas.getContext('2d');
    const size = canvas.width;
    const center = size / 2;
    
    // スケール調整（フルマップ時は広範囲を表示）
    const scale = isFullMap ? (size / 500) : (size / 150); 
    
    ctx.clearRect(0,0,size,size);
    
    // 背景
    ctx.beginPath();
    if(!isFullMap) ctx.arc(center, center, center, 0, Math.PI*2);
    else ctx.rect(0,0,size,size);
    ctx.fillStyle = isDay ? '#3d5c21' : '#111';
    ctx.fill();

    // 建物の描画
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    mapBuildings.forEach(b => {
        const dx = (b.x - playerRig.position.x) * scale;
        const dz = (b.z - playerRig.position.z) * scale;
        const drawX = center + dx;
        const drawZ = center + dz;
        const w = b.w * scale; const h = b.h * scale;
        
        // 円の内側か、フルマップ時のみ描画
        if(isFullMap || Math.sqrt(dx*dx + dz*dz) < center) {
            ctx.fillRect(drawX - w/2, drawZ - h/2, w, h);
        }
    });

    // 敵の描画
    ctx.fillStyle = 'red';
    bots.forEach(b => {
        const dx = (b.position.x - playerRig.position.x) * scale;
        const dz = (b.position.z - playerRig.position.z) * scale;
        if(isFullMap || Math.sqrt(dx*dx + dz*dz) < center) {
            ctx.beginPath(); ctx.arc(center+dx, center+dz, isFullMap?4:3, 0, Math.PI*2); ctx.fill();
        }
    });
    
    // 自機の向き
    document.getElementById('minimap-player').style.transform = `translate(-50%, -50%) rotate(${-yaw}rad)`;
}

document.getElementById('btn-deploy').onclick = () => {
    isDay = document.getElementById('time-select').value === 'day';
    createWorld(isDay ? 'day' : 'night');
    for(let i=0; i<15; i++) spawnBot();
    
    if(!isDay) document.getElementById('btn-nvg').style.display = 'flex';
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('game-hud').style.display = 'block';
    isPlaying = true; update();
};
</script>
