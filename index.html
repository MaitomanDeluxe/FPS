<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Warzone V6.0 - Moddable</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        :root { --wb-dark: rgba(10, 10, 10, 0.9); --wb-border: 2px solid #555; --primary: #00ffcc; --accent: #ff3333; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Share Tech Mono', monospace; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* HUD & UI */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        #top-hud { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: var(--wb-dark); border: var(--wb-border); padding: 5px 20px; border-radius: 5px; color: white; }
        
        #health-hud { position: absolute; bottom: 20px; left: 20px; background: var(--wb-dark); border: var(--wb-border); padding: 10px; border-radius: 5px; width: 180px; color: white; }
        .hp-bar-bg { width: 100%; height: 12px; background: #222; margin-top: 5px; border: 1px solid #444; position: relative; }
        #hp-bar-fill { width: 100%; height: 100%; background: #00ff44; transition: width 0.3s; }
        
        #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; pointer-events: auto; }
        .slot { width: 45px; height: 45px; background: var(--wb-dark); border: var(--wb-border); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.6rem; opacity: 0.6; }
        .slot.active { opacity: 1; border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 0 10px var(--primary); }
        .slot span { font-size: 1.1rem; }

        /* Crosshair */
        #crosshair-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
        #ch-dot { width: 4px; height: 4px; background: #fff; border-radius: 50%; position: absolute; }
        .ch-line { position: absolute; background: #fff; border-radius: 1px; transition: transform 0.1s; }
        .ch-v { width: 2px; height: 12px; } .ch-h { width: 12px; height: 2px; }
        #ch-t { transform: translateY(-15px); } #ch-b { transform: translateY(15px); }
        #ch-l { transform: translateX(-15px); } #ch-r { transform: translateX(15px); }

        /* Damage Indicator */
        #dmg-indicator { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hit-arc { position: absolute; top: 50%; left: 50%; width: 200px; height: 200px; border: 4px solid transparent; border-top-color: var(--accent); border-radius: 50%; transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.5s; }

        /* NVG Overlays */
        #nvg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; display: none; }
        .nvg-green { background: rgba(0, 255, 50, 0.15); backdrop-filter: brightness(2.5) contrast(1.2) sepia(1) hue-rotate(80deg); box-shadow: inset 0 0 100px #040; }
        .nvg-thermal { background: rgba(0, 0, 50, 0.2); backdrop-filter: brightness(1.5) contrast(1.5); }

        /* Mod Manager */
        #mod-manager { position: absolute; top: 50px; right: 10px; width: 200px; background: var(--wb-dark); border: var(--wb-border); color: #fff; padding: 10px; display: none; pointer-events: auto; z-index: 100; font-size: 0.8rem; }
        #mod-editor { position: fixed; top: 10%; left: 10%; width: 80%; height: 80%; background: #111; border: 2px solid var(--primary); z-index: 200; display: none; flex-direction: column; padding: 20px; pointer-events: auto; }
        textarea { flex: 1; background: #000; color: #0f0; border: 1px solid #444; font-family: monospace; padding: 10px; margin-bottom: 10px; }

        /* Buttons */
        .btn { pointer-events: auto; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); font-size: 0.8rem; }
        #btn-shoot { position: absolute; bottom: 100px; right: 40px; width: 85px; height: 85px; border-color: var(--accent); }
        #btn-crouch { position: absolute; bottom: 40px; right: 140px; width: 55px; height: 55px; }
        #btn-ads { position: absolute; bottom: 200px; right: 40px; width: 55px; height: 55px; }
        
        #reload-progress { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; pointer-events: none; display: none; }
        svg circle { fill: none; stroke: var(--primary); stroke-width: 4; stroke-dasharray: 100; stroke-dashoffset: 100; transform: rotate(-90deg); transform-origin: center; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; z-index: 100; color: #fff; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="game-hud" class="overlay">
        <div id="nvg-overlay"></div>
        <div id="dmg-indicator"><div class="hit-arc" id="hit-arc"></div></div>
        
        <div id="top-hud">
            <div>SCORE: <span id="score">0</span></div>
            <div id="timer">05:00</div>
            <div>ENEMY: <span id="enemy-count">10</span></div>
        </div>

        <div id="crosshair-container">
            <div id="ch-dot"></div>
            <div id="ch-t" class="ch-line ch-v"></div>
            <div id="ch-b" class="ch-line ch-v"></div>
            <div id="ch-l" class="ch-line ch-h"></div>
            <div id="ch-r" class="ch-line ch-h"></div>
        </div>

        <div id="reload-progress"><svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="16" id="progress-circle"></circle></svg></div>

        <div id="health-hud">
            HP: <span id="hp-text">100</span>
            <div class="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        </div>

        <div id="hotbar">
            <div class="slot active" data-slot="0">1<span>🔫</span></div>
            <div class="slot" data-slot="1">2<span>🔫</span></div>
            <div class="slot" data-slot="2">3<span>🔪</span></div>
            <div class="slot" data-slot="3">4<span>💣</span></div>
            <div class="slot" data-slot="4">5<span>💊</span></div>
        </div>

        <div id="mod-manager">
            <strong>MOD MANAGER</strong><hr>
            <label><input type="checkbox" id="chk-esp"> ESP Box</label><br>
            <label><input type="checkbox" id="chk-aimbot"> AimAssist</label><br>
            <button onclick="document.getElementById('mod-editor').style.display='flex'">Open JS Console</button>
        </div>

        <div class="controls">
            <div id="btn-shoot" class="btn">FIRE</div>
            <div id="btn-ads" class="btn">ADS</div>
            <div id="btn-crouch" class="btn">CROUCH</div>
            <div id="btn-nvg" style="position:absolute; top:60px; left:10px; border-radius:5px; padding:5px; border:1px solid #555; pointer-events:auto;">NVG:OFF</div>
        </div>
    </div>

    <div id="title-screen" class="screen">
        <h1 style="color:var(--primary); margin:0;">WARZONE V6.0</h1>
        <p id="version-tag" style="color:#555; cursor:pointer;">v6.0.2-stable (info)</p>
        <div style="margin:20px; border:1px solid #333; padding:15px; background:#111;">
            ENEMIES: <select id="sel-enemies"><option value="10">10</option><option value="20">20</option><option value="999">ENDLESS</option></select>
            TIME: <select id="sel-time"><option value="day">DAY</option><option value="night">NIGHT</option></select>
        </div>
        <button id="btn-deploy" style="padding:15px 40px; background:var(--primary); border:none; color:#000; font-weight:bold; cursor:pointer;">DEPLOY</button>
        <button onclick="alert('Tactical Web FPS\nControls: JoyStick to Move, Drag Right to Aim.')" style="margin-top:10px; background:none; border:none; color:#777; font-size:0.7rem;">HELP</button>
    </div>

    <div id="mod-editor">
        <h3>JS MOD CONSOLE</h3>
        <textarea id="js-input" placeholder="// Write your JS here..."></textarea>
        <div>
            <button onclick="runMod()">EXECUTE</button>
            <button onclick="document.getElementById('mod-editor').style.display='none'">CLOSE</button>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/** --- CORE ENGINE --- */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);

const playerRig = new THREE.Object3D(); scene.add(playerRig);
playerRig.add(camera); playerRig.position.set(0, 1.7, 0);

let isPlaying = false, isDay = true, gameTime = 300, score = 0, enemiesRemaining = 10, playerHP = 100;
let yaw = 0, pitch = 0, vy = 0, isGrounded = true;
let stance = 'stand'; // stand, crouch, prone, slide
let moveSpeed = 0.15, spread = 0, targetSpread = 0;

/** --- WEAPONS & ITEMS --- */
const weapons = [
    { name:"M4A1", mag:30, cur:30, res:120, rate:100, dmg:25, type:'ar', reload:2000 },
    { name:"G17", mag:15, cur:15, res:60, rate:200, dmg:18, type:'hg', reload:1200 },
    { name:"KNIFE", mag:0, cur:0, res:0, rate:400, dmg:50, type:'melee', reload:0 },
    { name:"GRENADE", mag:1, cur:1, res:4, rate:1000, dmg:150, type:'nade', reload:3000 },
    { name:"MEDKIT", mag:1, cur:1, res:2, rate:5000, dmg:0, type:'med', reload:10000 } // Slot 5
];
let curWepIdx = 0, isADS = false, isReloading = false, isHealing = false;

// 銃のモデル（アイアンサイトが邪魔にならないよう調整）
const weaponGroups = [];
function createWeaponModels() {
    const mat = new THREE.MeshStandardMaterial({color:0x222222});
    // M4
    const m4 = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.1, 0.4), mat);
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.3), mat); barrel.rotation.x=Math.PI/2; barrel.position.z=-0.3;
    m4.add(body, barrel); m4.idlePos = new THREE.Vector3(0.2, -0.35, -0.4); m4.adsPos = new THREE.Vector3(0, -0.15, -0.25);
    weaponGroups.push(m4); camera.add(m4);
    
    // 他の武器は簡略化
    for(let i=1; i<5; i++) {
        const g = new THREE.Group(); g.add(new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.2), mat));
        g.idlePos = new THREE.Vector3(0.2, -0.3, -0.4); g.adsPos = new THREE.Vector3(0, -0.1, -0.2);
        weaponGroups.push(g); camera.add(g);
    }
}
createWeaponModels();

/** --- WORLD SETUP --- */
const envObjs = []; const bots = []; const hittableTargets = [];
function setupWorld() {
    if(isDay) {
        scene.background = new THREE.Color(0x87CEEB);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(50,100,50); scene.add(sun);
    } else {
        scene.background = new THREE.Color(0x010103);
        scene.add(new THREE.AmbientLight(0xffffff, 0.1));
    }
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(500,500), new THREE.MeshStandardMaterial({color: isDay?0x445533:0x111111}));
    ground.rotation.x = -Math.PI/2; scene.add(ground); envObjs.push(ground);

    for(let i=0; i<30; i++) {
        const h = 3+Math.random()*10;
        const b = new THREE.Mesh(new THREE.BoxGeometry(8,h,8), new THREE.MeshStandardMaterial({color:0x555555}));
        b.position.set((Math.random()-0.5)*200, h/2, (Math.random()-0.5)*200);
        scene.add(b); envObjs.push(b);
    }
}

function spawnBot() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.6, 0.4), new THREE.MeshStandardMaterial({color:0x333333}));
    body.position.y = 0.8; g.add(body);
    // HP Bar
    const hpBg = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.1), new THREE.MeshBasicMaterial({color:0x000000}));
    hpBg.position.y = 1.9; g.add(hpBg);
    const hpFill = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.1), new THREE.MeshBasicMaterial({color:0xff0000}));
    hpFill.position.y = 1.9; hpFill.position.z = 0.01; g.add(hpFill);

    g.position.set((Math.random()-0.5)*150, 0, (Math.random()-0.5)*150);
    g.hp = 100; g.hpFill = hpFill; g.isBot = true;
    scene.add(g); bots.push(g); hittableTargets.push(body);
    body.userData = { parent: g };
}

/** --- GAME LOGIC --- */
function switchWeapon(idx) {
    if(isReloading || isHealing) return;
    curWepIdx = idx;
    weaponGroups.forEach((g, i) => g.visible = (i === idx));
    document.querySelectorAll('.slot').forEach((s, i) => s.className = (i === idx) ? 'slot active' : 'slot');
    isADS = false;
}

function tryShoot() {
    const w = weapons[curWepIdx];
    if(w.cur <= 0 || isReloading || isHealing) { if(w.type!=='melee' && w.cur<=0) reload(); return; }
    
    if(w.type === 'med') { heal(); return; }

    w.cur--;
    const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
    // Spread calculation
    const currentSpread = (spread / 100) * (isADS ? 0.2 : 1.0);
    dir.x += (Math.random()-0.5) * currentSpread;
    dir.y += (Math.random()-0.5) * currentSpread;

    const ray = new THREE.Raycaster(camera.getWorldPosition(new THREE.Vector3()), dir.normalize(), 0, 100);
    const hits = ray.intersectObjects(hittableTargets);
    if(hits.length > 0) {
        const bot = hits[0].object.userData.parent;
        bot.hp -= w.dmg;
        bot.hpFill.scale.x = Math.max(0, bot.hp/100);
        if(bot.hp <= 0) {
            scene.remove(bot); bots.splice(bots.indexOf(bot), 1);
            score += 100; enemiesRemaining--; spawnBot();
        }
    }
}

function reload() {
    const w = weapons[curWepIdx];
    if(isReloading || w.res <= 0 || w.cur === w.mag) return;
    isReloading = true;
    const prog = document.getElementById('reload-progress');
    const circle = document.getElementById('progress-circle');
    prog.style.display = 'block';
    
    let start = null;
    function anim(time) {
        if(!start) start = time;
        let p = (time - start) / w.reload;
        circle.style.strokeDashoffset = 100 - (p * 100);
        if(p < 1) requestAnimationFrame(anim);
        else {
            w.cur = w.mag; w.res -= w.mag; 
            isReloading = false; prog.style.display = 'none';
        }
    }
    requestAnimationFrame(anim);
}

function heal() {
    if(isHealing || playerHP >= 100) return;
    isHealing = true;
    weaponGroups[curWepIdx].position.set(0, 0, -0.2); // 治療アニメーション（腕を前に）
    
    setTimeout(() => {
        let timer = setInterval(() => {
            playerHP = Math.min(100, playerHP + 10);
            updateHUD();
            if(playerHP >= 100) { clearInterval(timer); isHealing = false; switchWeapon(0); }
        }, 300);
    }, 2000);
}

/** --- INPUT & MOVEMENT --- */
let moveCtrl = { id:null, dx:0, dy:0, sx:0, sy:0 };
let lookCtrl = { id:null, lx:0, ly:0 };

window.addEventListener('touchstart', e => {
    for(let t of e.changedTouches) {
        if(t.target.closest('.slot')) { switchWeapon(parseInt(t.target.closest('.slot').dataset.slot)); continue; }
        if(t.clientX < window.innerWidth/2) {
            moveCtrl.id = t.identifier; moveCtrl.sx = t.clientX; moveCtrl.sy = t.clientY;
        } else {
            lookCtrl.id = t.identifier; lookCtrl.lx = t.clientX; lookCtrl.ly = t.clientY;
        }
    }
});

window.addEventListener('touchmove', e => {
    for(let t of e.changedTouches) {
        if(t.identifier === moveCtrl.id) {
            moveCtrl.dx = (t.clientX - moveCtrl.sx)/50; moveCtrl.dy = (t.clientY - moveCtrl.sy)/50;
        }
        if(t.identifier === lookCtrl.id) {
            const sens = isADS ? 0.002 : 0.005;
            yaw -= (t.clientX - lookCtrl.lx) * sens;
            pitch -= (t.clientY - lookCtrl.ly) * sens;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
            lookCtrl.lx = t.clientX; lookCtrl.ly = t.clientY;
        }
    }
});

window.addEventListener('touchend', e => {
    for(let t of e.changedTouches) {
        if(t.identifier === moveCtrl.id) { moveCtrl.dx = 0; moveCtrl.dy = 0; moveCtrl.id = null; }
        if(t.identifier === lookCtrl.id) lookCtrl.id = null;
    }
});

document.getElementById('btn-shoot').ontouchstart = (e) => { e.preventDefault(); tryShoot(); };
document.getElementById('btn-ads').ontouchstart = (e) => { e.preventDefault(); isADS = !isADS; };
document.getElementById('btn-crouch').ontouchstart = (e) => {
    e.preventDefault();
    if(Math.abs(moveCtrl.dx) > 0.5 || Math.abs(moveCtrl.dy) > 0.5) {
        stance = 'slide'; setTimeout(() => stance = 'crouch', 600);
    } else {
        stance = (stance === 'stand') ? 'crouch' : 'stand';
    }
};

/** --- UPDATE LOOP --- */
function update() {
    if(!isPlaying) return;
    requestAnimationFrame(update);

    // Stance Logic
    let targetH = 1.7;
    if(stance === 'crouch') targetH = 1.0;
    if(stance === 'slide') targetH = 0.8;
    playerRig.position.y += (targetH - playerRig.position.y) * 0.1;

    // Movement
    const s = (stance === 'slide') ? 0.3 : (stance === 'crouch' ? 0.07 : 0.15);
    const move = new THREE.Vector3(moveCtrl.dx, 0, moveCtrl.dy).normalize().multiplyScalar(s).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
    playerRig.position.add(move);

    playerRig.rotation.y = yaw;
    camera.rotation.x = pitch;

    // Crosshair & Spread
    targetSpread = (Math.abs(moveCtrl.dx) + Math.abs(moveCtrl.dy)) * 20;
    if(stance === 'crouch') targetSpread *= 0.5;
    spread += (targetSpread - spread) * 0.1;
    
    const gap = 15 + spread;
    document.getElementById('ch-t').style.transform = `translateY(${-gap}px)`;
    document.getElementById('ch-b').style.transform = `translateY(${gap}px)`;
    document.getElementById('ch-l').style.transform = `translateX(${-gap}px)`;
    document.getElementById('ch-r').style.transform = `translateX(${gap}px)`;

    // Weapon LERP
    const wModel = weaponGroups[curWepIdx];
    const targetPos = isADS ? wModel.adsPos : wModel.idlePos;
    wModel.position.lerp(targetPos, 0.2);

    // Enemy AI & Damage
    bots.forEach(b => {
        b.lookAt(playerRig.position);
        if(Math.random() < 0.01) { // 敵の攻撃
            playerHP -= 2; updateHUD();
            showDamageArc(b.position);
        }
    });

    updateHUD();
    renderer.render(scene, camera);
}

function updateHUD() {
    document.getElementById('hp-text').innerText = Math.ceil(playerHP);
    document.getElementById('hp-bar-fill').style.width = playerHP + "%";
    document.getElementById('score').innerText = score;
    document.getElementById('enemy-count').innerText = enemiesRemaining;
}

function showDamageArc(enemyPos) {
    const arc = document.getElementById('hit-arc');
    arc.style.opacity = 1;
    setTimeout(() => arc.style.opacity = 0, 500);
}

/** --- MOD SYSTEM --- */
let tapCount = 0;
document.getElementById('version-tag').onclick = () => {
    tapCount++;
    if(tapCount >= 5) {
        document.getElementById('mod-manager').style.display = 'block';
        alert("DEVELOPER MODE UNLOCKED");
    }
};

function runMod() {
    const code = document.getElementById('js-input').value;
    try { eval(code); } catch(e) { alert("MOD Error: " + e); }
}

// Simple ESP Mod Example (Called via checkbox)
setInterval(() => {
    if(document.getElementById('chk-esp').checked) {
        bots.forEach(b => {
            // ここに2Dオーバーレイのロジックを実装可能
            b.children[0].material.wireframe = true;
        });
    } else {
        bots.forEach(b => b.children[0].material.wireframe = false);
    }
}, 500);

/** --- INIT --- */
document.getElementById('btn-deploy').onclick = () => {
    isDay = document.getElementById('sel-time').value === 'day';
    setupWorld();
    for(let i=0; i<10; i++) spawnBot();
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('game-hud').style.display = 'block';
    isPlaying = true; update();
};

document.getElementById('btn-nvg').onclick = function() {
    const ov = document.getElementById('nvg-overlay');
    if(this.innerText === 'NVG:OFF') {
        this.innerText = 'NVG:GREEN'; ov.style.display = 'block'; ov.className = 'nvg-green';
    } else if(this.innerText === 'NVG:GREEN') {
        this.innerText = 'NVG:THERMAL'; ov.className = 'nvg-thermal';
    } else {
        this.innerText = 'NVG:OFF'; ov.style.display = 'none';
    }
};
</script>
</body>
</html>
