<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Warzone Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div id="game-hud" class="overlay">
        <div id="top-hud">
            <div id="weapon-name">VSS VINTOREZ</div>
            <div id="ammo-count">10 / 20</div>
            <div id="enemy-stats">ENEMIES: <span id="enemy-count">10</span></div>
        </div>
        
        <div id="player-list-hud">
            <h3>PLAYERS</h3>
            <ul id="online-players"></ul>
        </div>

        <div id="hp-bar-container">
            <div id="hp-bar-fill"></div>
            <div id="hp-text">HP: 100</div>
        </div>

        <div id="crosshair">+</div>
        <div id="hitmarker">╳</div>
        <canvas id="minimap"></canvas>
    </div>

    <div id="title-screen" class="full-screen-overlay">
        <h1 style="color:var(--primary); font-size: 3rem; margin-bottom: 10px;">TACTICAL WARZONE</h1>
        <div style="margin-bottom: 20px;">
            <label>TIME: </label>
            <select id="sel-time">
                <option value="day">DAY</option>
                <option value="night">NIGHT</option>
            </select>
            <label style="margin-left: 20px;">ENEMIES: </label>
            <select id="sel-enemies">
                <option value="10">10 BOTS</option>
                <option value="30">30 BOTS</option>
                <option value="999">ENDLESS</option>
                <option value="0">NO BOTS</option>
            </select>
        </div>
        
        <button id="btn-deploy">DEPLOY TO COMBAT</button>
        
        <div style="margin-top:20px; border-top: 1px solid #444; padding-top: 20px;">
            <input type="text" id="player-name" placeholder="Name..." maxlength="10">
            <button id="btn-online">PLAY ONLINE</button>
        </div>
    </div>

    <div id="death-screen" class="full-screen-overlay" style="display:none; background:rgba(100,0,0,0.8);">
        <h1>MISSION FAILED</h1>
        <button onclick="location.reload()">REDEPLOY</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
