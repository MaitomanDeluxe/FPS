<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
body{margin:0;overflow:hidden;background:black;}

#ui{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

#joystick{
position:absolute;
bottom:40px;
left:40px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,0.1);
pointer-events:auto;
}

#stick{
position:absolute;
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,0.4);
left:30px;
top:30px;
}

#shoot{
position:absolute;
right:40px;
bottom:60px;
width:100px;
height:100px;
border-radius:50%;
background:rgba(255,0,0,0.4);
pointer-events:auto;
}

#menu{
position:absolute;
top:10px;
left:10px;
pointer-events:auto;
}
</style>
</head>

<body>

<div id="menu">
<button onclick="startOffline()">OFFLINE</button>
<button onclick="startOnline()">ONLINE</button>
</div>

<div id="ui">

<div id="joystick">
<div id="stick"></div>
</div>

<div id="shoot"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="joystick.js"></script>
<script src="net.js"></script>
<script src="game.js"></script>

</body>
</html>
