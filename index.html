<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
body{margin:0;overflow:hidden;background:black;color:white;font-family:sans-serif;}

#menu{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
z-index:10;
}

#status{
position:absolute;top:10px;left:10px;
background:black;padding:5px;z-index:10;
}

#players{
position:absolute;right:10px;top:10px;
background:black;padding:10px;
z-index:10;
min-width:120px;
}

#joystick{
position:absolute;bottom:40px;left:40px;
width:120px;height:120px;border-radius:50%;
background:rgba(255,255,255,0.1);
}

#stick{
position:absolute;width:60px;height:60px;
border-radius:50%;
background:rgba(255,255,255,0.4);
left:30px;top:30px;
}

#shoot{
position:absolute;right:40px;bottom:60px;
width:100px;height:100px;border-radius:50%;
background:rgba(255,0,0,0.4);
}
</style>
</head>

<body>

<div id="menu">
<button onclick="startOffline()">OFFLINE</button>
<button onclick="startOnline()">ONLINE</button>
</div>

<div id="status">未接続</div>
<div id="players">Players:<br></div>

<div id="joystick"><div id="stick"></div></div>
<div id="shoot"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="joystick.js"></script>
<script src="net.js"></script>
<script src="game.js"></script>

</body>
</html>
