<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tactical FPS - AWM Special Edition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    :root { --wb-dark: rgba(20, 20, 20, 0.85); --wb-border: 2px solid #aaa; --primary: #00ffcc; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Share Tech Mono', monospace; user-select: none; }
    #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
    
    /* クロスヘアと円形プログレスバー */
    #crosshair-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .ch-line { position: absolute; background: #0f0; }
    .ch-v { width: 2px; height: 15px; }
    .ch-h { width: 15px; height: 2px; }
    
    #cooldown-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 50px; height: 50px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      mask: radial-gradient(transparent 58%, black 60%);
      -webkit-mask: radial-gradient(transparent 58%, black 60%);
      z-index: 15;
      display: none;
    }

    #hud { position: absolute; bottom: 20px; right: 20px; color: #fff; text-align: right; text-shadow: 2px 2px #000; }
    #weapon-name { font-size: 24px; color: var(--primary); }
    #ammo-display { font-size: 48px; }
    .ctrl { position: absolute; bottom: 20px; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; pointer-events: auto; }
    #btn-fire { right: 20px; bottom: 120px; width: 100px; height: 100px; background: rgba(255,0,0,0.3); }
    #btn-ads { right: 130px; bottom: 40px; }
    #btn-reload { right: 20px; bottom: 20px; }
    #joystick-base { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; }
    #joystick-stick { position: absolute; top: 30px; left: 30px; width: 60px; height: 60px; background: #fff; border-radius: 50%; opacity: 0.5; }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  
  <div class="overlay" id="ui-layer" style="display: block;">
    <div id="cooldown-ring"></div>
    <div id="crosshair-container">
      <div class="ch-line ch-v"></div>
      <div class="ch-line ch-h"></div>
    </div>
    <div id="hud">
      <div id="weapon-name">AWM SNIPER</div>
      <div id="ammo-display">5 / 20</div>
    </div>
    <div id="btn-fire" class="ctrl">FIRE</div>
    <div id="btn-ads" class="ctrl">ADS</div>
    <div id="btn-reload" class="ctrl">RELOAD</div>
    <div id="joystick-base"><div id="joystick-stick"></div></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    /** --- 基礎設定 --- */
    let scene, camera, renderer, clock;
    let playerRig, gunParent;
    let isADS = false, isReloading = false;
    let curWepIdx = 2; // 初期武器 AWM
    let reloadStart = 0;
    const cameraFOV = { current: 75, target: 75 };

    /** --- 武器データ --- */
    const weapons = [
      { type:'ar', name:"CUSTOM AR15", mag:30, cur:30, res:120, rate:140, dmg:18, reload:2000, zoomFOV: 40, lastF:0 },
      { type:'smg', name:"MP7 SMG", mag:40, cur:40, res:160, rate:60, dmg:12, reload:1500, zoomFOV: 45, lastF:0 },
      { type:'sr', name:"AWM SNIPER", mag:5, cur:5, res:20, rate:1300, dmg:120, reload:3000, zoomFOV: 22, lastF:0 }, // AWM: 3倍相当
      { type:'hg', name:"G17 PISTOL", mag:15, cur:15, res:60, rate:250, dmg:20, reload:1200, zoomFOV: 45, lastF:0 }
    ];

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);
      camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.01, 1000);
      clock = new THREE.Clock();

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);

      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(10, 20, 10);
      scene.add(light, new THREE.AmbientLight(0x404040));

      // 床
      const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x555555 }));
      floor.rotation.x = -Math.PI/2;
      scene.add(floor);

      // プレイヤーと銃の階層構造成
      playerRig = new THREE.Group();
      scene.add(playerRig);
      playerRig.add(camera);
      
      gunParent = new THREE.Group();
      camera.add(gunParent);

      setupAWM();
      updateHUD();
    }

    function setupAWM() {
      const gunMat = new THREE.MeshStandardMaterial({color: 0x222222});
      const gunAccMat = new THREE.MeshStandardMaterial({color: 0x111111});
      
      const awmGroup = new THREE.Group();
      // 全体を1.5倍に巨大化
      awmGroup.scale.set(1.5, 1.5, 1.5);

      // ボディ
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.035, 0.06, 0.45), new THREE.MeshStandardMaterial({color: 0x3d5c31}));
      awmGroup.add(body);

      // 銃身
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.007, 0.009, 0.5), gunMat);
      barrel.rotation.x = Math.PI/2; barrel.position.set(0, 0.015, -0.4);
      awmGroup.add(barrel);

      // --- スコープチューブ (くり抜き構造) ---
      const outerRadius = 0.018;
      const innerRadius = 0.016;
      const scopeShape = new THREE.Shape();
      scopeShape.absarc(0, 0, outerRadius, 0, Math.PI * 2, false);
      const holePath = new THREE.Path();
      holePath.absarc(0, 0, innerRadius, 0, Math.PI * 2, true);
      scopeShape.holes.push(holePath);

      const extrudeSettings = { depth: 0.2, bevelEnabled: false };
      const scopeTube = new THREE.Mesh(new THREE.ExtrudeGeometry(scopeShape, extrudeSettings), gunAccMat);
      scopeTube.position.set(0, 0.065, -0.15); 
      awmGroup.add(scopeTube);

      // --- 2本のスコープマウント柱 ---
      const mount1 = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.035, 0.015), gunAccMat);
      mount1.position.set(0, 0.045, -0.12);
      const mount2 = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.035, 0.015), gunAccMat);
      mount2.position.set(0, 0.045, 0.02);
      awmGroup.add(mount1, mount2);

      // --- 内部レティクル (十字線) ---
      const reticleMat = new THREE.MeshBasicMaterial({color: 0x000000});
      const reticleV = new THREE.Mesh(new THREE.PlaneGeometry(0.001, 0.03), reticleMat);
      const reticleH = new THREE.Mesh(new THREE.PlaneGeometry(0.03, 0.001), reticleMat);
      const reticle = new THREE.Group();
      reticle.add(reticleV, reticleH);
      reticle.position.set(0, 0.065, 0.04); // チューブの後方に配置
      awmGroup.add(reticle);

      gunParent.add(awmGroup);
      
      // ポジション設定
      awmGroup.idlePos = new THREE.Vector3(0.25, -0.25, -0.45);
      awmGroup.adsPos = new THREE.Vector3(0, -0.065 * 1.5, -0.2); // スコープの高さを相殺
      awmGroup.position.copy(awmGroup.idlePos);
    }

    /** --- アニメーションループ --- */
    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const now = Date.now();

      // FOVのスムーズな移行
      cameraFOV.current = THREE.MathUtils.lerp(cameraFOV.current, cameraFOV.target, 0.15);
      camera.fov = cameraFOV.current;
      camera.updateProjectionMatrix();

      // 銃のポジションの滑らかな移動 (ADS)
      const targetPos = isADS ? gunParent.children[0].adsPos : gunParent.children[0].idlePos;
      gunParent.children[0].position.lerp(targetPos, 0.2);

      // --- 円形プログレスバーの更新 ---
      const ring = document.getElementById('cooldown-ring');
      const w = weapons[curWepIdx];
      let progress = 0;

      if (isReloading) {
        progress = (now - reloadStart) / w.reload;
        if (progress >= 1) { finishReload(); }
        ring.style.display = 'block';
        ring.style.background = `conic-gradient(#00ffcc ${progress * 360}deg, transparent 0deg)`;
      } else if (now - w.lastF < w.rate) {
        progress = (now - w.lastF) / w.rate;
        ring.style.display = 'block';
        ring.style.background = `conic-gradient(rgba(255, 50, 50, 0.8) ${progress * 360}deg, transparent 0deg)`;
      } else {
        ring.style.display = 'none';
      }

      renderer.render(scene, camera);
    }

    /** --- 動作ロジック --- */
    function fire() {
      const w = weapons[curWepIdx];
      const now = Date.now();
      if (isReloading || w.cur <= 0 || now - w.lastF < w.rate) return;

      w.cur--;
      w.lastF = now;
      updateHUD();
      
      // 発射反動（簡易）
      gunParent.children[0].position.z += 0.05;
      if (w.cur === 0) startReload();
    }

    function startReload() {
      if (isReloading || weapons[curWepIdx].res <= 0) return;
      isReloading = true;
      reloadStart = Date.now();
    }

    function finishReload() {
      isReloading = false;
      const w = weapons[curWepIdx];
      const need = w.mag - w.cur;
      const take = Math.min(need, w.res);
      w.cur += take;
      w.res -= take;
      updateHUD();
    }

    function updateHUD() {
      const w = weapons[curWepIdx];
      document.getElementById('weapon-name').innerText = w.name;
      document.getElementById('ammo-display').innerText = `${w.cur} / ${w.res}`;
    }

    /** --- 入力イベント --- */
    document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); fire(); });
    document.getElementById('btn-ads').addEventListener('touchstart', (e) => {
      e.preventDefault();
      isADS = !isADS;
      cameraFOV.target = isADS ? weapons[curWepIdx].zoomFOV : 75;
      document.getElementById('crosshair-container').style.display = isADS ? 'none' : 'flex';
    });
    document.getElementById('btn-reload').addEventListener('touchstart', (e) => { e.preventDefault(); startReload(); });

    // 画面リサイズ対応
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
