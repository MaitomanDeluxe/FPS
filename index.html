<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Warzone V5.0 - Custom</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        :root { --wb-dark: rgba(20, 20, 20, 0.85); --wb-border: 2px solid #aaa; --primary: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Share Tech Mono', monospace; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        #top-hud { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: var(--wb-dark); border: var(--wb-border); padding: 5px 20px; color: #fff; font-size: 14px; pointer-events: auto; }
        
        /* Crosshair: 白ドット＋十字線 */
        #crosshair-container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 100px; height: 100px; --gap: 6px; 
        }
        #crosshair-dot { 
            position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; 
            background: #fff; border-radius: 50%; transform: translate(-50%, -50%); 
        }
        .ch-line { position: absolute; background: #fff; box-shadow: 0 0 2px #000; transition: transform 0.1s; }
        .ch-t { width: 2px; height: 10px; top: calc(50% - var(--gap) - 10px); left: calc(50% - 1px); }
        .ch-b { width: 2px; height: 10px; top: calc(50% + var(--gap)); left: calc(50% - 1px); }
        .ch-l { width: 10px; height: 2px; top: calc(50% - 1px); left: calc(50% - var(--gap) - 10px); }
        .ch-r { width: 10px; height: 2px; top: calc(50% - 1px); left: calc(50% + var(--gap)); }

        #hit-marker { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); display: none; z-index: 11; }
        .hm-line { position: absolute; width: 2px; height: 12px; background: #ff0000; left: 14px; }
        .hm-line:nth-child(1) { transform: rotate(45deg); }
        .hm-line:nth-child(2) { transform: rotate(-45deg); }

        #bottom-hud { position: absolute; bottom: 10px; left: 10px; background: var(--wb-dark); border: var(--wb-border); padding: 10px; color: #fff; min-width: 150px; }
        #weapon-info { font-size: 18px; color: var(--primary); margin-bottom: 5px; }
        #ammo-info { font-size: 24px; }
        #hp-bar-container { width: 100%; height: 8px; background: #444; margin-top: 5px; }
        #hp-bar { width: 100%; height: 100%; background: #ff4444; transition: width 0.3s; }

        .btn { position: absolute; background: var(--wb-dark); border: var(--wb-border); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; active-opacity: 0.7; }
        #btn-shoot { bottom: 40px; right: 40px; width: 90px; height: 90px; border-radius: 50%; font-size: 20px; border-width: 4px; background: rgba(255,0,0,0.2); }
        #btn-ads { bottom: 150px; right: 40px; width: 60px; height: 60px; border-radius: 10px; }
        #btn-jump { bottom: 110px; right: 120px; width: 60px; height: 60px; border-radius: 50%; }
        #btn-crouch { bottom: 30px; right: 140px; width: 60px; height: 60px; border-radius: 50%; } /* しゃがみボタン追加 */
        #btn-reload { bottom: 220px; right: 110px; width: 50px; height: 50px; border-radius: 50%; font-size: 12px; }
        #btn-switch { bottom: 220px; right: 40px; width: 60px; height: 50px; border-radius: 10px; }
        #btn-nvg { top: 10px; right: 10px; width: 50px; height: 50px; border-radius: 5px; font-size: 10px; }
        #btn-exit { position: absolute; top: 10px; left: 10px; background: #ff4444; border: 2px solid #fff; color: #fff; padding: 5px 15px; font-weight: bold; pointer-events: auto; }

        #joystick-base { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid #aaa; border-radius: 50%; pointer-events: auto; }
        #joystick-handle { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }

        #nvg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; mix-blend-mode: multiply; }
        #minimap { position: absolute; top: 70px; right: 10px; width: 120px; height: 120px; background: rgba(0,0,0,0.5); border: 1px solid #00ffcc; border-radius: 50%; overflow: hidden; pointer-events: auto; }

        #start-screen { position: absolute; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: #fff; }
        .menu-box { background: #222; border: 2px solid #00ffcc; padding: 20px; text-align: center; border-radius: 10px; }
        select, button.menu-btn { background: #000; color: #00ffcc; border: 1px solid #00ffcc; padding: 10px; margin: 10px; font-family: 'Share Tech Mono'; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:#00ffcc; letter-spacing: 5px;">TACTICAL WARZONE</h1>
        <div class="menu-box">
            <p>SELECT MISSION</p>
            <select id="sel-time"><option value="day">DAY OPERATION</option><option value="night">NIGHT OPERATION</option></select><br>
            <select id="sel-enemies"><option value="5">5 TARGETS</option><option value="10" selected>10 TARGETS</option><option value="20">20 TARGETS</option><option value="0">FREE ROAM</option><option value="999">ENDLESS MODE</option></select><br>
            <button class="menu-btn" id="btn-deploy" style="font-size:20px; width: 200px;">DEPLOY</button>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="game-hud" class="overlay">
        <div id="nvg-overlay"></div>
        <button id="btn-exit" onclick="location.reload()">EXIT</button>
        
        <div id="top-hud">
            <div>TIME: <span id="timer">05:00</span></div>
            <div style="color:#ffcc00;">SCORE: <span id="score">0</span></div>
            <div style="color:#ff5555;">ENEMIES: <span id="enemy-count">10</span></div>
        </div>

        <div id="crosshair-container">
            <div id="crosshair-dot"></div>
            <div class="ch-line ch-t"></div><div class="ch-line ch-b"></div>
            <div class="ch-line ch-l"></div><div class="ch-line ch-r"></div>
            <div id="hit-marker"><div class="hm-line"></div><div class="hm-line"></div></div>
        </div>

        <div id="minimap"><canvas id="minimap-canvas"></canvas></div>

        <div id="bottom-hud">
            <div id="weapon-info">M4A1 CARBINE</div>
            <div id="ammo-info">30 / 120</div>
            <div style="font-size:10px; margin-top:5px;">OPERATOR HEALTH</div>
            <div id="hp-bar-container"><div id="hp-bar"></div></div>
        </div>

        <div class="controls">
            <div id="btn-shoot" class="btn">FIRE</div>
            <div id="btn-ads" class="btn">ADS</div>
            <div id="btn-jump" class="btn">JMP</div>
            <div id="btn-crouch" class="btn">CRO</div>
            <div id="btn-reload" class="btn">RLD</div>
            <div id="btn-switch" class="btn">SWAP</div>
            <div id="btn-nvg" class="btn">NVG:OFF</div>
            <div id="joystick-base"><div id="joystick-handle"></div></div>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
<script>
/** --- CORE VARIABLES --- */
let scene, camera, renderer, clock;
let playerRig, yaw=0, pitch=0;
let moveCtrl = { id:null, startX:0, startY:0, curX:0, curY:0 };
let lookCtrl = { id:null, lastX:0, lastY:0 };
let isPlaying = false, isDay = true, gameTime = 300;
let score = 0, enemiesRemaining = 10, totalSpawns = 10, isEndless = false;
let playerHP = 100, isGrounded = true, vy = 0;
let isCrouching = false; // しゃがみフラグ

/** --- WEAPONS DATA --- */
const weapons = [
    { name: 'M4A1', type: 'auto', cur: 30, max: 30, reserve: 120, rate: 100, dmg: 25, model: null },
    { name: 'G17', type: 'semi', cur: 17, max: 17, reserve: 68, rate: 200, dmg: 20, model: null },
    { name: 'KNIFE', type: 'melee', cur: 1, max: 1, reserve: 1, rate: 500, dmg: 100, model: null },
    { name: 'GRENADE', type: 'nade', cur: 3, max: 3, reserve: 3, rate: 1000, dmg: 150, model: null }
];
let curWepIdx = 0, isReloading = false, isADS = false, nvgMode = 0;
let weaponGroups = [];

/** --- OBJECTS --- */
let bots = [], bullets = [], particles = [], boxes = [], nades = [];

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    clock = new THREE.Clock();

    playerRig = new THREE.Group();
    playerRig.add(camera);
    scene.add(playerRig);
    playerRig.position.set(0, 1.7, 0);

    createEnvironment();
    createWeapons();
    setupControls();
    window.addEventListener('resize', onWindowResize);
}

function createEnvironment() {
    const floorGeo = new THREE.PlaneGeometry(200, 200);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2;
    floor.receiveShadow = true;
    scene.add(floor);

    const ambient = new THREE.AmbientLight(0xffffff, isDay ? 0.6 : 0.1);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, isDay ? 1.0 : 0.2);
    sun.position.set(50, 100, 50);
    sun.castShadow = true;
    scene.add(sun);

    if(!isDay) scene.fog = new THREE.FogExp2(0x000500, 0.05);

    for(let i=0; i<30; i++) {
        const h = 2 + Math.random()*15;
        const box = new THREE.Mesh(new THREE.BoxGeometry(4, h, 4), new THREE.MeshStandardMaterial({color:0x555555}));
        box.position.set((Math.random()-0.5)*150, h/2, (Math.random()-0.5)*150);
        box.castShadow = box.receiveShadow = true;
        scene.add(box);
        boxes.push(box);
    }
}

function createWeapons() {
    weapons.forEach((w, i) => {
        const group = new THREE.Group();
        if(w.type !== 'nade') {
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.2, 0.5), new THREE.MeshStandardMaterial({color:0x111111}));
            group.add(body);
        } else {
            const nade = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshStandardMaterial({color:0x223311}));
            group.add(nade);
        }
        group.position.set(0.3, -0.3, -0.5);
        group.visible = (i === 0);
        camera.add(group);
        weaponGroups.push(group);
    });
}

/** --- ACTION FUNCTIONS --- */
function tryShoot() {
    const w = weapons[curWepIdx];
    if(isReloading || w.cur <= 0) {
        if(w.cur<=0 && w.type!=='melee' && w.type!=='nade') startReload();
        return;
    }
    const now = Date.now();
    if(now - (w.lastF || 0) < w.rate) return;
    w.lastF = now;

    if(w.type === 'nade') { throwGrenade(); return; }
    if(w.type !== 'melee') { w.cur--; updateHUD(); }

    // リコイル（反動）
    const curGrp = weaponGroups[curWepIdx];
    curGrp.position.z += 0.05;
    pitch += isADS ? 0.005 : 0.01;

    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);

    /** --- 精度計算 (Spread) --- */
    // しゃがみ=完全、立=微細、移動=大
    let spread = 0;
    if (!isCrouching) {
        spread = moveCtrl.id ? 0.04 : 0.01;
    }
    if (isADS) spread *= 0.5;

    if (spread > 0 && w.type !== 'melee') {
        dir.x += (Math.random() - 0.5) * spread;
        dir.y += (Math.random() - 0.5) * spread;
        dir.z += (Math.random() - 0.5) * spread;
        dir.normalize();
    }

    const ray = new THREE.Raycaster(camera.getWorldPosition(new THREE.Vector3()), dir);
    const intersects = ray.intersectObjects([...bots, ...boxes]);

    if(intersects.length > 0) {
        const hit = intersects[0];
        createImpact(hit.point, hit.face.normal);
        if(hit.object.isBot) damageBot(hit.object, w.dmg);
    }
}

function damageBot(bot, dmg) {
    bot.hp -= dmg;
    showHitmarker();
    if(bot.hp <= 0) {
        scene.remove(bot);
        bots = bots.filter(b => b !== bot);
        score += 100;
        if(!isEndless) enemiesRemaining--;
        updateHUD();
        if(!isEndless && enemiesRemaining <= 0) endGame(true);
    }
}

function showHitmarker() {
    const hm = document.getElementById('hit-marker');
    hm.style.display = 'block';
    setTimeout(() => { hm.style.display = 'none'; }, 100);
}

function startReload() {
    const w = weapons[curWepIdx];
    if(isReloading || w.cur === w.max || w.reserve <= 0 || w.type === 'melee' || w.type === 'nade') return;
    isReloading = true;
    updateHUD();
    setTimeout(() => {
        const need = w.max - w.cur;
        const take = Math.min(need, w.reserve);
        w.cur += take; w.reserve -= take;
        isReloading = false;
        updateHUD();
    }, 1500);
}

function throwGrenade() {
    const w = weapons[curWepIdx];
    w.cur--; updateHUD();
    const g = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshStandardMaterial({color:0x223311}));
    camera.getWorldPosition(g.position);
    const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
    g.velocity = dir.multiplyScalar(0.5);
    scene.add(g);
    nades.push(g);
    setTimeout(() => explode(g), 2500);
}

function explode(g) {
    scene.remove(g);
    nades = nades.filter(n => n !== g);
    const exp = new THREE.Mesh(new THREE.SphereGeometry(3), new THREE.MeshBasicMaterial({color:0xffaa00, transparent:true, opacity:0.5}));
    exp.position.copy(g.position);
    scene.add(exp);
    bots.forEach(b => {
        if(b.position.distanceTo(g.position) < 5) damageBot(b, 150);
    });
    setTimeout(() => scene.remove(exp), 200);
}

/** --- CONTROLS --- */
function setupControls() {
    const canvas = document.getElementById('game-canvas');
    
    canvas.addEventListener('touchstart', e => {
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth/2) {
                if(!moveCtrl.id) {
                    moveCtrl.id = t.identifier;
                    moveCtrl.startX = t.clientX; moveCtrl.startY = t.clientY;
                }
            } else {
                if(!lookCtrl.id) {
                    lookCtrl.id = t.identifier;
                    lookCtrl.lastX = t.clientX; lookCtrl.lastY = t.clientY;
                }
            }
        }
    }, {passive:false});

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        for(let t of e.changedTouches) {
            if(t.identifier === moveCtrl.id) {
                moveCtrl.curX = t.clientX; moveCtrl.curY = t.clientY;
            } else if(t.identifier === lookCtrl.id) {
                const dx = t.clientX - lookCtrl.lastX;
                const dy = t.clientY - lookCtrl.lastY;
                yaw -= dx * 0.005;
                pitch -= dy * 0.005;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                lookCtrl.lastX = t.clientX; lookCtrl.lastY = t.clientY;
            }
        }
    }, {passive:false});

    const endHandler = e => {
        for(let t of e.changedTouches) {
            if(t.identifier === moveCtrl.id) moveCtrl.id = null;
            if(t.identifier === lookCtrl.id) lookCtrl.id = null;
        }
    };
    canvas.addEventListener('touchend', endHandler);
    canvas.addEventListener('touchcancel', endHandler);

    // Buttons
    document.getElementById('btn-shoot').ontouchstart = e => { e.preventDefault(); tryShoot(); this.itv = setInterval(tryShoot, weapons[curWepIdx].rate); };
    document.getElementById('btn-shoot').ontouchend = () => clearInterval(this.itv);
    
    document.getElementById('btn-ads').onclick = () => {
        isADS = !isADS;
        camera.fov = isADS ? 35 : 75;
        camera.updateProjectionMatrix();
        weaponGroups[curWepIdx].position.set(isADS ? 0 : 0.3, isADS ? -0.15 : -0.3, -0.4);
    };

    document.getElementById('btn-jump').onclick = () => {
        if(isGrounded) { 
            vy = 0.2; isGrounded = false; 
            if(isCrouching) isCrouching = false; // ジャンプでしゃがみ解除
        }
    };

    document.getElementById('btn-crouch').onclick = () => {
        isCrouching = !isCrouching;
    };

    document.getElementById('btn-reload').onclick = startReload;
    
    document.getElementById('btn-switch').onclick = () => {
        weaponGroups[curWepIdx].visible = false;
        curWepIdx = (curWepIdx + 1) % weapons.length;
        weaponGroups[curWepIdx].visible = true;
        isADS = false; camera.fov = 75; camera.updateProjectionMatrix();
        updateHUD();
    };

    document.getElementById('btn-nvg').onclick = () => {
        nvgMode = (nvgMode + 1) % 4;
        const ov = document.getElementById('nvg-overlay');
        const btn = document.getElementById('btn-nvg');
        ov.style.display = nvgMode > 0 ? 'block' : 'none';
        if(nvgMode === 1) { ov.style.background = 'rgba(0,255,50,0.3)'; btn.innerText = 'NVG:GRN'; }
        else if(nvgMode === 2) { ov.style.background = 'rgba(255,255,255,0.4)'; btn.innerText = 'NVG:BW'; }
        else if(nvgMode === 3) { ov.style.background = 'rgba(0,50,255,0.3)'; btn.innerText = 'NVG:THM'; }
        else btn.innerText = 'NVG:OFF';
    };
}

/** --- MAIN LOOP --- */
function update() {
    if(!isPlaying) return;
    requestAnimationFrame(update);
    const delta = clock.getDelta();

    // しゃがみ高さ調整 (Lerp)
    const targetHeight = isCrouching ? 1.0 : 1.7;
    playerRig.position.y += (targetHeight - playerRig.position.y) * 0.15;

    // 十字クロスヘアの動的ギャップ制御
    const crossContainer = document.getElementById('crosshair-container');
    let targetGap = 6;
    if (isCrouching) targetGap = 2; // しゃがみで縮小
    else if (moveCtrl.id) targetGap = 18; // 移動で拡大
    crossContainer.style.setProperty('--gap', targetGap + 'px');

    // 移動処理
    if(moveCtrl.id) {
        const dx = moveCtrl.curX - moveCtrl.startX;
        const dy = moveCtrl.curY - moveCtrl.startY;
        const angle = Math.atan2(dx, dy) + yaw;
        const speed = isCrouching ? 0.05 : 0.12; // しゃがみ中は遅く
        playerRig.position.x += Math.sin(angle) * speed;
        playerRig.position.z += Math.cos(angle) * speed;
        
        // ジョイスティック描画
        const dist = Math.min(60, Math.hypot(dx, dy));
        const jAng = Math.atan2(dy, dx);
        document.getElementById('joystick-handle').style.transform = `translate(calc(-50% + ${Math.cos(jAng)*dist}px), calc(-50% + ${Math.sin(jAng)*dist}px))`;
    } else {
        document.getElementById('joystick-handle').style.transform = 'translate(-50%, -50%)';
    }

    // 重力
    if(!isGrounded) {
        vy -= 0.01;
        playerRig.position.y += vy;
        if(playerRig.position.y <= targetHeight) {
            playerRig.position.y = targetHeight;
            vy = 0; isGrounded = true;
        }
    }

    playerRig.rotation.y = yaw;
    camera.rotation.x = pitch;

    // 武器揺れ（微細なアニメーション）
    const sw = Math.sin(Date.now()*0.005)*0.002;
    weaponGroups[curWepIdx].position.y += ( (isADS ? -0.15 : -0.3) + sw - weaponGroups[curWepIdx].position.y) * 0.1;
    weaponGroups[curWepIdx].position.z += (-0.5 - weaponGroups[curWepIdx].position.z) * 0.1;

    updateBots(delta);
    updateMinimap();
    renderer.render(scene, camera);
}

function updateBots(delta) {
    if(isEndless && bots.length < 5) spawnBot();
    else if(!isEndless && totalSpawns > 0 && bots.length < 3) spawnBot();

    bots.forEach(b => {
        const d = b.position.distanceTo(playerRig.position);
        if(d > 2) {
            const v = new THREE.Vector3().subVectors(playerRig.position, b.position).normalize();
            b.position.add(v.multiplyScalar(0.03));
            b.lookAt(playerRig.position.x, 1.7, playerRig.position.z);
        }
        if(d < 1.5 && Math.random() < 0.02) {
            playerHP -= 1; updateHUD();
            if(playerHP <= 0) endGame(false);
        }
    });
}

function spawnBot() {
    if(!isEndless && totalSpawns <= 0) return;
    const bot = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.8), new THREE.MeshStandardMaterial({color:0xff3333}));
    const ang = Math.random()*Math.PI*2;
    const dist = 30 + Math.random()*20;
    bot.position.set(playerRig.position.x + Math.sin(ang)*dist, 0.9, playerRig.position.z + Math.cos(ang)*dist);
    bot.isBot = true; bot.hp = 100;
    scene.add(bot);
    bots.push(bot);
    if(!isEndless) totalSpawns--;
}

function updateHUD() {
    const w = weapons[curWepIdx];
    document.getElementById('weapon-info').innerText = w.name + (isReloading ? " (RELOADING...)" : "");
    document.getElementById('ammo-info').innerText = w.type==='melee' ? "--" : `${w.cur} / ${w.reserve}`;
    document.getElementById('hp-bar').style.width = playerHP + "%";
    document.getElementById('score').innerText = score;
    document.getElementById('enemy-count').innerText = enemiesRemaining;
}

function createImpact(pos, norm) {
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({color:0xffff00}));
    p.position.copy(pos);
    scene.add(p);
    setTimeout(() => scene.remove(p), 500);
}

function updateMinimap() {
    const canvas = document.getElementById('minimap-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.height = 120;
    ctx.clearRect(0,0,120,120);
    const c = 60, scale = 2;
    ctx.fillStyle = '#0f0';
    ctx.beginPath(); ctx.arc(c, c, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f00';
    bots.forEach(b => {
        const dx = (b.position.x - playerRig.position.x)*scale, dz = (b.position.z - playerRig.position.z)*scale;
        ctx.beginPath(); ctx.arc(c+dx, c+dz, 2, 0, Math.PI*2); ctx.fill();
    });
}

function endGame(win) {
    isPlaying = false;
    alert(win ? "MISSION ACCOMPLISHED" : "OPERATOR K.I.A.");
    location.reload();
}

function onWindowResize() {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

document.getElementById('btn-deploy').onclick = () => {
    isDay = document.getElementById('sel-time').value === 'day';
    const ec = parseInt(document.getElementById('sel-enemies').value);
    isEndless = (ec === 999);
    enemiesRemaining = isEndless ? "∞" : ec;
    totalSpawns = isEndless ? 999 : ec;
    
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-hud').style.display = 'block';
    isPlaying = true;
    init();
    update();
};
</script>
</body>
