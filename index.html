<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Web FPS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* UI共通 */
        .ui { position: absolute; pointer-events: none; color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); z-index: 10; }
        
        /* 方向インジケーター (Compass) */
        #compass { top: 2%; left: 50%; transform: translateX(-50%); width: 200px; height: 30px; border-bottom: 2px solid white; display: flex; justify-content: center; overflow: hidden; font-weight: bold; background: rgba(0,0,0,0.3); }
        #compass-strip { display: flex; transition: transform 0.1s linear; }

        /* ミニマップ */
        #minimap-container { top: 2%; left: 2%; width: 120px; height: 120px; border: 2px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.5); border-radius: 5px; pointer-events: auto; overflow: hidden; }
        #minimap-player { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #0f0; border-radius: 50%; transform: translate(-50%, -50%); }

        /* グレネード起爆時間表示 */
        #grenade-timer { bottom: 25%; left: 50%; transform: translateX(-50%); font-size: 2rem; color: #f00; display: none; }

        /* フルマップ */
        #fullmap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 100; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        #fullmap-view { width: 80vh; height: 80vh; border: 2px solid #fff; background: #111; position: relative; }

        /* ボタン類 */
        .btn { pointer-events: auto; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.4); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; }
        .btn:active { background: rgba(255,255,255,0.3); }
        #btn-shoot { position: absolute; bottom: 20%; right: 12%; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,0,0,0.2); border: 2px solid red; }
        #btn-grenade { position: absolute; bottom: 45%; right: 12%; width: 60px; height: 60px; }
        
        /* 武器詳細 HUD */
        #ammo-hud { bottom: 5%; right: 5%; font-size: 1.5rem; text-align: right; }

        /* スティック */
        #joystick-base { position: absolute; bottom: 10%; left: 5%; width: 140px; height: 140px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; }
        #joystick-handle { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="compass" class="ui"><div id="compass-strip">N ・ ・ ・ E ・ ・ ・ S ・ ・ ・ W ・ ・ ・</div></div>
    
    <div id="minimap-container" class="ui">
        <div id="minimap-player"></div>
        <canvas id="minimap-canvas" width="120" height="120"></canvas>
    </div>

    <div id="grenade-timer" class="ui">COOKING: 3.0</div>

    <div id="ammo-hud" class="ui">
        <span id="weapon-name">MP5</span><br>
        <span id="ammo-count">30 / 120</span><br>
        <span id="fire-mode" style="font-size: 0.8rem;">AUTO</span>
    </div>

    <div id="btn-shoot" class="btn ui">FIRE</div>
    <div id="btn-grenade" class="btn ui">GRENADE</div>
    <div id="joystick-base" class="ui"><div id="joystick-handle"></div></div>

    <div id="fullmap">
        <h2>TACTICAL MAP</h2>
        <div id="fullmap-view"></div>
        <button class="btn" onclick="toggleFullMap()" style="margin-top:20px; padding:10px 40px;">CLOSE</button>
    </div>

<script>
    // --- 1. 定数と状態 ---
    let isPlaying = true;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111122);
    scene.fog = new THREE.Fog(0x111122, 20, 100);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const player = new THREE.Object3D();
    scene.add(player);
    player.add(camera);
    camera.position.y = 1.7;

    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;

    // --- 2. リアルなテクスチャ生成 (Procedural) ---
    function createRealTexture(color1, color2) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = color1;
        ctx.fillRect(0,0,256,256);
        for(let i=0; i<5000; i++) {
            ctx.fillStyle = Math.random() > 0.5 ? color2 : 'rgba(0,0,0,0.1)';
            ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(10, 10);
        return tex;
    }

    const groundTex = createRealTexture('#3d4021', '#2a2c16');
    const wallTex = createRealTexture('#555', '#333');

    // --- 3. マップオブジェクト (建物、木) ---
    const obstacles = [];
    const bots = [];
    
    // 地面
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ map: groundTex }));
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // 建物と木を配置
    for(let i=0; i<30; i++) {
        const isTree = Math.random() > 0.6;
        if(isTree) {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 4), new THREE.MeshStandardMaterial({color: 0x4d2926}));
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshStandardMaterial({color: 0x1e3a1a}));
            trunk.position.set((Math.random()-0.5)*150, 2, (Math.random()-0.5)*150);
            leaves.position.set(trunk.position.x, 4.5, trunk.position.z);
            scene.add(trunk, leaves);
        } else {
            const h = Math.random()*8 + 4;
            const house = new THREE.Mesh(new THREE.BoxGeometry(5, h, 5), new THREE.MeshStandardMaterial({ map: wallTex }));
            house.position.set((Math.random()-0.5)*150, h/2, (Math.random()-0.5)*150);
            scene.add(house);
            obstacles.push(house);
        }
    }

    // 敵 (Bot)
    for(let i=0; i<9; i++) {
        const bot = new THREE.Mesh(new THREE.BoxGeometry(1, 1.8, 1), new THREE.MeshStandardMaterial({color: 0xff3333, metalness: 0.5}));
        bot.position.set((Math.random()-0.5)*100, 0.9, (Math.random()-0.5)*100);
        scene.add(bot);
        bots.push(bot);
    }

    const light = new THREE.DirectionalLight(0xffffff, 1.0);
    light.position.set(10, 20, 10);
    light.castShadow = true;
    scene.add(light, new THREE.AmbientLight(0x404040));

    // --- 4. 武器とエフェクト ---
    const weaponGroup = new THREE.Group();
    camera.add(weaponGroup);
    const gun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.6), new THREE.MeshStandardMaterial({color: 0x111, metalness: 0.8}));
    gun.position.set(0.3, -0.25, -0.4);
    weaponGroup.add(gun);

    const tracers = [];
    const predictionLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({color: 0x00ff00}));
    scene.add(predictionLine);

    // --- 5. 高度な入力管理 (移動バグ修正済) ---
    const touches = {};
    const moveData = { active: false, id: null, startX: 0, startY: 0, dx: 0, dy: 0 };
    const lookData = { active: false, id: null, lastX: 0, lastY: 0 };
    let playerRotY = 0, cameraRotX = 0;

    window.addEventListener('touchstart', e => {
        for(let t of e.changedTouches) {
            if(t.target.closest('.btn')) continue;
            if(t.clientX < window.innerWidth/2 && !moveData.active) {
                moveData.active = true; moveData.id = t.identifier;
                moveData.startX = t.clientX; moveData.startY = t.clientY;
                document.getElementById('joystick-base').style.display = 'block';
                document.getElementById('joystick-base').style.left = (t.clientX - 70)+'px';
                document.getElementById('joystick-base').style.top = (t.clientY - 70)+'px';
            } else if(!lookData.active) {
                lookData.active = true; lookData.id = t.identifier;
                lookData.lastX = t.clientX; lookData.lastY = t.clientY;
            }
        }
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === moveData.id) {
                moveData.dx = (t.clientX - moveData.startX) / 50;
                moveData.dy = (t.clientY - moveData.startY) / 50;
                const dist = Math.sqrt(moveData.dx**2 + moveData.dy**2);
                if(dist > 1) { moveData.dx /= dist; moveData.dy /= dist; }
                document.getElementById('joystick-handle').style.transform = `translate(calc(-50% + ${moveData.dx*40}px), calc(-50% + ${moveData.dy*40}px))`;
            }
            if(t.identifier === lookData.id) {
                playerRotY -= (t.clientX - lookData.lastX) * 0.005;
                cameraRotX -= (t.clientY - lookData.lastY) * 0.005;
                cameraRotX = Math.max(-1.5, Math.min(1.5, cameraRotX));
                lookData.lastX = t.clientX; lookData.lastY = t.clientY;
            }
        }
    }, {passive: false});

    const endHandler = e => {
        for(let t of e.changedTouches) {
            if(t.identifier === moveData.id) {
                moveData.active = false; moveData.id = null; moveData.dx = 0; moveData.dy = 0;
                document.getElementById('joystick-base').style.display = 'none';
            }
            if(t.identifier === lookData.id) { lookData.active = false; lookData.id = null; }
        }
    };
    window.addEventListener('touchend', endHandler);
    window.addEventListener('touchcancel', endHandler);

    // --- 6. グレネード (長押し起爆・予測線) ---
    let grenadeCooking = false;
    let grenadeTimer = 3.0;
    const btnGrenade = document.getElementById('btn-grenade');

    btnGrenade.addEventListener('touchstart', e => {
        e.preventDefault();
        grenadeCooking = true; grenadeTimer = 3.0;
        document.getElementById('grenade-timer').style.display = 'block';
    });

    btnGrenade.addEventListener('touchend', e => {
        e.preventDefault();
        if(grenadeCooking) throwGrenade();
        resetGrenadeCook();
    });

    function throwGrenade() {
        const gMesh = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({color: 0x111}));
        gMesh.position.copy(player.position).add(new THREE.Vector3(0,1.7,0));
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        scene.add(gMesh);
        tracers.push({ mesh: gMesh, vel: dir.multiplyScalar(0.4), type: 'grenade', timer: grenadeTimer * 60 });
    }

    function resetGrenadeCook() {
        grenadeCooking = false;
        document.getElementById('grenade-timer').style.display = 'none';
        predictionLine.geometry.setFromPoints([]);
    }

    // --- 7. ミニマップとフルマップ ---
    const mmCanvas = document.getElementById('minimap-canvas');
    const mmCtx = mmCanvas.getContext('2d');
    function updateMinimap() {
        mmCtx.clearRect(0,0,120,120);
        mmCtx.fillStyle = 'rgba(255,0,0,1)';
        bots.forEach(b => {
            const rx = (b.position.x - player.position.x) * 1.5 + 60;
            const rz = (b.position.z - player.position.z) * 1.5 + 60;
            if(rx > 0 && rx < 120 && rz > 0 && rz < 120) mmCtx.fillRect(rx-2, rz-2, 4, 4);
        });
    }

    function toggleFullMap() {
        const fm = document.getElementById('fullmap');
        fm.style.display = (fm.style.display === 'flex') ? 'none' : 'flex';
    }
    document.getElementById('minimap-container').onclick = toggleFullMap;

    // --- 8. メインループ ---
    function animate() {
        requestAnimationFrame(animate);
        if(!isPlaying) return;

        // 視点
        player.rotation.y = playerRotY;
        camera.rotation.x = cameraRotX;

        // 移動
        if(moveData.active) {
            const speed = (moveData.dy < -0.7) ? 0.2 : 0.1;
            const dir = new THREE.Vector3(moveData.dx, 0, moveData.dy).normalize().applyAxisAngle(new THREE.Vector3(0,1,0), playerRotY);
            player.position.add(dir.multiplyScalar(speed));
        }

        // グレネード予測
        if(grenadeCooking) {
            grenadeTimer -= 1/60;
            document.getElementById('grenade-timer').innerText = `COOKING: ${grenadeTimer.toFixed(1)}`;
            if(grenadeTimer <= 0) { throwGrenade(); resetGrenadeCook(); }
            
            // 予測線計算
            const points = [];
            const pPos = player.position.clone().add(new THREE.Vector3(0,1.7,0));
            const pVel = new THREE.Vector3(); camera.getWorldDirection(pVel); pVel.multiplyScalar(0.4);
            for(let i=0; i<30; i++) {
                points.push(pPos.clone());
                pPos.add(pVel); pVel.y -= 0.01;
                if(pPos.y < 0) break;
            }
            predictionLine.geometry.setFromPoints(points);
        }

        // 弾丸・グレネード更新
        for(let i=tracers.length-1; i>=0; i--) {
            const t = tracers[i];
            t.mesh.position.add(t.vel);
            if(t.type === 'grenade') {
                t.vel.y -= 0.01; // 重力
                if(t.mesh.position.y < 0) t.mesh.position.y = 0;
                t.timer--;
                if(t.timer <= 0) {
                    // 爆発 (Botキル)
                    bots.forEach((b, bi) => {
                        if(b.position.distanceTo(t.mesh.position) < 5) { scene.remove(b); bots.splice(bi, 1); }
                    });
                    scene.remove(t.mesh); tracers.splice(i, 1);
                }
            }
        }

        updateMinimap();
        renderer.render(scene, camera);
    }
    animate();

    // 射撃ボタン
    document.getElementById('btn-shoot').ontouchstart = (e) => {
        e.preventDefault();
        const bMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 1), new THREE.MeshBasicMaterial({color: 0xffff00}));
        bMesh.position.copy(player.position).add(new THREE.Vector3(0,1.6,0));
        const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
        // 弾丸の向きを進行方向に合わせる
        bMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
        scene.add(bMesh);
        tracers.push({ mesh: bMesh, vel: dir.multiplyScalar(1.5), type: 'bullet' });

        // ヒット判定
        const ray = new THREE.Raycaster(player.position.clone().add(new THREE.Vector3(0,1.6,0)), dir);
        const hits = ray.intersectObjects(bots);
        if(hits.length > 0) {
            const target = hits[0].object;
            scene.remove(target);
            bots.splice(bots.indexOf(target), 1);
        }
    };
</script>
</body>
</html>
