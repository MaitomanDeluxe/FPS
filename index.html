<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactical Warzone V5.0</title>

<style>

body,html{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:monospace;
}

#game-canvas{
position:absolute;
width:100%;
height:100%;
}

.overlay{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

#crosshair-container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:40px;
height:40px;
}

.cross-line{
position:absolute;
background:white;
}

#crosshair-top{
width:2px;
height:12px;
left:50%;
top:-8px;
transform:translateX(-50%);
}

#crosshair-bottom{
width:2px;
height:12px;
left:50%;
bottom:-8px;
transform:translateX(-50%);
}

#crosshair-left{
height:2px;
width:12px;
top:50%;
left:-8px;
transform:translateY(-50%);
}

#crosshair-right{
height:2px;
width:12px;
top:50%;
right:-8px;
transform:translateY(-50%);
}

#hit-marker{
position:absolute;
top:50%;
left:50%;
width:30px;
height:30px;
transform:translate(-50%,-50%);
display:none;
}

.hm-line{
position:absolute;
top:50%;
left:50%;
width:24px;
height:2px;
background:white;
}

.hm-line:nth-child(1){
transform:translate(-50%,-50%) rotate(45deg);
}

.hm-line:nth-child(2){
transform:translate(-50%,-50%) rotate(-45deg);
}

#ammo-hud{
position:absolute;
bottom:20px;
right:20px;
background:rgba(0,0,0,0.7);
padding:10px;
color:white;
}

#health-hud{
position:absolute;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.7);
padding:10px;
color:white;
}

#btn-shoot{
position:absolute;
bottom:100px;
right:40px;
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,50,50,0.3);
color:white;
display:flex;
align-items:center;
justify-content:center;
pointer-events:auto;
}

</style>
</head>

<body>

<canvas id="game-canvas"></canvas>

<div id="game-hud" class="overlay">

<div id="crosshair-container">

<div id="crosshair-top" class="cross-line"></div>
<div id="crosshair-bottom" class="cross-line"></div>
<div id="crosshair-left" class="cross-line"></div>
<div id="crosshair-right" class="cross-line"></div>

<div id="hit-marker">
<div class="hm-line"></div>
<div class="hm-line"></div>
</div>

</div>

<div id="health-hud">
HP <span id="hp-text">100</span>
</div>

<div id="ammo-hud">
<span id="ammo-count">30/120</span>
</div>

<div id="btn-shoot">FIRE</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("game-canvas")
})

renderer.setSize(window.innerWidth,window.innerHeight)

const playerRig = new THREE.Object3D()
scene.add(playerRig)
playerRig.add(camera)

playerRig.position.set(0,1.7,0)

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(500,500),
new THREE.MeshBasicMaterial({color:0x444444})
)

ground.rotation.x=-Math.PI/2
scene.add(ground)

let yaw=0
let pitch=0

let moveCtrl={dx:0,dy:0}

const weapons=[
{mag:30,cur:30,res:120},
{mag:15,cur:15,res:60}
]

let curWepIdx=0
let isADS=false

const weaponGroups=[]

const gunMat=new THREE.MeshBasicMaterial({color:0x222222})

const arGroup=new THREE.Group()

const body=new THREE.Mesh(
new THREE.BoxGeometry(0.05,0.12,0.3),
gunMat
)

arGroup.add(body)

arGroup.idlePos=new THREE.Vector3(0.2,-0.2,-0.3)

/* ADS修正（銃を下へ） */
arGroup.adsPos=new THREE.Vector3(
0.15,
-0.25,
-0.35
)

camera.add(arGroup)

weaponGroups.push(arGroup)

function updateHUD(){

const w=weapons[curWepIdx]

document.getElementById("ammo-count").innerText=
w.cur+"/"+w.res

}

function update(){

requestAnimationFrame(update)

playerRig.rotation.y=yaw
camera.rotation.x=pitch

const speed=0.1

const mv=new THREE.Vector3(
moveCtrl.dx,
0,
moveCtrl.dy
)

.applyAxisAngle(
new THREE.Vector3(0,1,0),
yaw
)

playerRig.position.add(mv.multiplyScalar(speed))

/* クロスヘア広がり */

const spread=
Math.min(
20,
Math.abs(moveCtrl.dx*20)+
Math.abs(moveCtrl.dy*20)+
(isADS?-8:0)
)

document.getElementById("crosshair-top")
.style.top=(-8-spread)+"px"

document.getElementById("crosshair-bottom")
.style.bottom=(-8-spread)+"px"

document.getElementById("crosshair-left")
.style.left=(-8-spread)+"px"

document.getElementById("crosshair-right")
.style.right=(-8-spread)+"px"

/* ADSアニメ */

const grp=weaponGroups[curWepIdx]

const target=isADS?grp.adsPos:grp.idlePos

grp.position.lerp(target,0.2)

renderer.render(scene,camera)

}

update()

document.getElementById("btn-shoot")
.addEventListener("click",()=>{

const w=weapons[curWepIdx]

if(w.cur>0){

w.cur--

updateHUD()

}

})

</script>

</body>
</html>
